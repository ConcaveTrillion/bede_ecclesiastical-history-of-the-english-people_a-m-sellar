		<section data-parent="book-4" id="chapter-4-6" epub:type="chapter">
			<header>
				<h3 epub:type="z3998:ordinal z3998:roman">VI</h3>
				<p epub:type="se:bridgehead">How Wynfrid being deposed, Sexwulf received his bishopric, and Earconwald was made bishop of the East Saxons. [675 a.d.]</p>
			</header>
			<!--
			<h2 class="tei tei-head" style="text-align: left; margin-bottom: 2.88em; margin-top: 2.88em">
			<span style="font-size: 144%">Chap. VI. How Wynfrid being deposed,
			Sexwulf received his bishopric, and Earconwald was made bishop of
			the East Saxons. [675</span> <span class="tei tei-hi" style="text-align: left"><span style="font-size: 144%; font-variant: small-caps">a.d.</span></span><span style="font-size: 144%">]</span></h2>
			<p class="tei tei-p" style="margin-bottom: 1.00em">Not long after
			these events, Theodore, the archbishop, taking offence at some act
			of disobedience of Wynfrid, bishop of the Mercians,<a href="#note_574" id="noteref_574" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">574</span></span></a>
			deposed him from his bishopric when he had held it but a few years,
			and in his place ordained Sexwulf bishop,<a href="#note_575" id="noteref_575" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">575</span></span></a> who
			was founder and abbot of the monastery which is called
			Medeshamstead,<a href="#note_576" id="noteref_576" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">576</span></span></a> in
			the country of the Gyrwas.<a href="#note_577" id="noteref_577" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">577</span></span></a>
			Wynfrid, thus deposed, returned to his monastery which is called Ad
			Barvae,<a href="#note_578" id="noteref_578" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">578</span></span></a> and
			there ended his life in holy conversation.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">Theodore then
			also appointed Earconwald,<a href="#note_579" id="noteref_579" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">579</span></span></a>
			bishop of <span class="tei tei-pb" id="page232">[pg
			232]</span><a class="tei tei-anchor" id="Pg232"/>
			the East Saxons, in the city of London, over whom at that time
			reigned Sebbi and Sighere, of whom mention has been made
			above.<a href="#note_580" id="noteref_580" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">580</span></span></a> This
			Earconwald's life and conversation, as well when he was bishop as
			before that time, is said to have been most holy, as is even now
			testified by heavenly miracles; for to this day, his horse-litter,
			in which he was wont to be carried when sick, is kept by his
			disciples, and continues to cure many of fevers and other ailments;
			and not only sick persons who are laid under that litter, or close
			by it, are cured; but the very splinters cut from it, when carried
			to the sick, are wont immediately to bring healing to them.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">This man, before
			he was made bishop, had built two famous monasteries, the one for
			himself, and the other for his sister Ethelburg,<a href="#note_581" id="noteref_581" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">581</span></span></a> and
			established them both in regular discipline of the best kind. That
			for himself was in the district of Sudergeona, by the river Thames,
			at a place called Cerotaesei,<a href="#note_582" id="noteref_582" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">582</span></span></a> that
			is, the Island of Cerot; that for his sister in the province of the
			East Saxons, at a place called In Berecingum,<a href="#note_583" id="noteref_583" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">583</span></span></a>
			wherein she might be a mother and nurse of women devoted to God.
			Being put into the government of that monastery, she showed herself
			in all respects worthy of her brother the bishop, by her own holy
			life and by her regular and pious care of those under her rule, as
			was also manifested by heavenly miracles.</p>
			</div>
