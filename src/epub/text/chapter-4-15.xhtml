				<h3 epub:type="z3998:ordinal z3998:roman">XV</h3>
				<p epub:type="se:bridgehead">How King Caedwalla, king of the Gewissae, having slain Ethelwalch, wasted that Province with cruel slaughter and devastation. [685 a.d.]</p>
			</header>
