			<header>
				<h3 epub:type="z3998:ordinal z3998:roman">X</h3>
				<p epub:type="se:bridgehead">How, in the reign of Arcadius, Pelagius, a Briton, insolently impugned the Grace of God.</p>
			</header>
			<!--
			<h2 class="tei tei-head" style="text-align: left; margin-bottom: 2.88em; margin-top: 2.88em">
			<span style="font-size: 144%">Chap. X. How, in the reign of
			Arcadius, Pelagius, a Briton, insolently impugned the Grace of
			God.</span></h2>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year of
			our Lord 394,<a href="#note_63" id="noteref_63" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">63</span></span></a>
			Arcadius, the son of Theodosius, the forty-third from Augustus,
			succeeding to <span class="tei tei-pb" id="page021">[pg
			021]</span><a class="tei tei-anchor" id="Pg021"/>
			the empire, with his brother Honorius, held it thirteen years. In
			his time, Pelagius,<a href="#note_64" id="noteref_64" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">64</span></span></a> a
			Briton, spread far and near the infection of his perfidious
			doctrine, denying the assistance of the Divine grace, being
			seconded therein by his associate Julianus of Campania,<a href="#note_65" id="noteref_65" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">65</span></span></a> who
			was impelled by an uncontrolled desire to recover his bishopric, of
			which he had been deprived. St. Augustine, and the other orthodox
			fathers, quoted many thousand catholic authorities against them,
			but failed to amend their folly; nay, more, their madness being
			rebuked was rather increased by contradiction than suffered by them
			to be purified through adherence to the truth; which Prosper, the
			rhetorician,<a href="#note_66" id="noteref_66" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">66</span></span></a> has
			beautifully expressed thus in heroic<a href="#note_67" id="noteref_67" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">67</span></span></a>
			verse:—</p>
			<div class="block tei tei-quote" style="margin-bottom: 1.80em; margin-left: 3.60em; margin-top: 1.80em; margin-right: 3.60em">
			<span style="font-size: 90%">They tell that one, erewhile consumed
			with gnawing spite, snake-like attacked Augustine in his writings.
			Who urged the wretched viper to raise from the ground his head,
			howsoever hidden in dens of darkness? Either the sea-girt Britons
			reared him with the fruit of their soil, or fed on Campanian
			pastures his heart swells with pride.</span>
			</div>
