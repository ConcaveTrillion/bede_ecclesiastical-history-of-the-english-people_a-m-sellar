		<section id="continuation" epub:type="chapter">
			<h2 epub:type="title">Continuation</h2>
			<!--</div><span class="tei tei-pb" id="page390">[pg 390]</span><a class="tei tei-anchor" id="Pg390"/>
			<hr class="page"/>
			<div class="tei tei-div" style="margin-bottom: 5.00em; margin-top: 5.00em">
			<a id="toc301"/> <a id="pdf302"/>
			<a class="tei tei-anchor" id="Continuation"/>
			<h1 class="tei tei-head" style="text-align: left; margin-bottom: 3.46em; margin-top: 3.46em">
			<span style="font-size: 173%">Continuation</span></h1>
			<p class="tei tei-p" style="margin-bottom: 1.00em"><span class="tei tei-hi"><span style="font-style: italic">The Continuation of
			Bede.</span></span><a href="#note_1056" id="noteref_1056" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1056</span></span></a></p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 731
			King Ceolwulf was taken prisoner, and tonsured, and sent back to his
			kingdom; Bishop Acca was driven from his see.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 732,
			Egbert<a href="#note_1057" id="noteref_1057" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1057</span></span></a> was
			made Bishop of York, in the room of Wilfrid.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">[Cynibert Bishop
			of Lindsey died.]</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">[In the year of
			our Lord 733, Archbishop Tatwine, having received the pall by
			Apostolic authority, ordained Alwic<a href="#note_1058" id="noteref_1058" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1058</span></span></a> and
			Sigfrid,<a href="#note_1059" id="noteref_1059" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1059</span></span></a>
			bishops.]</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 733,
			there was an eclipse of the sun on the 14th day of August about the
			third hour, in such wise that the whole orb of the sun seemed to be
			covered with a black and gloomy shield.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 734,
			the moon, on the 31st of January, about the time of cock-crowing,
			was, for about a whole hour, coloured blood-red, after which a
			blackness followed, and she regained her wonted light.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year from
			the Incarnation of Christ, 734, bishop Tatwine died.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 735,
			Nothelm was ordained archbishop; and bishop Egbert, having received
			the pall from the Apostolic see, was the first to be established as
			<span class="tei tei-pb" id="page391">[pg 391]</span><a class="tei tei-anchor" id="Pg391"/> archbishop<a href="#note_1060" id="noteref_1060" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1060</span></span></a> after
			Paulinus, and he ordained Frithbert,<a href="#note_1061" id="noteref_1061" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1061</span></span></a> and
			Frithwald<a href="#note_1062" id="noteref_1062" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1062</span></span></a>
			bishops; and the priest Bede died.<a href="#note_1063" id="noteref_1063" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1063</span></span></a></p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 737,
			an excessive drought rendered the land unfruitful; and Ceolwulf,
			voluntarily receiving the tonsure, left the kingdom to Eadbert.<a href="#note_1064" id="noteref_1064" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1064</span></span></a></p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 739,
			Edilhart,<a href="#note_1065" id="noteref_1065" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1065</span></span></a> king
			of the West-Saxons, died, as did Archbishop Nothelm.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 740,
			Cuthbert<a href="#note_1066" id="noteref_1066" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1066</span></span></a> was
			consecrated in Nothelm's stead. Ethelbald, king of the Mercians,
			cruelly and wrongfully wasted part of Northumbria, their king,
			Eadbert, with his army, being employed against the Picts. Bishop
			Ethelwald died also, and Conwulf,<a href="#note_1067" id="noteref_1067" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1067</span></span></a> was
			consecrated in his stead. Arnwin<a href="#note_1068" id="noteref_1068" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1068</span></span></a> and
			Eadbert<a href="#note_1069" id="noteref_1069" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1069</span></span></a> were
			slain.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 741, a
			great drought came upon the country. Charles,<a href="#note_1070" id="noteref_1070" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1070</span></span></a> king
			of the Franks, died; and his sons, Caroloman and Pippin,<a href="#note_1071" id="noteref_1071" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1071</span></span></a>
			reigned in his stead.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 745,
			Bishop Wilfrid and Ingwald, Bishop of London, departed to the
			Lord.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 747,
			the man of God, Herefrid,<a href="#note_1072" id="noteref_1072" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1072</span></span></a>
			died.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 750,
			Cuthred, king of the West Saxons, rose up against king Ethelbald and
			Oengus; Theudor <span class="tei tei-pb" id="page392">[pg
			392]</span><a class="tei tei-anchor" id="Pg392"/> and
			Eanred died; Eadbert added the plain of Kyle and other places to his
			dominions.<a href="#note_1073" id="noteref_1073" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1073</span></span></a></p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 753,
			in the fifth year of King Eadbert, on the 9th of January,<a href="#note_1074" id="noteref_1074" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1074</span></span></a> an
			eclipse of the sun came to pass; afterwards, in the same year and
			month, on the 24th day of January, the moon suffered an eclipse,
			being covered with a gloomy, black shield, in like manner as was the
			sun a little while before.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 754,
			Boniface,<a href="#note_1075" id="noteref_1075" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1075</span></span></a> called
			also Winfrid, Bishop of the Franks, received the crown of martyrdom,
			together with fifty-three others; and Redger was consecrated
			archbishop in his stead, by pope Stephen.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 757,
			Ethelbald, king of the Mercians, was treacherously and miserably
			murdered, in the night, by his own guards; Beornred<a href="#note_1076" id="noteref_1076" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1076</span></span></a> began
			his reign; Cyniwulf,<a href="#note_1077" id="noteref_1077" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1077</span></span></a> king
			of the West Saxons, died; and the same year, Offa, having put
			Beornred to flight, sought to gain the kingdom of the Mercians by
			bloodshed.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 758,
			Eadbert, king of the Northumbrians, <span class="tei tei-pb" id="page393">[pg 393]</span><a class="tei tei-anchor" id="Pg393"/> receiving St. Peter's tonsure for the love of
			God, and to the end that he might take the heavenly country by
			force,<a href="#note_1078" id="noteref_1078" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1078</span></span></a> left
			the kingdom to his son Oswulf.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 755,
			Oswulf was wickedly murdered by his own thegns; and Ethelwald, being
			chosen the same year by his people, entered upon the kingdom; in
			whose second year there was great tribulation by reason of
			pestilence, which continued almost two years, divers grievous
			sicknesses raging, but more especially the disease of dysentery.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 761,
			Oengus,<a href="#note_1079" id="noteref_1079" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1079</span></span></a> king
			of the Picts, died; who, from the beginning to the end of his reign,
			continued to be a blood-stained and tyrannical butcher; Oswin<a href="#note_1080" id="noteref_1080" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1080</span></span></a> was
			also slain.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 765,
			King Aluchred came to the throne.<a href="#note_1081" id="noteref_1081" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1081</span></span></a></p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year 766
			<span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>, Archbishop Egbert, of
			the royal race, and endued with divine knowledge, as also Frithbert,
			both of them truly faithful bishops, departed to the Lord.</p>
			</div><span class="tei tei-pb" id="page395">[pg 395]</span><a class="tei tei-anchor" id="Pg395"/>
