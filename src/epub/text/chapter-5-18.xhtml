		<section data-parent="book-5" id="chapter-5-18" epub:type="chapter">
			<header>
				<h3 epub:type="z3998:ordinal z3998:roman">XVIII</h3>
				<p epub:type="se:bridgehead">How the South Saxons received Eadbert and Eolla, and the West Saxons, Daniel and Aldhelm, for their bishops; and of the writings of the same Aldhelm. [705 a.d.]</p>
			</header>
			<!--
			<h2 class="tei tei-head" style="text-align: left; margin-bottom: 2.88em; margin-top: 2.88em">
			<span style="font-size: 144%">Chap. XVIII. How the South Saxons
			received Eadbert and Eolla, and the West Saxons, Daniel and
			Aldhelm, for their bishops; and of the writings of the same
			Aldhelm. [705</span> <span class="tei tei-hi" style="text-align: left"><span style="font-size: 144%; font-variant: small-caps">a.d.</span></span><span style="font-size: 144%">]</span></h2>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year of
			our Lord 705, Aldfrid, king of the Northumbrians, died<a href="#note_867" id="noteref_867" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">867</span></span></a>
			before the end of the twentieth year of his reign. His son
			Osred,<a href="#note_868" id="noteref_868" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">868</span></span></a> a boy
			about eight years of age, succeeding him in the throne, reigned
			eleven years. In the beginning of his reign, Haedde, bishop of the
			West Saxons,<a href="#note_869" id="noteref_869" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">869</span></span></a>
			departed to the heavenly life; for he was a good man and a just,
			and his life and doctrine as a bishop were guided rather by his
			innate love of virtue, than by what he had gained from books. The
			most <span class="tei tei-pb" id="page343">[pg 343]</span><a class="tei tei-anchor" id="Pg343"/> reverend bishop,
			Pechthelm, of whom we shall speak hereafter in the proper
			place,<a href="#note_870" id="noteref_870" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">870</span></span></a> and
			who while still deacon or monk was for a long time with his
			successor Aldhelm,<a href="#note_871" id="noteref_871" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">871</span></span></a> was
			wont to relate that many miracles of healing have been wrought in
			the place where he died, through the merit of his sanctity; and
			that the men of that province used to carry the dust thence for the
			sick, and put it into water, and the drinking thereof, or
			sprinkling with it, brought health to many sick men and beasts; so
			that the holy dust being frequently carried away, a great hole was
			made there.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">Upon his death,
			the bishopric of that province was divided into two dioceses.<a href="#note_872" id="noteref_872" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">872</span></span></a> One
			of them was given to <span class="tei tei-pb" id="page344">[pg
			344]</span><a class="tei tei-anchor" id="Pg344"/>
			Daniel,<a href="#note_873" id="noteref_873" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">873</span></span></a> which
			he governs to this day; the other to Aldhelm, wherein he presided
			most vigorously four years; both of them were fully instructed, as
			well in matters touching the Church as in the knowledge of the
			Scriptures. Aldhelm, when he was as yet only a priest and abbot of
			the monastery which is called the city of Maildufus,<a href="#note_874" id="noteref_874" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">874</span></span></a> by
			order of a synod of his own nation, wrote a notable book<a href="#note_875" id="noteref_875" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">875</span></span></a>
			against the error of the Britons, in not celebrating Easter at the
			due time, and in doing divers other things contrary to the purity
			of doctrine and the peace of the church; and through the reading of
			this book many of the Britons, who were subject to the West Saxons,
			were led by him to adopt the Catholic celebration of our Lord's
			Paschal Feast. He likewise wrote a famous book on Virginity,<a href="#note_876" id="noteref_876" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">876</span></span></a>
			which, after the example of Sedulius,<a href="#note_877" id="noteref_877" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">877</span></span></a> he
			composed in twofold form, in hexameters and in prose. He wrote some
			other books, being a man most instructed in all respects, for he
			had a polished style,<a href="#note_878" id="noteref_878" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">878</span></span></a> and
			was, as I have said, of marvellous learning both in liberal and
			ecclesiastical studies. On his death, Forthere<a href="#note_879" id="noteref_879" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">879</span></span></a>
			<span class="tei tei-pb" id="page345">[pg 345]</span><a class="tei tei-anchor" id="Pg345"/> was made bishop in
			his stead, and is living at this time, being likewise a man very
			learned in the Holy Scriptures.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">Whilst they
			administered the bishopric, it was determined by a synodal decree,
			that the province of the South Saxons, which till that time
			belonged to the diocese of the city of Winchester, where Daniel
			then presided, should itself have an episcopal see, and a bishop of
			its own.<a href="#note_880" id="noteref_880" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">880</span></span></a>
			Eadbert, at that time abbot of the monastery of Bishop Wilfrid, of
			blessed memory, called Selaeseu,<a href="#note_881" id="noteref_881" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">881</span></span></a> was
			consecrated their first bishop. On his death, Eolla succeeded to
			the office of bishop. He also died some years ago, and the
			bishopric has been vacant to this day.<a href="#note_882" id="noteref_882" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">882</span></span></a></p>
			</div>
