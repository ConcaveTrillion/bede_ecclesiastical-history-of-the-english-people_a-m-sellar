			<span class="tei tei-q">“the apostolic tradition.”</span> For the
			nineteen years' cycle, cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_III">III, 3</a> (Anatolius).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_973" id="note_973" class="pginternal">973.</a></dt>
			<dd class="tei tei-notetext">The celebrated Bishop of Caesarea,
			called also Eusebius Pamphili, a name which he adopted from
			devotion to his friend, Pamphilus. How much he had to do with the
			nineteen years' cycle seems altogether uncertain. He took a leading
			part in the Council of Nicaea (325 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>), but there is no
			proof that the Council formally adopted the cycle, as has been
			supposed. It had been in use long before, but it may have received
			authoritative sanction at Nicaea. Eusebius wrote a treatise on
			Easter, of which a fragment is extant.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_974" id="note_974" class="pginternal">974.</a></dt>
			<dd class="tei tei-notetext">A presbyter of Caesarea, the founder
			of the famous library in that place. He was martyred in 309
			<span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span> Eusebius wrote his
			life, but the work is lost.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_975" id="note_975" class="pginternal">975.</a></dt>
			<dd class="tei tei-notetext">Archbishop of Alexandria, 385-412. He
			made a cycle of 418 years (19 × 22) for Theodosius, and reckoned
			the days on which Easter would fall for 100 years from the first
			year of the consulate of Theodosius (380 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_976" id="note_976" class="pginternal">976.</a></dt>
			<dd class="tei tei-notetext">The great Archbishop of Alexandria,
			412-444. He shortened the cycle of Theophilus, making a cycle of
			ninety-five years (19 × 5), for the sake of convenience. Part of
			his <span class="tei tei-q">“Computus Paschalis”</span>
			remains.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_977" id="note_977" class="pginternal">977.</a></dt>
			<dd class="tei tei-notetext">A monk of the Western Church in the
			sixth century. The surname, <span class="tei tei-q">“Exiguus,”</span> refers, not to his stature, but to
			his humbleness of heart. Our method of dating from the Birth of
			Christ was begun by him. He revived the cycle of Victorius (or
			Victorinus) of Aquitaine (463 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>), hence called
			Dionysian. It was a cycle of 532 years, <span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>
			the lunar cycle of 19 × the solar cycle of 28.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_978" id="note_978" class="pginternal">978.</a></dt>
			<dd class="tei tei-notetext">Cf. p. <a class="tei tei-ref pginternal" href="#Pg369">369</a>, note 5.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_979" id="note_979" class="pginternal">979.</a></dt>
			<dd class="tei tei-notetext">Job, i, 20.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_980" id="note_980" class="pginternal">980.</a></dt>
			<dd class="tei tei-notetext">Gen., xli, 14.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_981" id="note_981" class="pginternal">981.</a></dt>
			<dd class="tei tei-notetext">St. Matt., xvi, 18.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_982" id="note_982" class="pginternal">982.</a></dt>
			<dd class="tei tei-notetext">Acts, viii, 20 (Vulgate). The origin
			of this form of tonsure was attributed to Simon Magus.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_983" id="note_983" class="pginternal">983.</a></dt>
			<dd class="tei tei-notetext">Gal., v, 24.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_984" id="note_984" class="pginternal">984.</a></dt>
			<dd class="tei tei-notetext">St. James, i, 12.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_985" id="note_985" class="pginternal">985.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XV">15</a> and notes. It is uncertain whether this
			incident is to be connected with Adamnan's first or second visit to
			King Aldfrid.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_986" id="note_986" class="pginternal">986.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, Ireland; cf. c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XV">15</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_987" id="note_987" class="pginternal">987.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">supra</span></span>,
			p. <a class="tei tei-ref pginternal" href="#Pg359">359</a>, note 1.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_988" id="note_988" class="pginternal">988.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">18</a> and note; cc. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">19</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XX">20</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">24</a>. He was killed in battle, but neither the
			locality nor the war is known.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_989" id="note_989" class="pginternal">989.</a></dt>
			<dd class="tei tei-notetext">He reigned two years, <span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span> c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIII">23</a>. He belonged to a younger branch of the royal
			house of Northumbria. His father's name was Cuthwine, and Ceolwulf,
			who succeeded Osric (c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIII">23</a>), was his brother.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_990" id="note_990" class="pginternal">990.</a></dt>
			<dd class="tei tei-notetext">Or, perhaps, <span class="tei tei-q">“bishop;”</span> cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_IV">III, 4</a>, note. For the circumstances which led
			Egbert to undertake his work among the Columban monasteries,
			<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_IX">9</a>. As the events narrated
			there were prior to 690 (Wilbrord's mission to Frisia), we may,
			perhaps, assume that he had been labouring during this long
			interval among the Columban monasteries in Ireland. In <a class="tei tei-ref pginternal" href="#Book_III_Chap_IV">III, 4</a>, Bede places
			Egbert's arrival in Iona a year earlier.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_991" id="note_991" class="pginternal">991.</a></dt>
			<dd class="tei tei-notetext">Rom., x, 2.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_992" id="note_992" class="pginternal">992.</a></dt>
			<dd class="tei tei-notetext">Cf. p. <a class="tei tei-ref pginternal" href="#Pg372">372</a>. This seems to be the meaning of the somewhat
			obscure sentence, <span class="tei tei-q">“... celebrationem, ut
			diximus, praecipuae solemnitatis sub figura coronae perpetis agere
			perdocuit.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_993" id="note_993" class="pginternal">993.</a></dt>
			<dd class="tei tei-notetext">For the conversion of the Britons to
			Roman usages, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> cc. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XV">15</a> and <a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">18</a>, notes.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_994" id="note_994" class="pginternal">994.</a></dt>
			<dd class="tei tei-notetext">This is accurate enough in round
			numbers. Aidan's mission (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_III_Chap_III">III, 3</a>) was probably in 635.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_995" id="note_995" class="pginternal">995.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, 24th April. According to
			the Celtic rule, Easter Day could never have been so late, 21st
			April being the latest possible day, while the Romans might
			celebrate as late as 25th April.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_996" id="note_996" class="pginternal">996.</a></dt>
			<dd class="tei tei-notetext">Osric had succeeded in 718. Simeon of
			Durham says he was a son of King <span class="tei tei-q">“Alfrid.”</span> It has been suggested (Dr. Stubbs, in
			Dict. of Christian Biog.) that this may mean Alchfrid, son of Oswy
			(<a class="tei tei-ref pginternal" href="#Book_III_Chap_XIV">III, 14</a>,
			<span class="tei tei-hi"><span style="font-style: italic">et
			saep.</span></span>), further, that this Osric is to be identified
			with the Hwiccian sub-king, mentioned in <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIII">IV, 23</a>, who may have
			found a refuge in Mercia, when Alchfrid was disinherited. Against
			this it has been maintained that the statement of Simeon of Durham
			may, with greater probability, be referred to Aldfrid, the
			successor of Egfrid and father of Osred.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_997" id="note_997" class="pginternal">997.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">IV, 26</a>, and <a class="tei tei-ref pginternal" href="#Book_V_Chap_VIII">V, 8</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_998" id="note_998" class="pginternal">998.</a></dt>
			<dd class="tei tei-notetext">From Bede we should infer that they
			all succeeded in 725, and the evidence of charters goes to show
			that Eadbert and Ethelbert began to reign jointly in that year.
			Florence of Worcester makes Eadbert and Ethelbert reign
			successively, and William of Malmesbury gives successive reigns of
			considerable length to all three brothers. This prolongs Alric's
			life beyond probability, and as his reign rests on no early
			evidence, Dr. Stubbs is inclined to set it aside altogether.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_999" id="note_999" class="pginternal">999.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_VIII">8</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1000" id="note_1000" class="pginternal">1000.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_III">II, 3</a> and note; <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIV">III, 14</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1001" id="note_1001" class="pginternal">1001.</a></dt>
			<dd class="tei tei-notetext">Consecrated in 727 (Saxon Chronicle)
			and died in 739 (Simeon of Durham).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1002" id="note_1002" class="pginternal">1002.</a></dt>
			<dd class="tei tei-notetext">This must refer to the battle of Tours
			in 732, in which Charles Martel defeated the Saracens. As the
			Ecclesiastical History was finished in 731, this passage must be
			regarded as a later insertion. For Bede's view with regard to the
			Saracens, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> his theological works
			<span class="tei tei-hi"><span style="font-style: italic">passim</span></span>. He believed them to be
			the descendants of Ishmael.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1003" id="note_1003" class="pginternal">1003.</a></dt>
			<dd class="tei tei-notetext">In 729; <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c.
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_XXII">22</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1004" id="note_1004" class="pginternal">1004.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">supra</span></span>,
			this chapter, <span class="tei tei-hi"><span style="font-style: italic">ad init.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1005" id="note_1005" class="pginternal">1005.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Preface">Preface</a>, note 1, and the <a class="tei tei-ref pginternal" href="#Continuation">Continuation</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1006" id="note_1006" class="pginternal">1006.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXII">22</a>, <span class="tei tei-hi"><span style="font-style: italic">ad init</span></span> and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1007" id="note_1007" class="pginternal">1007.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, since 29th June, 693;
			<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_VIII">8</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1008" id="note_1008" class="pginternal">1008.</a></dt>
			<dd class="tei tei-notetext">He received the pall in 733 and died
			in 734; cf. <a class="tei tei-ref pginternal" href="#Continuation">Continuation</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1009" id="note_1009" class="pginternal">1009.</a></dt>
			<dd class="tei tei-notetext">Bredon in Worcestershire.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1010" id="note_1010" class="pginternal">1010.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Preface">Preface</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVI">IV, 16</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">V, 18</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1011" id="note_1011" class="pginternal">1011.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, of the East Saxons. He
			died in 745; <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Continuation">Continuation</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1012" id="note_1012" class="pginternal">1012.</a></dt>
			<dd class="tei tei-notetext">Called also Worr. In the Act of the
			Council of Clovesho in 716 he signs as Bishop of Lichfield (to
			which at this time Leicester was united) along with his
			predecessor, Hedda, but the authenticity of the Act is not fully
			established, and it is generally supposed that he succeeded in 721.
			At his death in 737 (Simeon of Durham) Leicester was finally
			separated from Lichfield.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1013" id="note_1013" class="pginternal">1013.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">supra</span></span>,
			p. <a class="tei tei-ref pginternal" href="#Pg378">378</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1014" id="note_1014" class="pginternal">1014.</a></dt>
			<dd class="tei tei-notetext">
			<p>The following
			list of the English bishoprics at the time when Bede closed his
			history [731 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>], will enable the
			reader to recognize those which belonged to each separate
			kingdom:</p>
			<p>KINGDOMS;
			SEES; PRELATES.<br/>
			Kent; Canterbury; Tatwine.<br/>
			  Rochester; Aldwulf.<br/>
			East Saxons; London; Ingwald.<br/>
			East Angles; Dunwich; Aldbert.<br/>
			  Elmham; Hadulac.<br/>
			West Saxons; Winchester; Daniel.<br/>
			  Sherborne; Forthere.<br/>
			Mercia; Lichfield (to which Leicester had been reunited in 705);
			Aldwin.<br/>
			  Hereford; Walhstod.<br/>
			  Worcester; Wilfrid.<br/>
			  Lindsey (Sidnacester); Cynibert.<br/>
			South Saxons; Selsey; Vacant.<br/>
			Northumbria; York; Wilfrid II.<br/>
			  Lindisfarne; Ethelwald.<br/>
			  Hexham; Acca.<br/>
			  Whitern; Pechthelm.</p>
			</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1015" id="note_1015" class="pginternal">1015.</a></dt>
			<dd class="tei tei-notetext">Aldbert was Bishop of Dunwich, Hadulac
			of Elmham.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1016" id="note_1016" class="pginternal">1016.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">18</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1017" id="note_1017" class="pginternal">1017.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">supra</span></span>,
			p. <a class="tei tei-ref pginternal" href="#Pg379">379</a>, note 6.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1018" id="note_1018" class="pginternal">1018.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, in Herefordshire. It is
			not certain when the see of Hereford was founded. Besides Putta
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_IV_Chap_II">IV, 2</a>, and note), Florence of Worcester
			mentions Tyrhtel and Torthere as predecessors of Walhstod.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1019" id="note_1019" class="pginternal">1019.</a></dt>
			<dd class="tei tei-notetext">This is Wilfrid, Bishop of Worcester,
			contemporary with Wilfrid II of York (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIII">IV, 23</a>;
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_VI">V, 6</a>). He
			succeeded St. Egwin, whom Bede strangely omits to mention, the
			successor of Oftfor (<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIII">IV, 23</a>). For the Hwiccas, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> II,
			2, p. <a class="tei tei-ref pginternal" href="#Pg084">84</a>, and for the see
			of Worcester, IV, 23, p. <a class="tei tei-ref pginternal" href="#Pg273">273</a>, note 7.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1020" id="note_1020" class="pginternal">1020.</a></dt>
			<dd class="tei tei-notetext">Cf. Preface, p. <a class="tei tei-ref pginternal" href="#Pg004">4</a>, and <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">IV, 12</a>. For Lindsey as a separate bishopric,
			<span class="tei tei-hi"><span style="font-style: italic">ibid.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1021" id="note_1021" class="pginternal">1021.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVI">IV, 16</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1022" id="note_1022" class="pginternal">1022.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">18</a>, <span class="tei tei-hi"><span style="font-style: italic">ad fin.</span></span>, and notes.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1023" id="note_1023" class="pginternal">1023.</a></dt>
			<dd class="tei tei-notetext">He was a son of Penda's brother,
			Alweo. He had lived at one time in retirement near the hermitage of
			St. Guthlac, flying from the enmity of Ceolred, but on the death of
			the latter in 716, he succeeded to the throne. Though he is not
			included in Bede's list of Bretwaldas (<a class="tei tei-ref pginternal" href="#Book_II_Chap_V">II, 5</a>), he established the supremacy of
			Mercia for twenty years over all England south of the Humber, till
			in 754 Wessex freed itself in the battle of Burford. For his wars
			with Wessex and Northumbria, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Continuation">Continuation</a>, <span class="tei tei-hi"><span style="font-style: italic">sub</span></span> 740
			and 750. There is a charter of his dated 749 in which he grants
			certain ecclesiastical privileges, <span class="tei tei-q">“pro
			expiatione delictorum suorum.”</span> His oppression of the Church
			and his private life are rebuked in the letter of Boniface and five
			German bishops addressed to him (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			Haddan and Stubbs, III, 350).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1024" id="note_1024" class="pginternal">1024.</a></dt>
			<dd class="tei tei-notetext">Wilfrid II, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIII">IV, 23</a>, and
			note; cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_VI">V,
			6</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1025" id="note_1025" class="pginternal">1025.</a></dt>
			<dd class="tei tei-notetext">Cf. c. 12, p. <a class="tei tei-ref pginternal" href="#Pg331">331</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1026" id="note_1026" class="pginternal">1026.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_III_Chap_XIII">III, 13</a>, and note; cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIV">IV, 14</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_XX">V, 20</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1027" id="note_1027" class="pginternal">1027.</a></dt>
			<dd class="tei tei-notetext">Cf. cc. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XIII">13</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">18</a>. For the <span class="tei tei-q">“White
			House”</span> (Whitern), <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_III_Chap_IV">III, 4</a>, and note. About this time (the
			exact date is not known) it became an Anglian see, a fact which
			indicates that in spite of the defeat of Egfrid in 685, which freed
			the Northern Picts, the Picts of Galloway were still subject to
			Northumbria. The bishopric came to an end about the close of the
			century, when the Northumbrian power had fallen into decay.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1028" id="note_1028" class="pginternal">1028.</a></dt>
			<dd class="tei tei-notetext">The Scots of Dalriada (<a class="tei tei-ref pginternal" href="#Book_I_Chap_I">I, 1</a>). They had recovered
			their liberty after the defeat and death of Egfrid; cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">IV, 26</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1029" id="note_1029" class="pginternal">1029.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">ibid.</span></span>,
			and p. <a class="tei tei-ref pginternal" href="#Pg376">376</a>, note 1.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1030" id="note_1030" class="pginternal">1030.</a></dt>
			<dd class="tei tei-notetext">External peace apparently. For the
			internal state of Northumbria, <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> p.
			<a class="tei tei-ref pginternal" href="#Pg378">378</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1031" id="note_1031" class="pginternal">1031.</a></dt>
			<dd class="tei tei-notetext">For the accuracy of these dates, cf.
			the notes on the events as they occur in the narrative.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1032" id="note_1032" class="pginternal">1032.</a></dt>
			<dd class="tei tei-notetext">The length of his pontificate is not
			mentioned in the narrative.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1033" id="note_1033" class="pginternal">1033.</a></dt>
			<dd class="tei tei-notetext">This and the two following entries are
			not in the narrative.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1034" id="note_1034" class="pginternal">1034.</a></dt>
			<dd class="tei tei-notetext">Ida was the first king of Bernicia,
			and one of the leaders of the English invasion. He conquered the
			country about Bamborough, which he is said to have founded (cf.
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_VI">III, 6</a>), and
			settled his people here. Deira, which was for a time a separate
			kingdom, was finally united to Bernicia under the strong rule of
			Oswald, Ida's great grandson (<span class="tei tei-hi"><span style="font-style: italic">ib. ad fin.</span></span>), who through his
			mother, Acha, was descended also from the royal house of
			Deira.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1035" id="note_1035" class="pginternal">1035.</a></dt>
			<dd class="tei tei-notetext">By Scotland, as usual, Ireland is
			meant.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1036" id="note_1036" class="pginternal">1036.</a></dt>
			<dd class="tei tei-notetext">Wulfhere's death is not mentioned in
			the narrative.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1037" id="note_1037" class="pginternal">1037.</a></dt>
			<dd class="tei tei-notetext">This is not in the narrative. For
			Osthryth cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XI">III,
			11</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXI">IV,
			21</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1038" id="note_1038" class="pginternal">1038.</a></dt>
			<dd class="tei tei-notetext">Not in the narrative. Berctred is
			probably to be identified with Berct in <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">IV, 26</a> <span class="tei tei-hi"><span style="font-style: italic">ad
			init</span></span>. (Ulster Annals: <span class="tei tei-q">“Brectrid”</span>; Sax. Chron.: <span class="tei tei-q">“Briht.”</span>)</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1039" id="note_1039" class="pginternal">1039.</a></dt>
			<dd class="tei tei-notetext">Above it is said that he succeeded in
			675, making his reign twenty-nine years, and this agrees with the
			Saxon Chronicle. Wilfrid, on his return to England in 705, found
			him already an abbot. (<a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">V, 19</a>.)</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1040" id="note_1040" class="pginternal">1040.</a></dt>
			<dd class="tei tei-notetext">Not in the narrative. Bertfrid was
			Osred's chief ealdorman, and was besieged with him in Bamborough by
			the usurper Eadwulf; cf. p. <a class="tei tei-ref pginternal" href="#Pg342">342</a>, note 2. We find him acting as spokesman in
			the Council on the Nidd (V, 19, p. <a class="tei tei-ref pginternal" href="#Pg356">356</a>) in demanding to have the Papal letters
			translated into English.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1041" id="note_1041" class="pginternal">1041.</a></dt>
			<dd class="tei tei-notetext">For Bede's life, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			Introduction.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1042" id="note_1042" class="pginternal">1042.</a></dt>
			<dd class="tei tei-notetext">IV, 18, p. <a class="tei tei-ref pginternal" href="#Pg257">257</a>, note 3.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1043" id="note_1043" class="pginternal">1043.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1044" id="note_1044" class="pginternal">1044.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span>, note 4, cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXI">V, 21</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1045" id="note_1045" class="pginternal">1045.</a></dt>
			<dd class="tei tei-notetext">John of Beverley, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIII">IV, 23</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_II">V, 2-6</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1046" id="note_1046" class="pginternal">1046.</a></dt>
			<dd class="tei tei-notetext">
			<p>For a full
			account of Bede's works, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Plummer, vol. I,
			Introduction, or Dictionary of Christian Biography, <span class="tei tei-hi"><span style="font-style: italic">s.v.</span></span>
			<span class="tei tei-q">“Beda.”</span> Besides the works
			mentioned in this list, the following are certainly genuine:</p>
			<p>The short
			<span class="tei tei-q">“Epistola ad Albinum”</span> (sent with a
			copy of the Ecclesiastical History).</p>
			<p><span class="tei tei-q">“Retractationes in Acta.”</span></p>
			<p><span class="tei tei-q">“Epistola ad Egberctum.”</span></p>
			<p><span class="tei tei-q">“De locis Sanctis”</span> (to which Bede alludes in
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_XVII">V. 17</a>). A
			number of other works, some certainly, others probably spurious,
			and a few possibly genuine, have been attributed to him.</p>
			</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1047" id="note_1047" class="pginternal">1047.</a></dt>
			<dd class="tei tei-notetext">An answer to questions put to him by
			Nothelm (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Preface, p. <a class="tei tei-ref pginternal" href="#Pg002">2</a>, note 4, and <a class="tei tei-ref pginternal" href="#Continuation">Continuation</a>, <span class="tei tei-hi"><span style="font-style: italic">sub</span></span>
			735).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1048" id="note_1048" class="pginternal">1048.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“Parabolae”</span> = comparisons. <span class="tei tei-q">“Parabolae Salomonis”</span> are the first words of the
			Book of Proverbs in the Vulgate.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1049" id="note_1049" class="pginternal">1049.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, St. Paul.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1050" id="note_1050" class="pginternal">1050.</a></dt>
			<dd class="tei tei-notetext">Isa., xxiv, 22.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1051" id="note_1051" class="pginternal">1051.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_III_Chap_III">III, 3</a>, note; cf. III, 25, p. <a class="tei tei-ref pginternal" href="#Pg198">198</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1052" id="note_1052" class="pginternal">1052.</a></dt>
			<dd class="tei tei-notetext">A priest of Nola in Campania. He was
			of Syrian extraction, but born at Nola, and ordained priest
			<span class="tei tei-hi"><span style="font-style: italic">circ.</span></span> 250 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span> He was persecuted
			under Decius, and again under Valerian, but escaped. His history is
			told in the poems of Paulinus, Bishop of Nola (409-431).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1053" id="note_1053" class="pginternal">1053.</a></dt>
			<dd class="tei tei-notetext">This work is not known to exist.
			Probably the saint is Anastasius the Younger, Patriarch of Antioch,
			killed in 610 by the Jews in a sedition on 21st December, and in
			the Roman martyrology honoured on that day as a martyr
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Butler, <span class="tei tei-q">“Lives of the Saints”</span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1054" id="note_1054" class="pginternal">1054.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">IV, 26-32</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1055" id="note_1055" class="pginternal">1055.</a></dt>
			<dd class="tei tei-notetext">For Benedict and Ceolfrid,
			<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVIII">IV, 18</a>. Huaetbert belonged to the monastery
			of Wearmouth and Jarrow from his earliest childhood, and succeeded
			Ceolfrid as abbot in 716. He survived Bede. The latter dedicated
			his commentary on the Apocalypse and the De temp. Rat. to him under
			his name of Eusebius given him for his piety (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			Bede's Hist. Abb. and Anon., Hist. Abb.).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1056" id="note_1056" class="pginternal">1056.</a></dt>
			<dd class="tei tei-notetext">(Only names which have not occurred in
			the narrative are annotated; references for those already mentioned
			will be found in the Index.) The Continuation is by a later hand.
			But Mr. Plummer considers that the entries under the years 731,
			732, 733 and 734, may have been added by Bede himself. They appear
			in the great Moore MS., and those for 733 and 734 also in another
			eighth century MS. The entries enclosed in square brackets are
			found in a fifteenth century MS.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1057" id="note_1057" class="pginternal">1057.</a></dt>
			<dd class="tei tei-notetext">He succeeded Wilfrid II, and two years
			later became Archbishop of York (<span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span> under 735). It was to him that Bede addressed
			the <span class="tei tei-q">“Epist. ad Egberctum.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1058" id="note_1058" class="pginternal">1058.</a></dt>
			<dd class="tei tei-notetext">Bishop of Lindsey.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1059" id="note_1059" class="pginternal">1059.</a></dt>
			<dd class="tei tei-notetext">Bishop of Selsey.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1060" id="note_1060" class="pginternal">1060.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, of York.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1061" id="note_1061" class="pginternal">1061.</a></dt>
			<dd class="tei tei-notetext">Bishop of Hexham.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1062" id="note_1062" class="pginternal">1062.</a></dt>
			<dd class="tei tei-notetext">Bishop of Whitern.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1063" id="note_1063" class="pginternal">1063.</a></dt>
			<dd class="tei tei-notetext">The early authorities differ as to the
			year, but this is the traditional date, and is usually
			accepted.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1064" id="note_1064" class="pginternal">1064.</a></dt>
			<dd class="tei tei-notetext">King of Northumbria 737-758
			(<span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span>); died in 768. He was a son of Eata, called by
			Nennius, Eata <span class="tei tei-q">“Glinmaur,”</span> a
			descendant of Ida, and was the brother of Archbishop Egbert. Under
			him the Northumbrian power revived for a period.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1065" id="note_1065" class="pginternal">1065.</a></dt>
			<dd class="tei tei-notetext">He was the kinsman and predecessor of
			Cuthred (<span class="tei tei-hi"><span style="font-style: italic">v. infra</span></span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1066" id="note_1066" class="pginternal">1066.</a></dt>
			<dd class="tei tei-notetext">Archbishop of Canterbury in succession
			to Nothelm. The first archbishop not buried in St. Augustine's,
			<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> II, 3, p. <a class="tei tei-ref pginternal" href="#Pg090">90</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1067" id="note_1067" class="pginternal">1067.</a></dt>
			<dd class="tei tei-notetext">Bishop of Lindisfarne in succession to
			Ethelwald (<a class="tei tei-ref pginternal" href="#Book_V_Chap_XII">V,
			12</a>, <span class="tei tei-hi"><span style="font-style: italic">ad fin.</span></span>, note).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1068" id="note_1068" class="pginternal">1068.</a></dt>
			<dd class="tei tei-notetext">Probably a son of that Eadwulf who
			usurped the throne of Northumbria at Aldfrid's death (<a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">V, 18</a>); cf. Simeon of
			Durham, II, 38 (Rolls Series), <span class="tei tei-q">“Arwine
			filius Eadulfi.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1069" id="note_1069" class="pginternal">1069.</a></dt>
			<dd class="tei tei-notetext">Not known.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1070" id="note_1070" class="pginternal">1070.</a></dt>
			<dd class="tei tei-notetext">Charles Martel.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1071" id="note_1071" class="pginternal">1071.</a></dt>
			<dd class="tei tei-notetext">Pippin the Short. Carloman resigned in
			747, and became a monk.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1072" id="note_1072" class="pginternal">1072.</a></dt>
			<dd class="tei tei-notetext">There is a letter of Boniface
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Haddan and Stubbs III, 358)
			to a priest, Herefrid, who is supposed to be the man mentioned
			here.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1073" id="note_1073" class="pginternal">1073.</a></dt>
			<dd class="tei tei-notetext">This seems confused and obscure. The
			West Saxons under Cuthred threw off the Mercian yoke in the
			insurrection which culminated in the battle of Burford
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> V. 23, p. <a class="tei tei-ref pginternal" href="#Pg380">380</a>, note 9). Oengus or Angus (the
			Brythonic form is Ungust), son of Fergus, was a Pictish king who
			crushed the Dalriadic Scots, and, in alliance with Eadbert of
			Northumbria, conquered the Britons of Strathclyde. But this does
			not explain the strange statement which brings him into connection
			with Ethelbald of Mercia. Nor is it told who Eanred was. Theudor
			was a king of the Britons of Strathclyde. Kyle is a district in
			Ayrshire.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1074" id="note_1074" class="pginternal">1074.</a></dt>
			<dd class="tei tei-notetext">Adopting the emendation <span class="tei tei-q">“quinto Idus”</span> (Hussey). The date is thus right
			for the eclipses, but the year is the sixteenth of Eadbert.
			Probably the numeral (XVI) has fallen out, and the passage ought to
			run: <span class="tei tei-q">“anno regni Eadbercti XVI, quinto Id.
			Ian.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1075" id="note_1075" class="pginternal">1075.</a></dt>
			<dd class="tei tei-notetext">The great missionary bishop of
			Germany, a West Saxon by birth. He crossed to the Continent
			<span class="tei tei-hi"><span style="font-style: italic">circ.</span></span> 716, and, supported by
			Charles Martel and his sons, evangelized Central Europe, became
			Archbishop of Mainz, and founded sees throughout Germany. Finally
			he was martyred in Frisland. Lul, a West Saxon, was his successor,
			not Redger, but it has been suggested that this may be another name
			for him. The pope is Stephen III.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1076" id="note_1076" class="pginternal">1076.</a></dt>
			<dd class="tei tei-notetext">He is said by William of Malmesbury to
			have been the murderer of Ethelbald. After a year of anarchy Offa
			succeeded, and retrieved the position of Mercia.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1077" id="note_1077" class="pginternal">1077.</a></dt>
			<dd class="tei tei-notetext">He was killed in an insurrection in
			784. (Sax. Chron.)</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1078" id="note_1078" class="pginternal">1078.</a></dt>
			<dd class="tei tei-notetext">St. Matt. xi, 12. After Eadbert,
			Northumbria fell into a state of anarchy, obscure kings contending
			for the throne.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1079" id="note_1079" class="pginternal">1079.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">supra,
			sub</span></span> 750.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1080" id="note_1080" class="pginternal">1080.</a></dt>
			<dd class="tei tei-notetext">An aetheling killed by Moll, king of
			Northumbria, at a place called Edwin's Cliff (Sax. Chron.).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_1081" id="note_1081" class="pginternal">1081.</a></dt>
			<dd class="tei tei-notetext">Of Northumbria.</dd>
			</dl>
