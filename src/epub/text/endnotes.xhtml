			<a class="tei tei-ref pginternal" href="#Preface">Preface</a>, p. <a class="tei tei-ref pginternal" href="#Pg002">2</a>, note 2; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_I">IV, 1</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_VIII">V, 8</a>, <span class="tei tei-hi"><span style="font-style: italic">et
			saep.</span></span>; and for Bertwald, V, 8. Cuthbert (740-758) was
			the first archbishop buried in Christ Church, Canterbury, instead
			of at St. Augustine's.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_182" id="note_182" class="pginternal">182.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XXVII">I, 27</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			init.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_183" id="note_183" class="pginternal">183.</a></dt>
			<dd class="tei tei-notetext">Bede thus distinguishes them from the
			colony in Scotland. Cf. <a class="tei tei-ref pginternal" href="#Book_I_Chap_I">I, 1</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_184" id="note_184" class="pginternal">184.</a></dt>
			<dd class="tei tei-notetext">Ireland. Iona may be included, as may
			be inferred from a comparison of <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXI">III, 21</a> (<span class="tei tei-q">“reversus
			est ad insulam Hii”</span>) with <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">III, 24</a> (<span class="tei tei-q">“ad
			Scottiam rediit”</span>). But Bede does not use <span class="tei tei-q">“Scottia”</span> for Scotland.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_185" id="note_185" class="pginternal">185.</a></dt>
			<dd class="tei tei-notetext">Bishop of Inver Daeile (Ennereilly) in
			Wicklow.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_186" id="note_186" class="pginternal">186.</a></dt>
			<dd class="tei tei-notetext">The most famous of the great Irish
			missionaries who laboured on the Continent. He was born in Leinster
			about 540, went to Gaul about 574, founded three monasteries
			(Annegray, Luxeuil, and Fontaines), worked for twenty years among
			the Franks and Burgundians, afterwards among the Suevi and
			Alemanni, and finally in Italy, where he founded a monastery at
			Bobbio and died there in 615. He was a vigorous supporter of the
			Celtic usages and an active opponent of Arianism. He instituted a
			monastic rule of great severity.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_187" id="note_187" class="pginternal">187.</a></dt>
			<dd class="tei tei-notetext">Nothing more is known of this council.
			The pope was Boniface IV, 608-615.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_188" id="note_188" class="pginternal">188.</a></dt>
			<dd class="tei tei-notetext">610 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_189" id="note_189" class="pginternal">189.</a></dt>
			<dd class="tei tei-notetext">To commemorate the dedication the pope
			introduced into the Western Church the Festival of All Saints,
			celebrated at first probably on 13th May. The Eastern Church had
			from early times observed a Festival of All Martyrs, which became
			later the Festival of All Saints, kept by them on the Sunday after
			Whitsunday.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_190" id="note_190" class="pginternal">190.</a></dt>
			<dd class="tei tei-notetext">As Bretwalda, or paramount sovereign
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Stubbs, <span class="tei tei-q">“Constitutional History,”</span> I, pp. 162-163). Aelli
			and Ceaulin are not elsewhere mentioned in this work. For Redwald,
			<span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span> c. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XII">12</a>; for Edwin, c. <a class="tei tei-ref pginternal" href="#Book_II_Chap_IX">9</a>, foll.; for Oswald, <a class="tei tei-ref pginternal" href="#Book_III_Chap_I">III, 1</a>, foll.; and for
			Oswy, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIV">III, 14</a>,

			<dt class="tei tei-notelabel"><a href="#noteref_191" id="note_191" class="pginternal">191.</a></dt>

			<dt class="tei tei-notelabel"><a href="#noteref_192" id="note_192" class="pginternal">192.</a></dt>
			<dd class="tei tei-notetext">This is inaccurate and inconsistent
			with Bede's own statement in <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">V. 24</a>. Augustine did not arrive in Britain till
			597. The dates given above, at the beginning of this chapter, are,
			however, probably correct, if he means that Ethelbert died
			twenty-one years after the dispatch of the mission from Rome.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_193" id="note_193" class="pginternal">193.</a></dt>
			<dd class="tei tei-notetext">The Witenagemot, the supreme assembly.
			This is the first recorded instance of its legislative action. The
			<span class="tei tei-q">“decisions”</span> are the so-called
			<span class="tei tei-q">“dooms.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_194" id="note_194" class="pginternal">194.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“—ing”</span>

			<dt class="tei tei-notelabel"><a href="#noteref_195" id="note_195" class="pginternal">195.</a></dt>
			<dd class="tei tei-notetext">It was Ethelbert's second wife. Bertha
			had died before him.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_196" id="note_196" class="pginternal">196.</a></dt>
			<dd class="tei tei-notetext">Or Gewissae. The West Saxons, an
			antiquated term for them. Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">III, 7</a>: <span class="tei tei-q">“Occidentalium
			Saxonum, qui antiquitus Gewissae vocabantur”</span> (cf.
			<span class="tei tei-q">“visi”</span> = west, in <span class="tei tei-q">“Visigoth”</span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_197" id="note_197" class="pginternal">197.</a></dt>
			<dd class="tei tei-notetext">At Canterbury, to the east of the
			church of SS. Peter and Paul, to which it was afterwards
			joined.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_198" id="note_198" class="pginternal">198.</a></dt>
			<dd class="tei tei-notetext">619 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_199" id="note_199" class="pginternal">199.</a></dt>
			<dd class="tei tei-notetext">Boniface V.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_200" id="note_200" class="pginternal">200.</a></dt>
			<dd class="tei tei-notetext">Their names are said to have been:
			Severus, Severianus, Victorinus, and Carpophorus (v. addition to
			Bede's Martyrology at 8th November). They suffered martyrdom at
			Rome in the Diocletian persecution. A church was erected in their
			honour on the Coelian, and on its site stands the present church of
			the Santi Quattro Coronati.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_201" id="note_201" class="pginternal">201.</a></dt>
			<dd class="tei tei-notetext">St. Matt., xxviii, 20.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_202" id="note_202" class="pginternal">202.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, the reward is bestowed on
			that gift of faithful and successful service which he might hand on
			in its results to posterity. But the text is probably corrupt, and
			it is difficult to extract sense from it.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_203" id="note_203" class="pginternal">203.</a></dt>
			<dd class="tei tei-notetext">St. Matt., x, 22.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_204" id="note_204" class="pginternal">204.</a></dt>
			<dd class="tei tei-notetext">He means Eadbald.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_205" id="note_205" class="pginternal">205.</a></dt>
			<dd class="tei tei-notetext">Ps. xix, 4.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_206" id="note_206" class="pginternal">206.</a></dt>
			<dd class="tei tei-notetext">Cf. c. 5, p. <a class="tei tei-ref pginternal" href="#Pg094">94</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_207" id="note_207" class="pginternal">207.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_I_Chap_XXIX">I, 29</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_208" id="note_208" class="pginternal">208.</a></dt>
			<dd class="tei tei-notetext">Except Kent. Cf. <span class="tei tei-hi"><span style="font-style: italic">supra</span></span>,
			c. <a class="tei tei-ref pginternal" href="#Book_II_Chap_V">5</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_209" id="note_209" class="pginternal">209.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_210" id="note_210" class="pginternal">210.</a></dt>
			<dd class="tei tei-notetext">A term of endearment.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_211" id="note_211" class="pginternal">211.</a></dt>
			<dd class="tei tei-notetext">2 Cor., xi, 2.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_212" id="note_212" class="pginternal">212.</a></dt>
			<dd class="tei tei-notetext">2 Cor., iv, 4.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_213" id="note_213" class="pginternal">213.</a></dt>
			<dd class="tei tei-notetext">Apparently joint king with his father,
			Cynegils (<a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">III,
			7</a>). The hegemony which the West-Saxon Ceaulin had possessed
			(<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_II_Chap_V">5</a>) had passed to
			Northumbria.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_214" id="note_214" class="pginternal">214.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, Easter Eve, April 19th,
			626.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_215" id="note_215" class="pginternal">215.</a></dt>
			<dd class="tei tei-notetext">Supposed to be at Aldby, near Stamford
			Bridge, but other conjectures have been advanced.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_216" id="note_216" class="pginternal">216.</a></dt>
			<dd class="tei tei-notetext">Twelve in some MSS. and in <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">V, 24</a>. The baptism was
			on the Eve of Whitsunday (cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">V. 24</a>, <span class="tei tei-q">“in Sabbato
			Pentecostes”</span>). The Eves of Easter and Whitsunday were usual
			days for baptisms; the Roman Church tried to limit them to these
			seasons, but Christmas and Epiphany were also favourite times.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_217" id="note_217" class="pginternal">217.</a></dt>
			<dd class="tei tei-notetext">Boniface V, unless, as Dr. Bright
			suggests, the name is a scribe's error for Honorius, his successor.
			Boniface V died in October, 625. Paulinus had only been consecrated
			in the preceding July, so it is impossible that Boniface could have
			heard of Edwin's delay in receiving the faith; <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			following letter (c. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XI">11</a>). But there is a reference in the same letter
			to Eadbald's conversion, the news of which must have come in the
			time of Boniface rather than of Honorius. The difficulty is not
			cleared up.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_218" id="note_218" class="pginternal">218.</a></dt>
			<dd class="tei tei-notetext">Reading <span class="tei tei-q">“profert”</span> for the impossible <span class="tei tei-q">“proferetur.”</span> The style of this letter is very
			involved and there seems to be a good deal of corruption in the
			text.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_219" id="note_219" class="pginternal">219.</a></dt>
			<dd class="tei tei-notetext">Adopting the conjecture <span class="tei tei-q">“propinemus.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_220" id="note_220" class="pginternal">220.</a></dt>
			<dd class="tei tei-notetext">The MSS. reading (<span class="tei tei-q">“totius creaturae suae dilatandi subdi”</span>) yields
			no sense here, but no satisfactory conjecture has been made.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_221" id="note_221" class="pginternal">221.</a></dt>
			<dd class="tei tei-notetext">From the Vulgate, Ps. xcv, 5 (Ps.
			xcvi, 5 in our Psalter).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_222" id="note_222" class="pginternal">222.</a></dt>
			<dd class="tei tei-notetext">Ps. cxiii, 5-8 (cxv in our
			Psalter).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_223" id="note_223" class="pginternal">223.</a></dt>
			<dd class="tei tei-notetext">Gen., ii, 24; St. Matt., xix, 5; St.
			Mark, x, 7; Eph., v, 31.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_224" id="note_224" class="pginternal">224.</a></dt>
			<dd class="tei tei-notetext">1 Cor., vii, 14, cf. 16.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_225" id="note_225" class="pginternal">225.</a></dt>
			<dd class="tei tei-notetext">Reading <span class="tei tei-q">“conversione.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_226" id="note_226" class="pginternal">226.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, of East Anglia (Norfolk,
			Suffolk, and Cambridgeshire). Cf. c. <a class="tei tei-ref pginternal" href="#Book_II_Chap_V">5</a>, <span class="tei tei-hi"><span style="font-style: italic">ad init.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_227" id="note_227" class="pginternal">227.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_I_Chap_XXXIV">I, 34</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_228" id="note_228" class="pginternal">228.</a></dt>
			<dd class="tei tei-notetext">Cf. Verg. Aen., IV, 2, <span class="tei tei-q">“caeco carpitur igni.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_229" id="note_229" class="pginternal">229.</a></dt>
			<dd class="tei tei-notetext">A tributary of the Trent. The battle
			is supposed to have been fought near Retford, in Nottinghamshire,
			before April 12th, 617. Cf. Bede's statement that Edwin was
			baptized on April 12th, 627, in the eleventh year of his reign (c.
			<a class="tei tei-ref pginternal" href="#Book_II_Chap_XIV">14</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_230" id="note_230" class="pginternal">230.</a></dt>
			<dd class="tei tei-notetext">The Witenagemot.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_231" id="note_231" class="pginternal">231.</a></dt>
			<dd class="tei tei-notetext">Goodmanham, near Market Weighton, in
			the East Riding of Yorkshire.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_232" id="note_232" class="pginternal">232.</a></dt>
			<dd class="tei tei-notetext">Cf. Verg. Aen., II. 502.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_233" id="note_233" class="pginternal">233.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, Easter Eve. Cf. c. 9, p.
			<a class="tei tei-ref pginternal" href="#Pg104">104</a>, note 3.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_234" id="note_234" class="pginternal">234.</a></dt>
			<dd class="tei tei-notetext">On the site now covered by York
			Cathedral. The little wooden oratory was carefully preserved and
			adorned with gifts. The church has been repeatedly rebuilt, and of
			the Saxon building nothing remains but the central wall of the
			crypt.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_235" id="note_235" class="pginternal">235.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">infra</span></span>
			c. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XX">20</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_236" id="note_236" class="pginternal">236.</a></dt>
			<dd class="tei tei-notetext">The newly-baptized wore white garments
			till the octave of the day of their baptism, and appeared in church
			daily with lighted tapers and accompanied by their sponsors.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_237" id="note_237" class="pginternal">237.</a></dt>
			<dd class="tei tei-notetext">For Wuscfrea and Yffi, <span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span> c. 20, p. <a class="tei tei-ref pginternal" href="#Pg132">132</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_238" id="note_238" class="pginternal">238.</a></dt>
			<dd class="tei tei-notetext">Yeavering in Glendale, near Wooler in
			Northumberland. The name, Adgefrin, is one of those (common in
			Anglo-Saxon) in which the preposition is prefixed. <span class="tei tei-q">“Æt”</span> (Latin <span class="tei tei-foreign" lang="la"><span style="font-style: italic">ad</span></span>) and <span class="tei tei-q">“in”</span> are so used. The idiom is preserved in the
			Latin. Cf. Ad Murum, Ad Caprae Caput (III, 21), Infeppingum
			<span class="tei tei-hi"><span style="font-style: italic">(ibid.),
			et saep.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_239" id="note_239" class="pginternal">239.</a></dt>
			<dd class="tei tei-notetext">The stream, in its upper reaches
			called the Bowmont Water, is still called the Glen at Yeavering. It
			is a tributary of the Till. Pallinsburn, in the neighbourhood of
			Coldstream, preserves by its name the memory of similar baptisms by
			Paulinus.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_240" id="note_240" class="pginternal">240.</a></dt>
			<dd class="tei tei-notetext">Perhaps Millfield, near Wooler; but
			Mindrum and Kirknewton in the same district have also been
			suggested.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_241" id="note_241" class="pginternal">241.</a></dt>
			<dd class="tei tei-notetext">Catterick Bridge (the Roman station
			Cataractonium, on the Watling Street), near Richmond in the North
			Riding of Yorkshire.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_242" id="note_242" class="pginternal">242.</a></dt>
			<dd class="tei tei-notetext">Perhaps Doncaster. Other suggestions
			are Slack, near Huddersfield, and Tanfield, near Ripon. The
			Anglo-Saxon version has Donafeld.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_243" id="note_243" class="pginternal">243.</a></dt>
			<dd class="tei tei-notetext">Leeds. The royal township
			(<span class="tei tei-foreign"><span style="font-style: italic">villa</span></span>) is said to have been at
			Oswinthorp.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_244" id="note_244" class="pginternal">244.</a></dt>
			<dd class="tei tei-notetext">Elmet Wood, near Leeds.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_245" id="note_245" class="pginternal">245.</a></dt>
			<dd class="tei tei-notetext">Cf. IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVII">17</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIII">23</a>. His father was Ethelhere, King of East Anglia
			(<a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">III,
			24</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_246" id="note_246" class="pginternal">246.</a></dt>
			<dd class="tei tei-notetext">For the patronymic, cf. <span class="tei tei-hi"><span style="font-style: italic">supra</span></span>
			c. 5, p. <a class="tei tei-ref pginternal" href="#Pg095">95</a>, and
			note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_247" id="note_247" class="pginternal">247.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XVIII">III, 18</a>. He was Earpwald's half-brother,
			and had been driven into exile by his step-father, Redwald. Besides
			becoming a Christian, he had acquired a taste for secular learning
			in the ecclesiastical schools of Gaul.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_248" id="note_248" class="pginternal">248.</a></dt>
			<dd class="tei tei-notetext">Cf. III, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XVIII">18</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XX">20</a>. <span class="tei tei-q">“An important feature of this mission, as it was of the
			Kentish, was the combination of education with religion, by means
			of a school such as Sigbert had seen abroad, and as by this time
			existed at Canterbury in connection with the house of SS. Peter and
			Paul”</span> (Bright, p. 143). The name of Felix is preserved in
			Felixstowe, on the coast of Suffolk, and in Feliskirk, a Yorkshire
			village.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_249" id="note_249" class="pginternal">249.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Infra</span></span> cc. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XVI">16</a>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_XVIII">18</a>, <span class="tei tei-hi"><span style="font-style: italic">et
			saep.</span></span> He was a disciple of Pope Gregory, <span class="tei tei-q">“vir in rebus ecclesiasticis sublimiter
			institutus”</span> (<a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">V, 19</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_250" id="note_250" class="pginternal">250.</a></dt>
			<dd class="tei tei-notetext">Dunwich, on the coast of Suffolk, once
			an important town, afterwards partially submerged. The diocese was
			divided into two by Theodore, and both sees became extinct during
			the Danish invasions. After various vicissitudes, the seat of the
			East Anglian bishopric was established at Norwich. Cf. IV, 5, p.
			<a class="tei tei-ref pginternal" href="#Pg231">231</a>, note 1.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_251" id="note_251" class="pginternal">251.</a></dt>
			<dd class="tei tei-notetext">Lindsey, the largest of the three
			divisions of Lincolnshire, was at times Mercian, at times
			Northumbrian. At this time it appears to have been dependent on
			Northumbria; cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">IV, 12</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_252" id="note_252" class="pginternal">252.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">infra</span></span>
			c. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XVIII">18</a>,
			<span class="tei tei-hi"><span style="font-style: italic">ad
			init.</span></span> The church which stands on the probable site of
			this church is called St. Paul's. The name has been supposed to be
			a corruption of <span class="tei tei-q">“Paulinus.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_253" id="note_253" class="pginternal">253.</a></dt>
			<dd class="tei tei-notetext">Partney, in Lincolnshire; afterwards
			it became a cell of Bardney Abbey.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_254" id="note_254" class="pginternal">254.</a></dt>
			<dd class="tei tei-notetext">The place cannot be identified with
			certainty. Torksey, Southwell, Newark, Fiskerton, and Littleborough
			have all been suggested.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_255" id="note_255" class="pginternal">255.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">infra</span></span>
			c. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XX">20</a>,
			<span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_256" id="note_256" class="pginternal">256.</a></dt>
			<dd class="tei tei-notetext">A form of standard adopted from the
			Romans. It was made of feathers attached to a spear.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_257" id="note_257" class="pginternal">257.</a></dt>
			<dd class="tei tei-notetext">Cf. the instructions of Gregory:
			<a class="tei tei-ref pginternal" href="#Book_I_Chap_XXIX">I, 29</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_258" id="note_258" class="pginternal">258.</a></dt>
			<dd class="tei tei-notetext">Bede does not mention the year of his
			death. The Saxon Chronicle places it in 627, and this is supported
			by William of Malmesbury. Smith places it in 630.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_259" id="note_259" class="pginternal">259.</a></dt>
			<dd class="tei tei-notetext">St. Matt., xi, 28.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_260" id="note_260" class="pginternal">260.</a></dt>
			<dd class="tei tei-notetext">St. Matt., xxv, 21.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_261" id="note_261" class="pginternal">261.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, the kings of Northumbria
			and Kent. For similar combined action on the part of a Northumbrian
			and a Kentish king, cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIX">III, 29</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_262" id="note_262" class="pginternal">262.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, Heracleonas, son of
			Heraclius and half-brother of Constantine III; associated with them
			in the Empire.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_263" id="note_263" class="pginternal">263.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, Irish. For their error
			with regard to Easter, <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_II_Chap_IV">4</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_264" id="note_264" class="pginternal">264.</a></dt>
			<dd class="tei tei-notetext">John IV, consecrated December 25th,
			640. Severinus was Pope for a few months only. Apparently (cf.
			<span class="tei tei-hi"><span style="font-style: italic">infra</span></span>) the Irish ecclesiastics
			had consulted him about the Easter question.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_265" id="note_265" class="pginternal">265.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">supra</span></span>
			c. 2, p. <a class="tei tei-ref pginternal" href="#Pg084">84</a>, note. On the
			Paschal question the Council of Nicaea passed no canon, but the
			understanding was established that <span class="tei tei-q">“all the
			brethren in the East, who formerly celebrated Easter with the Jews,
			will henceforth keep it agreeably with the Romans and ourselves and
			all who from ancient time have kept Easter as we”</span>;
			<span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>, that they should all keep
			Easter on the first day of the week, but never on the 14th of the
			month Nisan, even when it fell on a Sunday. The object of the rule
			was to avoid the day of the Jewish Passover.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_266" id="note_266" class="pginternal">266.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_I_Chap_X">I, 10</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_267" id="note_267" class="pginternal">267.</a></dt>
			<dd class="tei tei-notetext">These bishops have been identified as
			follows: Tomianus is Tomene, Abbot and Bishop of Armagh; Columbanus
			is Colman, Abbot of Clonard (also a bishop); Cromanus is Cronan,
			Bishop of Nendrum, or Inishmahee; Dinnaus is probably Dima, Bishop
			of Connor; Baithanus has not been identified with any certainty.
			With regard to the priests the proposed identifications are more
			conjectural. Saranus is a certain Saran Ua Critain. Two
			vice-gerents of the Papal see are associated with the Pope elect in
			writing this letter. The arch-presbyter and the <span class="tei tei-q">“primicerius notariorum,”</span> with the archdeacon,
			acted as vice-gerents during a vacancy, or in the absence of the
			Pope (cf. Plummer <span class="tei tei-hi"><span style="font-style: italic">ad loc.</span></span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_268" id="note_268" class="pginternal">268.</a></dt>
			<dd class="tei tei-notetext">This is not fairly stated. The Irish
			were not <span class="tei tei-q">“Quartodecimans,”</span>
			<span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>, did not insist on the
			celebration of Easter being on the fourteenth of the moon. They
			only included that day as a possible one for Easter (cf.
			<span class="tei tei-hi"><span style="font-style: italic">supra</span></span> c. 2, p. <a class="tei tei-ref pginternal" href="#Pg084">84</a>, note 3).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_269" id="note_269" class="pginternal">269.</a></dt>
			<dd class="tei tei-notetext">Ps. li, 5, in our Psalter. The
			quotation is partly from the Vulgate, partly from the <span class="tei tei-q">“Roman”</span> Psalter, <span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>,
			Jerome's revision of the old Italic version.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_270" id="note_270" class="pginternal">270.</a></dt>
			<dd class="tei tei-notetext">Or Cadwallon, King of Gwynedd, in
			North Wales. His father Cadvan, had sheltered Edwin during his
			exile. Afterwards, when Cadwallon invaded Northumbria, Edwin
			defeated him and drove him from his kingdom. Having regained it,
			Cadwallon now allied himself with Penda, king of the Mercians (626-
			or 627-655) in a successful attempt to shake off the Northumbrian
			supremacy.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_271" id="note_271" class="pginternal">271.</a></dt>
			<dd class="tei tei-notetext">Generally identified with Hatfield
			Chase, north-east of Doncaster.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_272" id="note_272" class="pginternal">272.</a></dt>
			<dd class="tei tei-notetext">C. 14, p. <a class="tei tei-ref pginternal" href="#Pg119">119</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_273" id="note_273" class="pginternal">273.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_274" id="note_274" class="pginternal">274.</a></dt>
			<dd class="tei tei-notetext">His body was ultimately buried at
			Whitby; cf. III, 24, p. <a class="tei tei-ref pginternal" href="#Pg190">190</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_275" id="note_275" class="pginternal">275.</a></dt>
			<dd class="tei tei-notetext">For Eanfled, <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c.
			<a class="tei tei-ref pginternal" href="#Book_II_Chap_IX">9</a>. For Yffi and
			Wuscfrea, c. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XIV">14</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_276" id="note_276" class="pginternal">276.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_II_Chap_V">5</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_277" id="note_277" class="pginternal">277.</a></dt>
			<dd class="tei tei-notetext">He was a kinsman. Ethelberg's mother,
			Bertha, was a daughter of Charibert, King of Paris (cf. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XXV">I, 25</a>, note). His
			brother, Chilperic, was Dagobert's grandfather.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_278" id="note_278" class="pginternal">278.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_II_Chap_VIII">8</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_279" id="note_279" class="pginternal">279.</a></dt>
			<dd class="tei tei-notetext">C. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XVI">16</a>, and <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">III, 25</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_280" id="note_280" class="pginternal">280.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XIV">14</a>. The village cannot be identified.
			Akeburgh has been suggested, the name being regarded as a
			corruption of <span class="tei tei-q">“Jacobsburgh.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_281" id="note_281" class="pginternal">281.</a></dt>
			<dd class="tei tei-notetext">The <span class="tei tei-q">“Cantus
			Romanus,”</span> brought to England by the Roman mission;
			<span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>, the style of Church music
			according to the use of Rome. The theory that Gregory the Great was
			the founder of Gregorian music, which superseded the old
			<span class="tei tei-q">“Cantus Ambrosianus”</span> everywhere in
			the West except at Milan, must in all probability be abandoned. It
			seems to be established that no change of any importance was made
			till nearly a hundred years after Gregory's time, and <span class="tei tei-q">“the terms <span class="tei tei-q">‘Gregorianus,’</span> <span class="tei tei-q">‘Ambrosianus Cantus,’</span> probably mean nothing more
			than the style of singing according to the respective uses of Rome
			and Milan.”</span> (F. Homes Dudden, <span class="tei tei-q">“Gregory the Great,”</span> I, p. 274.)</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_282" id="note_282" class="pginternal">282.</a></dt>
			<dd class="tei tei-notetext">Cf. II, 1, p. <a class="tei tei-ref pginternal" href="#Pg082">82</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_283" id="note_283" class="pginternal">283.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_I_Chap_XXXIV">I, 34</a>; II, <a class="tei tei-ref pginternal" href="#Book_II_Chap_II">2</a>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_XII">12</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_284" id="note_284" class="pginternal">284.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, Osric and Eanfrid.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_285" id="note_285" class="pginternal">285.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XX">II, 20</a>, <span class="tei tei-hi"><span style="font-style: italic">ad init.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_286" id="note_286" class="pginternal">286.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“In oppido
			municipio.”</span> Commentators are agreed that Bede means York. It
			was a Roman <span class="tei tei-q">“Colonia,”</span> and is called
			a <span class="tei tei-q">“municipium”</span> by Aurelius Victor,
			though whether Bede attaches any definitely Roman meaning to the
			term seems doubtful. Ducange explains <span class="tei tei-q">“municipium”</span> as <span class="tei tei-q">“castrum,”</span> <span class="tei tei-q">“castellum
			muris cinctum.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_287" id="note_287" class="pginternal">287.</a></dt>
			<dd class="tei tei-notetext">From the death of Edwin (October 12th,
			633), for Oswald's reign is reckoned as lasting nine years,
			including the <span class="tei tei-q">“hateful year,”</span> and he
			was killed August 5th, 642. Cf. <span class="tei tei-hi"><span style="font-style: italic">infra</span></span>
			c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_IX">9</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_288" id="note_288" class="pginternal">288.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, probably before the end of
			634.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_289" id="note_289" class="pginternal">289.</a></dt>
			<dd class="tei tei-notetext">Not identified with any certainty, but
			probably the Rowley Water or a tributary of it. It cannot be, as
			has been suggested, the Devil's Water, which is clearly
			distinguished from it in a charter of the thirteenth century.
			Caedwalla must have fled southwards for eight or nine miles after
			the battle (cf. next note).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_290" id="note_290" class="pginternal">290.</a></dt>
			<dd class="tei tei-notetext">For another instance of a name with an
			inner meaning, cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XV">II, 15</a>. The site of the battle is probably seven
			or eight miles north of Hexham (v. next note), Oswald having taken
			up his position on the northern side of the Roman wall between the
			Tyne and the Solway (<span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>, the wall attributed to
			Hadrian, cf. I, 12, p. <a class="tei tei-ref pginternal" href="#Pg025">25</a>,
			note). According to tradition the battle was finally won at a place
			called Halydene (Hallington?), two miles to the east.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_291" id="note_291" class="pginternal">291.</a></dt>
			<dd class="tei tei-notetext">Hexham. Wilfrid built a magnificent
			church there between the years 672-678 on land given by
			Ethelthryth, wife of Egfrid, king of Northumbria. It became the see
			of a bishop in 678 when the great northern diocese was subdivided
			by Theodore (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">IV, 12</a>). Bede's own monastery of Wearmouth
			and Jarrow was in the diocese of Hexham. The bishopric became
			extinct in 821.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_292" id="note_292" class="pginternal">292.</a></dt>
			<dd class="tei tei-notetext">The place is still called St.
			Oswald's, and a little chapel probably marks the spot.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_293" id="note_293" class="pginternal">293.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, Irish.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_294" id="note_294" class="pginternal">294.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_II">II, 2</a>, note on Paschal Controversy.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_295" id="note_295" class="pginternal">295.</a></dt>
			<dd class="tei tei-notetext">Bishop of Laodicea, <span class="tei tei-hi"><span style="font-style: italic">circ.</span></span>
			284 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span> According to
			Eusebius, he was the first to arrange the cycle of nineteen years.
			The Canon quoted by the Celts in support of their observance of
			Easter is proved to be a forgery, probably of the seventh century
			and of British origin.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_296" id="note_296" class="pginternal">296.</a></dt>
			<dd class="tei tei-notetext">Probably they adopted Catholic customs
			about 633, after the return of their delegates sent to consult the
			Roman Church on this question in 631.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_297" id="note_297" class="pginternal">297.</a></dt>
			<dd class="tei tei-notetext">Cf. Preface, p. <a class="tei tei-ref pginternal" href="#Pg004">4</a>, note 3. The Celtic missionaries were
			generally attracted to remote sites, and this, the first mission
			station of the Celtic Church in Northumbria, was doubtless chosen
			for the resemblance of its physical features to Iona. The
			constitution was also modelled on that of Iona, with this
			difference, that it was an episcopal see as well as a monastery. It
			was included in the <span class="tei tei-q">“province”</span> of
			the Abbot of Iona. The Bishop and all the clergy were monks, and
			Aidan himself was Abbot as well as Bishop.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_298" id="note_298" class="pginternal">298.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“Sacerdotali,”</span> perhaps (but not necessarily
			here) = <span class="tei tei-q">“episcopal,”</span> as often. There
			may have been a number of the Irish non-diocesan bishops in the
			mission.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_299" id="note_299" class="pginternal">299.</a></dt>
			<dd class="tei tei-notetext">Iona, a name supposed to have arisen
			from a mistaken reading of <span class="tei tei-foreign"><span style="font-style: italic">Ioua</span></span>, an adjectival form used by
			Adamnan (<span class="tei tei-hi"><span style="font-style: italic">v. infra</span></span> note 4), feminine,
			agreeing with <span class="tei tei-foreign"><span style="font-style: italic">insula</span></span>, formed from the Irish
			name, I, Ii, Hii, etc. (the forms vary greatly). Then <span class="tei tei-q">“Iona”</span> was fancifully regarded as the Hebrew
			equivalent for <span class="tei tei-foreign"><span style="font-style: italic">Columba</span></span> (= a dove), and this
			helped to preserve the name.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_300" id="note_300" class="pginternal">300.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, Irish.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_301" id="note_301" class="pginternal">301.</a></dt>
			<dd class="tei tei-notetext">For St. Columba, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Dr.
			Reeves's edition of the life by Adamnan, Abbot of Iona, 679-704
			(cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XV">V, 15</a>,
			note). Authorities are divided with regard to the date of his
			coming to Britain. Dr. Reeves and Mr. Skene, following the Annals
			of Tighernach, decide in favour of 563. For his name, <span class="tei tei-q">“Columcille,”</span> cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_IX">V, 9</a>, note. He was of Irish birth,
			connected with the Dalriadic Scots, and of royal descent on both
			sides of his house. He was ordained priest at Clonard, but was
			never a bishop. Many ecclesiastical and monastic foundations
			throughout Ireland and Scotland are attributed to him. He travelled
			much in both countries, visited Bruide (<span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span>) at Inverness, and founded churches all over
			the north of Scotland. He also worked indefatigably in his own
			monastery of Iona. In his earlier years his excitable, impatient
			temperament seems to have involved him in various wars. He is said
			to have stirred up his kinsmen against the Irish king, Diarmaid;
			and it has been supposed that his mission to the Picts was
			undertaken in expiation of the bloodshed for which he was
			responsible.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_302" id="note_302" class="pginternal">302.</a></dt>
			<dd class="tei tei-notetext">There is much that is legendary in the
			account of St. Ninias, and Bede only professes to give the
			tradition. He was a Briton, probably a native of Strathclyde. He
			studied at Rome and received episcopal consecration there; came
			under the influence of St. Martin of Tours, to whom he afterwards
			dedicated his church in Galloway, and returned as a missionary to
			Britain. His preaching led to the conversion of the Picts of
			Galloway and those to whom Bede alludes here as situated to the
			south of the Grampians. Irish tradition, difficult to reconcile
			with Bede's statement that he was buried at Whitern, tells that he
			spent the last years of his life in Ireland and founded a church at
			Leinster. He was commemorated there on September 16th, under the
			name of Moinenn. The traditional date of his death, September 16th,
			432, has no authority.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_303" id="note_303" class="pginternal">303.</a></dt>
			<dd class="tei tei-notetext">Whitern, on Wigton Bay, so called from
			the white appearance of the stone church, as compared with the
			usual wooden buildings. The dedication must have been subsequent to
			St. Martin's death, <span class="tei tei-hi"><span style="font-style: italic">circ.</span></span> 397. The see was revived
			as an Anglian one in Bede's own time (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> V.
			23, p. <a class="tei tei-ref pginternal" href="#Pg381">381</a>). For the form
			of the name, <span class="tei tei-q">“Ad Candidam Casam,”</span>
			cf. II, 14, p. <a class="tei tei-ref pginternal" href="#Pg119">119</a>, note
			5.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_304" id="note_304" class="pginternal">304.</a></dt>
			<dd class="tei tei-notetext">Bruide Mac Maelchon had defeated the
			Dalriadic Scots in 560 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span> and driven them back
			to Cantyre. Northwards his dominion extended as far as the Orkneys
			and it is probable that it included the eastern lowlands north of
			the Forth (cf. Rhŷs, <span class="tei tei-q">“Celtic
			Britain”</span>). Another tradition (Irish) represents Conall, King
			of the Dalriadic Scots, as the donor of Iona, but the earliest
			Irish authority (ninth or tenth century) agrees with Bede.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_305" id="note_305" class="pginternal">305.</a></dt>
			<dd class="tei tei-notetext">The year in which he died, as well as
			the ultimate resting-place of his relics, is uncertain. Dr. Reeves
			places his death in 597, the year of St. Augustine's landing.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_306" id="note_306" class="pginternal">306.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, in Irish. The place is
			Durrow in Leinster.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_307" id="note_307" class="pginternal">307.</a></dt>
			<dd class="tei tei-notetext">There was no diocesan episcopate in
			the early Irish Church; it was organized on a monastic system.
			Bishops performed all episcopal functions (ordination, etc.), but
			they lived in the monastery, subject to the supreme authority of
			the abbot, who was aided in the government by a council of senior
			monks. Bishops were also sent out as missionaries. The functions of
			abbot and bishop might be combined in one man, but the abbot, as
			such, could discharge no episcopal duties. A great monastery was
			head of a <span class="tei tei-q">“provincia”</span> (<span class="tei tei-q">“diocesis,”</span> <span class="tei tei-q">“parochia”</span>), and had many monasteries and
			churches dependent on it.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_308" id="note_308" class="pginternal">308.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVII">27</a>, IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_III">3</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">26</a>; V, <a class="tei tei-ref pginternal" href="#Book_V_Chap_IX">9</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_X">10</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXII">22</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIII">23</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">24</a>. Perhaps <span class="tei tei-q">“sacerdos”</span> should be translated <span class="tei tei-q">“bishop”</span> here (<span class="tei tei-hi"><span style="font-style: italic">v.
			supra</span></span> c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_III">3</a>, note; <span class="tei tei-hi"><span style="font-style: italic">infra</span></span> c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVII">27</a>, note). Early
			writers allude to him as a bishop, <span class="tei tei-hi"><span style="font-style: italic">e.g.</span></span>,
			Alcuin, Ethelwulf. In the life of St. Adalbert, one of Wilbrord's
			companions (cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_X">V.
			10</a>), he is called <span class="tei tei-q">“Northumbrorum
			episcopus.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_309" id="note_309" class="pginternal">309.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, they were not <span class="tei tei-q">“Quartodecimans”</span> (cf. II, 2, p. <a class="tei tei-ref pginternal" href="#Pg084">84</a>, note 3).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_310" id="note_310" class="pginternal">310.</a></dt>
			<dd class="tei tei-notetext">Phil., iii, 15.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_311" id="note_311" class="pginternal">311.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XIX">II, 19</a>. He is probably to be identified with the
			Segenus mentioned there as one of the priests to whom Pope John's
			letter was addressed. He was Abbot of Iona, 623-652.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_312" id="note_312" class="pginternal">312.</a></dt>
			<dd class="tei tei-notetext">Hector Boethius gives his name as
			Corman.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_313" id="note_313" class="pginternal">313.</a></dt>
			<dd class="tei tei-notetext">Cf. I, 1, p. <a class="tei tei-ref pginternal" href="#Pg006">6</a>, note 2.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_314" id="note_314" class="pginternal">314.</a></dt>
			<dd class="tei tei-notetext">Bamborough (Bebbanburh, Bebburgh,
			Babbanburch, etc. There are many forms of the name). It is
			uncertain who the queen was. Nennius says she was the wife of
			Ethelfrid. His wife, Oswald's mother, was Acha (<span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span>), but he may have been married twice. It was
			Ida, the first king of Bernicia, who founded Bamborough (Sax.
			Chron.).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_315" id="note_315" class="pginternal">315.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_V">II, 5</a> <span class="tei tei-hi"><span style="font-style: italic">ad fin.</span></span>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_316" id="note_316" class="pginternal">316.</a></dt>
			<dd class="tei tei-notetext">Cf. note on Cuichelm, <a class="tei tei-ref pginternal" href="#Book_II_Chap_IX">II, 9</a>. Cynegils began to
			reign in 611 and reigned about thirty-one years.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_317" id="note_317" class="pginternal">317.</a></dt>
			<dd class="tei tei-notetext">This account tells us substantially
			all that is known of him. Additional details are either legendary
			or conjectural. He was made a missionary (<span class="tei tei-q">“regionary”</span>) bishop, <span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>,
			had no fixed see assigned to him.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_318" id="note_318" class="pginternal">318.</a></dt>
			<dd class="tei tei-notetext">II, <a class="tei tei-ref pginternal" href="#Book_II_Chap_XVII">17</a>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_XVIII">18</a>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_XIX">19</a>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_XX">20</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_319" id="note_319" class="pginternal">319.</a></dt>
			<dd class="tei tei-notetext">He was Archbishop of Milan, residing
			at Genoa. <span class="tei tei-q">“Asterius ... like his
			predecessors from 568, avoided contact with the dominant Arian
			Lombards by residing within the imperial territory at Genoa”</span>
			(Bright).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_320" id="note_320" class="pginternal">320.</a></dt>
			<dd class="tei tei-notetext">Called Cyneburga by Reginald of Durham
			(Life of St. Oswald).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_321" id="note_321" class="pginternal">321.</a></dt>
			<dd class="tei tei-notetext">Dorchester, about nine miles from
			Oxford, near the junction of the Thame and the Thames. The Abbey
			Church of SS. Peter and Paul stands on the traditional site of
			Cynegil's baptism. The see became extinct on the retirement of
			Agilbert (<span class="tei tei-hi"><span style="font-style: italic">v. infra</span></span>), but there are some
			grounds for believing that it was revived for a short time as a
			Mercian see in 679 (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> p. <a class="tei tei-ref pginternal" href="#Pg272">272</a>, note), after which it again disappeared
			till, in the ninth century, the Bishop of Leicester moved his see
			to Dorchester.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_322" id="note_322" class="pginternal">322.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">IV, 12</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">V, 18</a>. Haedde became bishop in 676 (Sax. Chron.).
			His see was at Winchester. He removed the bones of Birinus, because
			Dorchester had ceased to be an episcopal see. Winchester continued
			to be the only West Saxon see till the diocese was again divided
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">V, 18</a>), when Daniel was established at
			Winchester, and Aldhelm at Sherborne.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_323" id="note_323" class="pginternal">323.</a></dt>
			<dd class="tei tei-notetext">Winchester; <span class="tei tei-hi"><span style="font-style: italic">Gwent</span></span>
			(Celtic) = a plain. This, the <span class="tei tei-q">“old
			Church,”</span> as distinguished from the present Cathedral, was
			built by Coinwalch on his restoration to his kingdom. There are
			legends of early British churches on the site, the first founded by
			<span class="tei tei-q">“King Lucius”</span> (<a class="tei tei-ref pginternal" href="#Book_I_Chap_IV">I, 4</a>), the second
			dedicated to <span class="tei tei-q">“St. Amphibalus”</span> (I, 7,
			p. <a class="tei tei-ref pginternal" href="#Pg015">15</a>, note).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_324" id="note_324" class="pginternal">324.</a></dt>
			<dd class="tei tei-notetext">Cuichelm (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_II_Chap_IX">II, 9</a>, and note)
			had died before his father, Cynegils.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_325" id="note_325" class="pginternal">325.</a></dt>
			<dd class="tei tei-notetext">Bede reverts more than once to the
			subject of Anna's pious offspring, <span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span> cc. <a class="tei tei-ref pginternal" href="#Book_III_Chap_VIII">8</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XVIII">18</a>; IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIX">19</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XX">20</a>. He had four daughters: Sexburg (c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_VIII">8</a>, IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIX">19</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXII">22</a>), Ethelberg (c.
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_VIII">8</a>),
			Ethelthryth (IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIX">19</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XX">20</a>; cf. IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_III">3</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXII">22</a>), and Witberg (not mentioned by Bede); two
			granddaughters, Earcongota (c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_VIII">8</a>) and Ermingild, the wife of Wulfhere of Mercia;
			all of whom entered convents, as did also his step-daughter,
			Saethryth (c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_VIII">8</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_326" id="note_326" class="pginternal">326.</a></dt>
			<dd class="tei tei-notetext">Cc. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">25</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVI">26</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVIII">28</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_I">IV, 1</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">V, 19</a>. The name is a Frankish form of the English
			<span class="tei tei-q">“Aethelbert.”</span> He was apparently
			consecrated in Gaul, but not appointed to any diocese.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_327" id="note_327" class="pginternal">327.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVIII">28</a>. It is not known why he was expelled
			(<span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span>). There is a tradition that he spent the last
			three years of his life at Winchester as a penitent, doubtless for
			the act of simony related below, but this is inconsistent with
			Bede's statement that he remained Bishop of London till his
			death.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_328" id="note_328" class="pginternal">328.</a></dt>
			<dd class="tei tei-notetext">Winchester; <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span>
			pp. <a class="tei tei-ref pginternal" href="#Pg148">148-9</a>, notes.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_329" id="note_329" class="pginternal">329.</a></dt>
			<dd class="tei tei-notetext">London was an East Saxon bishopric,
			but Wulfhere (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">24</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span>) had acquired the supremacy over the East Saxons
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXX">30</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_330" id="note_330" class="pginternal">330.</a></dt>
			<dd class="tei tei-notetext">Hlothere, consecrated 670. Apparently
			he was appointed by a West Saxon Synod (<span class="tei tei-q">“ex
			synodica sanctione”</span>). Dr. Bright thinks the term is used
			loosely for a Witenagemot.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_331" id="note_331" class="pginternal">331.</a></dt>
			<dd class="tei tei-notetext">II, <a class="tei tei-ref pginternal" href="#Book_II_Chap_V">5-9</a>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_XX">20</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">V, 24</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_332" id="note_332" class="pginternal">332.</a></dt>
			<dd class="tei tei-notetext">Faremoûtier-en-Brie (Farae Monasterium
			in Brige), founded <span class="tei tei-hi"><span style="font-style: italic">circ.</span></span> 617 by Fara, or
			Burgundofara, a Burgundian lady of noble birth, said to have been
			dedicated by St. Columba in her infancy. The monastery was a double
			one, <span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>, consisted of monks and
			nuns (cf. <span class="tei tei-hi"><span style="font-style: italic">infra</span></span>, <span class="tei tei-q">“many of the brethren”</span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_333" id="note_333" class="pginternal">333.</a></dt>
			<dd class="tei tei-notetext">Chelles, near Paris, founded by
			Clothilde, wife of Clovis I, restored and enlarged by Bathild, wife
			of Clovis II (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">V, 19</a>, note).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_334" id="note_334" class="pginternal">334.</a></dt>
			<dd class="tei tei-notetext">Andeley-sur-Seine, also founded by
			Clothilde, wife of Clovis I.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_335" id="note_335" class="pginternal">335.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">supra</span></span>
			c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">7</a>, note on
			Anna.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_336" id="note_336" class="pginternal">336.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_337" id="note_337" class="pginternal">337.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_338" id="note_338" class="pginternal">338.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_339" id="note_339" class="pginternal">339.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_I">1</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_340" id="note_340" class="pginternal">340.</a></dt>
			<dd class="tei tei-notetext">The place is commonly supposed to be
			near Oswestry in Shropshire (<span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>, Oswald's Tree). There is a
			legend (related by Reginald) which tells of a tree near the spot,
			to which a large bird carried the king's right arm from the stake
			(cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XII">12</a>
			<span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span>). The Welsh name of the place, <span class="tei tei-q">“Croes Oswallt”</span> (Cross-Oswald), points to the
			explanation that the <span class="tei tei-q">“tree”</span> was a
			wooden cross set up to mark the site.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_341" id="note_341" class="pginternal">341.</a></dt>
			<dd class="tei tei-notetext">642, <span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>,
			nine years after the death of Edwin.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_342" id="note_342" class="pginternal">342.</a></dt>
			<dd class="tei tei-notetext">Reading <span class="tei tei-foreign"><span style="font-style: italic">stramine
			subtracto</span></span>, on the authority of the oldest MSS., in
			which case we must assume (with Plummer) that <span class="tei tei-foreign"><span style="font-style: italic">stramen</span></span> is used incorrectly for
			<span class="tei tei-foreign"><span style="font-style: italic">stragulus</span></span> in the sense of
			<span class="tei tei-q">“saddle,”</span> or <span class="tei tei-q">“horse-cloth,”</span> from the classical use,
			<span class="tei tei-foreign"><span style="font-style: italic">sternere equum</span></span> = to saddle. Cf.
			<span class="tei tei-q">“stratus regaliter,”</span> c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIV">14</a>. Later MSS. read
			<span class="tei tei-foreign"><span style="font-style: italic">stramine substrato</span></span> (=
			<span class="tei tei-q">“spreading straw under him”</span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_343" id="note_343" class="pginternal">343.</a></dt>
			<dd class="tei tei-notetext">Wife of Ethelred of Mercia (cf.
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXI">IV, 21</a>),
			murdered by her own people in 697 (<a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">V, 24</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_344" id="note_344" class="pginternal">344.</a></dt>
			<dd class="tei tei-notetext">Bardney, in Lincolnshire. Ethelred
			became first a monk, afterwards abbot of the monastery.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_345" id="note_345" class="pginternal">345.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“Sacrarium.”</span> Probably here = the cemetery. But
			we find it elsewhere in Bede for the sacristy, and it is also used
			of the sanctuary.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_346" id="note_346" class="pginternal">346.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVII">27</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">IV, 12</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_347" id="note_347" class="pginternal">347.</a></dt>
			<dd class="tei tei-notetext">Partney: cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XVI">II, 16</a>, and note. This
			is the only mention of its abbot, Aldwin.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_348" id="note_348" class="pginternal">348.</a></dt>
			<dd class="tei tei-notetext">Aen. II, 1. Quotations from Vergil are
			frequent in Bede. Cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XIII">II, 13</a>, <span class="tei tei-hi"><span style="font-style: italic">ad fin.</span></span>; v. 12, p. <a class="tei tei-ref pginternal" href="#Pg327">327</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_349" id="note_349" class="pginternal">349.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, matins (between midnight
			and 3 <span class="tei tei-hi"><span style="font-variant: small-caps">a.m.</span></span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_350" id="note_350" class="pginternal">350.</a></dt>
			<dd class="tei tei-notetext">It was removed in 875, during the
			Danish invasions, in the coffin of St. Cuthbert, and finally
			interred in the same tomb with the body of Cuthbert at Durham,
			where it was found in 1827. Hence St. Cuthbert is often represented
			holding St. Oswald's head in his hands.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_351" id="note_351" class="pginternal">351.</a></dt>
			<dd class="tei tei-notetext">Bamborough: cf. c. 6, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_352" id="note_352" class="pginternal">352.</a></dt>
			<dd class="tei tei-notetext">Bishop of Hexham, 709-731:
			<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_V_Chap_XX">V, 20</a> (cf. also <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIV">IV, 14</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">V, 19</a>). He was a much loved friend of Bede, many
			of whose works were undertaken at his instigation. He was devotedly
			attached to Wilfrid, whom he succeeded at Hexham. The <a class="tei tei-ref pginternal" href="#Continuation"><span class="tei tei-q">“Continuation”</span></a> says that he was expelled
			from his see in 731, and he probably never regained it.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_353" id="note_353" class="pginternal">353.</a></dt>
			<dd class="tei tei-notetext">Cf. V. 19, p. <a class="tei tei-ref pginternal" href="#Pg353">353</a>. This was probably Wilfrid's third journey to
			Rome, undertaken in 703-704, for, at the time of his earlier
			journey (in 678), when he spent the winter in Frisland, Wilbrord
			was not yet there.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_354" id="note_354" class="pginternal">354.</a></dt>
			<dd class="tei tei-notetext">The great missionary archbishop of the
			Frisians. He was trained as a boy in Wilfrid's abbey at Ripon,
			studied some time in Ireland, and with eleven companions undertook
			in 690 the mission to Frisland planned by Egbert: <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> V,
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_X">10</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XI">11</a>. (For Egbert,
			<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> c. 4, p. <a class="tei tei-ref pginternal" href="#Pg143">143</a>, and note.)</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_355" id="note_355" class="pginternal">355.</a></dt>
			<dd class="tei tei-notetext">The third of Ethelfrid's seven sons
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Sax. Chron.) to succeed to
			the sovereignty. With his brothers he had spent his youth in
			banishment among the Picts and Scots (<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c.
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_I">1</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_356" id="note_356" class="pginternal">356.</a></dt>
			<dd class="tei tei-notetext">Cc. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXI">21</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">24</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">25</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVIII">28</a>. The pupil and friend of Wilfrid. He was made
			sub-king of Deira in place of Ethelwald (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> next
			note). The date and circumstances of his rebellion are not known. A
			cross at Bewcastle in Cumberland, erected in 670 or 671,
			commemorates him and asks prayers for his soul.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_357" id="note_357" class="pginternal">357.</a></dt>
			<dd class="tei tei-notetext">Ethelwald, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> cc.
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIII">23</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">24</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_358" id="note_358" class="pginternal">358.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_III">II, 3</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_359" id="note_359" class="pginternal">359.</a></dt>
			<dd class="tei tei-notetext">The first bishop of English birth. For
			Honorius, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_II_Chap_XV">II, 15</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_360" id="note_360" class="pginternal">360.</a></dt>
			<dd class="tei tei-notetext">The apostate king of Deira, Osric, son
			of Aelfric, was first cousin to Edwin (cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_I">1</a>). Oswald united the
			two Northumbrian kingdoms, but at his death, Oswin, son of Osric,
			succeeded to Deira. He was canonised, and his tragic death led him
			to be regarded as a martyr.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_361" id="note_361" class="pginternal">361.</a></dt>
			<dd class="tei tei-notetext">Not identified. The village
			(<span class="tei tei-q">“a vico Cataractone”</span>) is probably
			the one called Cataracta in <a class="tei tei-ref pginternal" href="#Book_II_Chap_XIV">II, 14</a> (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> note, <span class="tei tei-hi"><span style="font-style: italic">ad
			loc.</span></span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_362" id="note_362" class="pginternal">362.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-foreign"><span style="font-style: italic">Comes</span></span>, A.S. <span class="tei tei-foreign"><span style="font-style: italic">gesith</span></span>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_363" id="note_363" class="pginternal">363.</a></dt>
			<dd class="tei tei-notetext">At Queen Eanfled's request
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> c. 24, p. <a class="tei tei-ref pginternal" href="#Pg191">191</a>). The place is generally identified
			with Gilling in the North Riding of Yorkshire. For the form of the
			name, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> II, 14, p. <a class="tei tei-ref pginternal" href="#Pg119">119</a>, note 5.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_364" id="note_364" class="pginternal">364.</a></dt>
			<dd class="tei tei-notetext">In 651 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span> Cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">V. 24</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_365" id="note_365" class="pginternal">365.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXI">21</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_366" id="note_366" class="pginternal">366.</a></dt>
			<dd class="tei tei-notetext">II, <a class="tei tei-ref pginternal" href="#Book_II_Chap_IX">9</a>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_XX">20</a>; III, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">24</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">25</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIX">29</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_IX">V, 19</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_367" id="note_367" class="pginternal">367.</a></dt>
			<dd class="tei tei-notetext">The monastery of Wearmouth and Jarrow.
			Cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVIII">IV, 18</a>;
			V, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXI">21</a>
			<span class="tei tei-hi"><span style="font-style: italic">ad
			init.</span></span>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">24</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_368" id="note_368" class="pginternal">368.</a></dt>
			<dd class="tei tei-notetext">Bamborough, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> cc.
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_VI">6</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XII">12</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_369" id="note_369" class="pginternal">369.</a></dt>
			<dd class="tei tei-notetext">The scene of St. Cuthbert's hermit
			life: <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVII">27</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVIII">28</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIX">29</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_I">V, 1</a>. It is called the
			<span class="tei tei-q">“House Island,”</span> and is the largest
			of the Farne group of seventeen islands off the coast of
			Northumberland, opposite Bamborough, famous in modern times for the
			rescue of a shipwrecked crew by Grace Darling.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_370" id="note_370" class="pginternal">370.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">v.l.</span></span> seventeen. The MS.
			authority is about equal; but cf. <span class="tei tei-hi"><span style="font-style: italic">infra</span></span>,
			the statement that he died in the seventeenth year of his
			episcopate, which seems to be correct.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_371" id="note_371" class="pginternal">371.</a></dt>
			<dd class="tei tei-notetext">651 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>; <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c.
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_XIV">14</a>
			<span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_372" id="note_372" class="pginternal">372.</a></dt>
			<dd class="tei tei-notetext">Cc. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXI">21</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXII">22</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">25</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVI">26</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVII">27</a>. For his character, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> c.
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">25</a> (though
			some suppose the reference to be to Ronan). For Hii, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> c.
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_III">3</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_373" id="note_373" class="pginternal">373.</a></dt>
			<dd class="tei tei-notetext">The church and the buttress were
			evidently both of wood.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_374" id="note_374" class="pginternal">374.</a></dt>
			<dd class="tei tei-notetext">He probably refers to the <span class="tei tei-q">“De Temporum Ratione,”</span> the longer of his two
			chronological works. It treats the Paschal question at length. But
			in the <span class="tei tei-q">“De Temporibus”</span> he also
			briefly discusses it.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_375" id="note_375" class="pginternal">375.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_III">3</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_376" id="note_376" class="pginternal">376.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_II_Chap_XV">II, 15</a>, and note.</dd>
