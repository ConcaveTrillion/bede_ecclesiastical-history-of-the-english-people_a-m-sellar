			<dt class="tei tei-notelabel"><a href="#noteref_377" id="note_377" class="pginternal">377.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">ib.</span></span> The
			school was probably in the episcopal city of Dunwich, though it has
			been maintained that it was the origin of Cambridge University. For
			this there seems to be no authority except a seventeenth century
			addition to this passage in a twelfth or thirteenth century MS:
			<span class="tei tei-q">“Grantebrig schola a Sigberto
			Rege.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_378" id="note_378" class="pginternal">378.</a></dt>
			<dd class="tei tei-notetext">Cf. c. 7, p. <a class="tei tei-ref pginternal" href="#Pg149">149</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_379" id="note_379" class="pginternal">379.</a></dt>
			<dd class="tei tei-notetext">For a full account of St. Fursa and
			his brothers, and other companions mentioned in this chapter,
			<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Miss Margaret Stokes's
			<span class="tei tei-q">“Three months in the Forests of France, a
			pilgrimage in search of vestiges of the Irish Saints in
			France.”</span> Bede's narrative is taken from an extant ancient
			Latin life of St. Fursa (or Fursey), the <span class="tei tei-q">“libellus de vita ejus conscriptus”</span> to which he
			refers several times (<span class="tei tei-hi"><span style="font-style: italic">v. infra</span></span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_380" id="note_380" class="pginternal">380.</a></dt>
			<dd class="tei tei-notetext">St. Matt., xxv, 13.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_381" id="note_381" class="pginternal">381.</a></dt>
			<dd class="tei tei-notetext">Burgh Castle in Suffolk, where there
			was a Roman fortress, Garianonum.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_382" id="note_382" class="pginternal">382.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, Irish.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_383" id="note_383" class="pginternal">383.</a></dt>
			<dd class="tei tei-notetext">His monastery on Lough Corrib. It is
			obvious from the sequel that this vision was prior to his journey
			to Britain, and is distinct from the vision mentioned above.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_384" id="note_384" class="pginternal">384.</a></dt>
			<dd class="tei tei-notetext">Ps. lxxxiv, 7; (lxxxiii, 8, in the
			Vulgate). The reading is that of the Vulgate and the Gallican
			Psalter: <span class="tei tei-q">“Ibunt de virtute in virtutem:
			videbitur Deus deorum in Sion.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_385" id="note_385" class="pginternal">385.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_386" id="note_386" class="pginternal">386.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, Ireland.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_387" id="note_387" class="pginternal">387.</a></dt>
			<dd class="tei tei-notetext">The monastery at Burgh Castle.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_388" id="note_388" class="pginternal">388.</a></dt>
			<dd class="tei tei-notetext">Fullan, or Foillan, was apparently a
			bishop (the others are called <span class="tei tei-q">“presbyteri”</span>). He and Ultan after Fursa's death
			(<span class="tei tei-hi"><span style="font-style: italic">circ.</span></span> 650) went to South
			Brabant. Ultan founded a monastery at Fosse in the diocese of Liège
			(then of Maestricht), and Fullan laboured in conjunction with St.
			Gertrude in the double monastery of Nivelles. Ultan became abbot,
			first of Fosse and later of Péronne. The name Gobban occurs
			frequently in Irish Church History, Dicull occasionally. There is a
			Dicull mentioned in <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIII">IV, 13</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_389" id="note_389" class="pginternal">389.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, the Mercians; <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c.
			<a class="tei tei-ref pginternal" href="#Book_II_Chap_XVIII">18</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_390" id="note_390" class="pginternal">390.</a></dt>
			<dd class="tei tei-notetext">Clovis II, King of Neustria, 638-656.
			Ercinwald was his Mayor of the Palace.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_391" id="note_391" class="pginternal">391.</a></dt>
			<dd class="tei tei-notetext">Lagny on the Marne, near Paris.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_392" id="note_392" class="pginternal">392.</a></dt>
			<dd class="tei tei-notetext">Péronne on the Somme. The monastery
			founded there after his death was called <span class="tei tei-q">“Perrona Scotorum”</span> from the number of Irish who
			resorted to it.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_393" id="note_393" class="pginternal">393.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Circ.</span></span> 647. The rapid increase in
			the number of native bishops may be seen from this chapter. The
			only one before Thomas was Ithamar (cf. c. 14, p. <a class="tei tei-ref pginternal" href="#Pg164">164</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_394" id="note_394" class="pginternal">394.</a></dt>
			<dd class="tei tei-notetext">The Fen country. The province included
			part of the counties of Lincoln, Northampton, Huntingdon, and
			Cambridge.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_395" id="note_395" class="pginternal">395.</a></dt>
			<dd class="tei tei-notetext">Such changes of name were frequent:
			cf. Benedict for Biscop (<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVIII">IV, 18</a>), Boniface for Winfrid (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Continuation"><span class="tei tei-q">“Continuation”</span></a>), Clement for Wilbrord
			(<a class="tei tei-ref pginternal" href="#Book_V_Chap_XI">V, 11</a>), and cf.
			<span class="tei tei-hi"><span style="font-style: italic">infra</span></span>, <span class="tei tei-q">“Deusdedit.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_396" id="note_396" class="pginternal">396.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_II_Chap_XV">II, 15</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_397" id="note_397" class="pginternal">397.</a></dt>
			<dd class="tei tei-notetext">The first archbishop of English birth.
			He died in 664 (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_IV_Chap_I">IV, 1</a>). His original name is said to have
			been Frithonas; Deusdedit is the Latin form of Theodore. There was
			a Pope of the same name, 615-618 (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_II_Chap_VII">II, 7</a>). Similar
			names were common in the African Church, <span class="tei tei-hi"><span style="font-style: italic">e.g.</span></span>,
			<span class="tei tei-q">“Adeodatus,”</span> <span class="tei tei-q">“Habetdeus,”</span> <span class="tei tei-q">“Quodvultdeus,”</span> <span class="tei tei-q">“Deogratias.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_398" id="note_398" class="pginternal">398.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIV">14</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_399" id="note_399" class="pginternal">399.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_II">IV, 2</a>. It has been supposed that he died of the
			plague of 664. After his death the see was vacant for several
			years. It is remarkable that he came of a race which had not yet
			become Christian. The South Saxons continued to be pagan till
			Wilfrid evangelized them, 681-686 (<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIII">IV, 13</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_400" id="note_400" class="pginternal">400.</a></dt>
			<dd class="tei tei-notetext">For their origin, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_I_Chap_XV">I, 15</a>. Their
			country, which was subject to Mercia, was the present
			Leicestershire. They are probably to be identified with the
			Southern Mercians; <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">24</a>, where we find
			Peada confirmed by Oswy in the government of that people.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_401" id="note_401" class="pginternal">401.</a></dt>
			<dd class="tei tei-notetext">She caused his death by treachery:
			<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">24</a> <span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_402" id="note_402" class="pginternal">402.</a></dt>
			<dd class="tei tei-notetext">C. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIV">14</a>, <span class="tei tei-hi"><span style="font-style: italic">ad init.</span></span>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_403" id="note_403" class="pginternal">403.</a></dt>
			<dd class="tei tei-notetext">After Alchfrid's death, she took the
			veil and ruled the monastery of Caistor (? Cyneburgacaster) in
			Northamptonshire. She was one of the five children of the heathen
			Penda, who were canonized as saints.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_404" id="note_404" class="pginternal">404.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-foreign"><span style="font-style: italic">Comitibus ac
			militibus.</span></span> A.S. <span class="tei tei-q">“geferum”</span> (companions) and <span class="tei tei-q">“king's thegns.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_405" id="note_405" class="pginternal">405.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXII">22</a>. Variously identified with Walton and
			Walbottle, both near Newcastle. For the preposition, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> II,
			14, p. <a class="tei tei-ref pginternal" href="#Pg119">119</a>, note 5.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_406" id="note_406" class="pginternal">406.</a></dt>
			<dd class="tei tei-notetext">For Cedd, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Preface">Preface</a>, and
			<span class="tei tei-hi"><span style="font-style: italic">infra</span></span> cc. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXII">22</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIII">23</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">25</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVI">26</a>. The names of Adda
			and Betti do not occur again. For Diuma: <span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span> and c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">24</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_407" id="note_407" class="pginternal">407.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_III_Chap_XV">III, 15</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_408" id="note_408" class="pginternal">408.</a></dt>
			<dd class="tei tei-notetext">Gateshead on the Tyne, opposite
			Newcastle. For the preposition, cf. II, 14, p. <a class="tei tei-ref pginternal" href="#Pg119">119</a>, note 5.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_409" id="note_409" class="pginternal">409.</a></dt>
			<dd class="tei tei-notetext">Penda was killed in 655. Diuma was
			probably consecrated in 656.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_410" id="note_410" class="pginternal">410.</a></dt>
			<dd class="tei tei-notetext">Not identified. Perhaps Repton
			(Reppington) in Derbyshire, where it is supposed that Diuma had
			fixed his see. For the form of the name, cf. II, 14, p. <a class="tei tei-ref pginternal" href="#Pg119">119</a>, note 5.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_411" id="note_411" class="pginternal">411.</a></dt>
			<dd class="tei tei-notetext">He probably returned at the time of
			the rebellion of Mercia in 658; <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> c.
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">24</a>,
			<span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span> For Hii, <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_III">3</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_412" id="note_412" class="pginternal">412.</a></dt>
			<dd class="tei tei-notetext">Abbot of Gilling. He was a kinsman of
			Oswin: <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> c. 24, p. <a class="tei tei-ref pginternal" href="#Pg191">191</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_413" id="note_413" class="pginternal">413.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_V">II, 5</a>. Since then, the East Saxons had remained
			pagan.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_414" id="note_414" class="pginternal">414.</a></dt>
			<dd class="tei tei-notetext">Sometimes surnamed the <span class="tei tei-q">“Good.”</span> (He must not be confused with Sigbert,
			King of the East Angles, <a class="tei tei-ref pginternal" href="#Book_II_Chap_XV">II, 15</a>, and III, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XVIII">18</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIX">19</a>.) Sigbert the Little was the successor of the
			three young kings who expelled Mellitus (<a class="tei tei-ref pginternal" href="#Book_II_Chap_V">II, 5</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_415" id="note_415" class="pginternal">415.</a></dt>
			<dd class="tei tei-notetext">C. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXI">21</a> and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_416" id="note_416" class="pginternal">416.</a></dt>
			<dd class="tei tei-notetext">C. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXI">21</a> and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_417" id="note_417" class="pginternal">417.</a></dt>
			<dd class="tei tei-notetext">They must have been Celtic bishops,
			probably of the Irish Church and subject to the authority of Iona.
			Cedd seems to have had no fixed see. He is not called Bishop of
			London, like Mellitus.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_418" id="note_418" class="pginternal">418.</a></dt>
			<dd class="tei tei-notetext">Dr. Bright regards this organization
			as a foreshadowing of the parochial system, which, however, was not
			thoroughly established till long after.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_419" id="note_419" class="pginternal">419.</a></dt>
			<dd class="tei tei-notetext">Identified with the Roman military
			station, Othona, on the Blackwater, formerly called the Pant, in
			Essex. The town is now submerged.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_420" id="note_420" class="pginternal">420.</a></dt>
			<dd class="tei tei-notetext">Tilbury.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_421" id="note_421" class="pginternal">421.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-foreign"><span style="font-style: italic">Comes.</span></span> A.S. <span class="tei tei-q">“gesith.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_422" id="note_422" class="pginternal">422.</a></dt>
			<dd class="tei tei-notetext">He was his brother probably. But the
			relationships of these East Saxon kings are very difficult to
			determine.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_423" id="note_423" class="pginternal">423.</a></dt>
			<dd class="tei tei-notetext">Rendlesham in Suffolk.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_424" id="note_424" class="pginternal">424.</a></dt>
			<dd class="tei tei-notetext">Distinguish from Ethelwald, or
			Oidilwald, sub-King of Deira (<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIV">14</a>, and <span class="tei tei-hi"><span style="font-style: italic">infra</span></span>
			cc. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIII">23</a>,
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">24</a>).
			Ethelwald, King of the East Angles, succeeded his brother,
			Ethelhere, who was the successor of Anna (cf. <span class="tei tei-hi"><span style="font-style: italic">supra</span></span>
			cc. <a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">7</a>,
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_XVIII">18</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIX">19</a>), and was killed in
			the battle of the Winwaed (<span class="tei tei-hi"><span style="font-style: italic">v. infra</span></span> c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">24</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_425" id="note_425" class="pginternal">425.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">supra</span></span>
			c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIV">14</a>;
			<span class="tei tei-hi"><span style="font-style: italic">infra</span></span> c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">24</a>. Apparently he
			succeeded Oswin as sub-King of Deira.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_426" id="note_426" class="pginternal">426.</a></dt>
			<dd class="tei tei-notetext">Isaiah, xxxv, 7.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_427" id="note_427" class="pginternal">427.</a></dt>
			<dd class="tei tei-notetext">Lastingham (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Preface">Preface</a>). Cedd was its
			first abbot, though it was not in his own diocese.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_428" id="note_428" class="pginternal">428.</a></dt>
			<dd class="tei tei-notetext">Doubtless only one at a time. The
			<span class="tei tei-q">“Provost”</span> is the prior of later
			times. The charge of the monastery would devolve upon him while
			Cedd was absent in his diocese.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_429" id="note_429" class="pginternal">429.</a></dt>
			<dd class="tei tei-notetext">Or, as he is commonly called, St.
			Chad, the greatest of this remarkable group of brothers;
			<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Preface">Preface</a> and <span class="tei tei-hi"><span style="font-style: italic">infra passim</span></span>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_430" id="note_430" class="pginternal">430.</a></dt>
			<dd class="tei tei-notetext">Ythancaestir, or Tilbury (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> c.
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_XXII">22</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_431" id="note_431" class="pginternal">431.</a></dt>
			<dd class="tei tei-notetext">Oswald; <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c.
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_IX">9</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_432" id="note_432" class="pginternal">432.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“Ealdormen,”</span> Green, <span class="tei tei-q">“Making of England,”</span> p. 301. But they probably
			included many British chiefs (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Nennius, and cf. <span class="tei tei-hi"><span style="font-style: italic">infra</span></span>
			<span class="tei tei-q">“duces regii”</span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_433" id="note_433" class="pginternal">433.</a></dt>
			<dd class="tei tei-notetext">Oswy's younger son. He succeeded his
			father in 670 or 671 (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_IV_Chap_V">IV, 5</a>, and for the events of his reign,
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_V">IV, V</a>,
			<span class="tei tei-hi"><span style="font-style: italic">passim</span></span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_434" id="note_434" class="pginternal">434.</a></dt>
			<dd class="tei tei-notetext">The wife of Penda.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_435" id="note_435" class="pginternal">435.</a></dt>
			<dd class="tei tei-notetext">Cc. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIV">14</a> and <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIII">23</a>. The reason for his conduct is not
			explained. Probably he had hoped to establish his claims on
			Northumbria through Penda's assistance, but shrank from actually
			fighting against his country.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_436" id="note_436" class="pginternal">436.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXII">22</a>, <span class="tei tei-hi"><span style="font-style: italic">ad fin.</span></span>, note. How he gave
			occasion for the war is not known.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_437" id="note_437" class="pginternal">437.</a></dt>
			<dd class="tei tei-notetext">The river has not been identified, and
			there is great uncertainty even with regard to the district. Below,
			Bede says that Oswy concluded the war in the district of
			<span class="tei tei-q">“Loidis,”</span> by which he must mean
			Leeds, as in <a class="tei tei-ref pginternal" href="#Book_II_Chap_XIV">II,
			14</a>, and most commentators adopt this view. In this case, the
			river may be the Aire, or more probably the Went, a tributary of
			the Don. Others believe the district to be the Lothians, following
			the account in Nennius, who describes Oswy as taking refuge before
			the battle in a city called Iudeu, supposed to be either Edinburgh
			or Carriden (cf. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XII">I,
			12</a>, note), and the river has been supposed to be the Avon in
			Linlithgow.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_438" id="note_438" class="pginternal">438.</a></dt>
			<dd class="tei tei-notetext">She is mentioned as joint-abbess with
			her mother, Eanfled, of the monastery of Whitby (<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">IV, 26</a>). Eddius calls
			her <span class="tei tei-q">“sapientissima virgo,”</span>
			<span class="tei tei-q">“semper totius provinciae consolatrix
			optimaque consiliatrix.”</span> Her influence helped to restore
			Wilfrid to the bishopric. She was the friend of St. Cuthbert, who
			is said to have wrought a miraculous cure on her behalf. It was to
			her that he prophesied the death of her brother Egfrid (IV, 26, p.
			<a class="tei tei-ref pginternal" href="#Pg285">285</a>, note).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_439" id="note_439" class="pginternal">439.</a></dt>
			<dd class="tei tei-notetext">Hartlepool in the county of Durham
			(cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIII">IV,
			23</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_440" id="note_440" class="pginternal">440.</a></dt>
			<dd class="tei tei-notetext">For the main facts of her life,
			<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIII">IV, 23</a>. She was Abbess of Whitby at the
			time of the Synod (c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">25</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_441" id="note_441" class="pginternal">441.</a></dt>
			<dd class="tei tei-notetext">Whitby. It was a mixed monastery (cf.
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIII">IV, 23</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_442" id="note_442" class="pginternal">442.</a></dt>
			<dd class="tei tei-notetext">The ancient life of Gregory the Great,
			by a monk of Whitby, tells how Edwin's body was translated thither
			from the place where he fell. For the fate of his head, cf.
			<a class="tei tei-ref pginternal" href="#Book_II_Chap_XX">II, 20</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_443" id="note_443" class="pginternal">443.</a></dt>
			<dd class="tei tei-notetext">In 655: cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">V, 24</a> (death of
			Penda).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_444" id="note_444" class="pginternal">444.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXI">21</a>, where, however, Lindsey is not
			mentioned. For the successive conquests of Lindsey by Northumbria
			and Mercia, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> IV, 12, p. <a class="tei tei-ref pginternal" href="#Pg243">243</a>, note. Though it must have passed to
			Northumbria after Oswy's victory, it was still apparently included
			in the Mercian diocese.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_445" id="note_445" class="pginternal">445.</a></dt>
			<dd class="tei tei-notetext">C. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXI">21</a>, <span class="tei tei-hi"><span style="font-style: italic">ad fin.</span></span> and note. <span class="tei tei-q">“Scottia,”</span> as usual, means Ireland, which
			includes Iona (cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_IV">II, 4</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_446" id="note_446" class="pginternal">446.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIV">14</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_447" id="note_447" class="pginternal">447.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, he confirmed Peada in the
			government conferred on him by his father, Penda, if we may assume
			the Southern Mercians to be identical with the Middle Angles: cf.
			c. 21, p. <a class="tei tei-ref pginternal" href="#Pg180">180</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_448" id="note_448" class="pginternal">448.</a></dt>
			<dd class="tei tei-notetext">Alchfled, Oswy's daughter:
			<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> <span class="tei tei-hi"><span style="font-style: italic">ibid.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_449" id="note_449" class="pginternal">449.</a></dt>
			<dd class="tei tei-notetext">He has been already mentioned, cc.
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">7</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXI">21</a>. He was a vigorous
			ruler; he freed Mercia from Northumbria, reconquered Lindsey,
			established his supremacy over the East Saxons (cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXX">30</a>), and curtailed the
			power of Wessex. His attempt, however, to extend his power to the
			north of the Humber ended in 675 in his disastrous defeat by
			Egfrid, King of Northumbria (<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">IV, 12</a>) and his death followed immediately after.
			He was the first Christian king of all Mercia, and he was zealous
			in putting down idolatry (Florence of Worcester).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_450" id="note_450" class="pginternal">450.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">supra</span></span>
			and c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXI">21</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_451" id="note_451" class="pginternal">451.</a></dt>
			<dd class="tei tei-notetext">He succeeded in 662. Cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXX">30</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_452" id="note_452" class="pginternal">452.</a></dt>
			<dd class="tei tei-notetext">C. 23, p. <a class="tei tei-ref pginternal" href="#Pg187">187</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_453" id="note_453" class="pginternal">453.</a></dt>
			<dd class="tei tei-notetext">IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_III">3</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_V">5</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_VI">6</a>. He was deposed by Theodore for some act of
			disobedience not known (<a class="tei tei-ref pginternal" href="#Book_IV_Chap_VI">IV, 6</a>), and went to the Continent, where,
			travelling in Neustria, he was mistaken for Wilfrid and cruelly
			ill-treated by the emissaries of Ebroin (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">V, 19</a>, note),
			<span class="tei tei-q">“errore bono unius syllabae
			seducti,”</span> as Eddius, the biographer of Wilfrid,
			remarks.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_454" id="note_454" class="pginternal">454.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, Ireland.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_455" id="note_455" class="pginternal">455.</a></dt>
			<dd class="tei tei-notetext">He succeeded Cuthbert as Bishop of
			Lindisfarne; <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIX">29</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXX">30</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_456" id="note_456" class="pginternal">456.</a></dt>
			<dd class="tei tei-notetext">Cf. II, 2, p. <a class="tei tei-ref pginternal" href="#Pg084">84</a>, note 3.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_457" id="note_457" class="pginternal">457.</a></dt>
			<dd class="tei tei-notetext">Nothing certain is known of him.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_458" id="note_458" class="pginternal">458.</a></dt>
			<dd class="tei tei-notetext">II, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XVI">16</a>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_XX">20</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_II">IV, 2</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_459" id="note_459" class="pginternal">459.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, Iona: cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_IV">IV, 4</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			init.</span></span> Colman succeeded in 661.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_460" id="note_460" class="pginternal">460.</a></dt>
			<dd class="tei tei-notetext">For his life: <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">V, 19</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_461" id="note_461" class="pginternal">461.</a></dt>
			<dd class="tei tei-notetext">Really Annemundus. He was Archbishop
			of Lyons. Cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_VIII">V,
			8</a>, note on Godwin. He is confused with his brother Dalfinus,
			Count of Lyons: <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> V, 19, p. <a class="tei tei-ref pginternal" href="#Pg348">348</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_462" id="note_462" class="pginternal">462.</a></dt>
			<dd class="tei tei-notetext">Ripon. For the preposition, cf. II,
			14, p. <a class="tei tei-ref pginternal" href="#Pg119">119</a>, note 5. The
			monastery was first given to Eata (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> c.
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVI">26</a>), to be
			organized by him, and among the monks he brought with him from
			Melrose was Cuthbert (cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVII">IV, 27</a>). They were forced to retire in 661, but
			after the Synod of Whitby they conformed to the Catholic
			rules.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_463" id="note_463" class="pginternal">463.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">7</a>, where Bede's summary account obscures
			the sequence of events. Here he is still called Bishop of the West
			Saxons. It is probable that he had retired from Wessex by this
			time, but had not yet gone to Gaul. He did not become Bishop of
			Paris before 666, for in that year we find his predecessor,
			Importunus, witnessing a <span class="tei tei-q">“privilegium”</span> for a nunnery at Soissons.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_464" id="note_464" class="pginternal">464.</a></dt>
			<dd class="tei tei-notetext">We hear nothing more of this
			priest.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_465" id="note_465" class="pginternal">465.</a></dt>
			<dd class="tei tei-notetext">C. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">24</a>. The etymology is generally considered
			impossible. But cf. Bright, <span class="tei tei-q">“Early English
			Church History,”</span> p. 213.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_466" id="note_466" class="pginternal">466.</a></dt>
			<dd class="tei tei-notetext">C. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">24</a>. After the Synod it appears that she
			conformed to the Catholic usages. But she continued to be an
			opponent of Wilfrid till the end of her life.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_467" id="note_467" class="pginternal">467.</a></dt>
			<dd class="tei tei-notetext">Cc. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXI">21</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXII">22</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIII">23</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_468" id="note_468" class="pginternal">468.</a></dt>
			<dd class="tei tei-notetext">The practice of the churches of Asia,
			traditionally derived from St. John, was to disregard the day of
			the week and observe as Easter Day the 14th of the month Nisan.
			Therefore the claim to the authority of St. John, advanced by the
			Celts, was inaccurate and gives some colour to the charge, often
			brought against them, of being <span class="tei tei-q">“Quartodecimans.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_469" id="note_469" class="pginternal">469.</a></dt>
			<dd class="tei tei-notetext">Acts, xvi, 3.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_470" id="note_470" class="pginternal">470.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span>, xxi, 26.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_471" id="note_471" class="pginternal">471.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span>, xviii, 18.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_472" id="note_472" class="pginternal">472.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span>, xxi, 20.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_473" id="note_473" class="pginternal">473.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XIX">II, 19</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_474" id="note_474" class="pginternal">474.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_III">3</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_475" id="note_475" class="pginternal">475.</a></dt>
			<dd class="tei tei-notetext">St. Matt., xvi, 18-19.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_476" id="note_476" class="pginternal">476.</a></dt>
			<dd class="tei tei-notetext">Cf. II, 2, p. <a class="tei tei-ref pginternal" href="#Pg085">85</a>, note 1.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_477" id="note_477" class="pginternal">477.</a></dt>
			<dd class="tei tei-notetext">To Iona; <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_IV">IV, 4</a>,
			<span class="tei tei-hi"><span style="font-style: italic">ad
			init.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_478" id="note_478" class="pginternal">478.</a></dt>
			<dd class="tei tei-notetext">Fourth Bishop of Lindisfarne and the
			last of the Irish bishops in that see. He died of the plague in
			664: <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVII">27</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_479" id="note_479" class="pginternal">479.</a></dt>
			<dd class="tei tei-notetext">Cf. c. 3, p. <a class="tei tei-ref pginternal" href="#Pg139">139</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_480" id="note_480" class="pginternal">480.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, Ireland.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_481" id="note_481" class="pginternal">481.</a></dt>
			<dd class="tei tei-notetext">IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVII">27</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVIII">28</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_II">V, 2</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_482" id="note_482" class="pginternal">482.</a></dt>
			<dd class="tei tei-notetext">Old Melrose, <span class="tei tei-q">“Quod Tuidi fluminis circumflexu maxima ex parte
			clauditur,”</span> <a class="tei tei-ref pginternal" href="#Book_V_Chap_XII">V, 12</a>. The more famous monastery is of later date
			and is to the west of the older site.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_483" id="note_483" class="pginternal">483.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_III">3</a>, <span class="tei tei-hi"><span style="font-style: italic">ad fin.</span></span> (where, however, there
			is only a general allusion to the instruction of English children).
			It has been suggested that they may have been redeemed from
			slavery. Cf. c. 5, p. <a class="tei tei-ref pginternal" href="#Pg145">145</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_484" id="note_484" class="pginternal">484.</a></dt>
			<dd class="tei tei-notetext">Really on the 1st.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_485" id="note_485" class="pginternal">485.</a></dt>
			<dd class="tei tei-notetext">Called the <span class="tei tei-q">“Yellow Pest”</span> from the colour of its victims. It
			was a bubonic plague; it probably came from the East and was the
			same as that which raged in Europe in Justinian's reign. There were
			several outbreaks in England in the seventh century, but this was
			the most virulent. For subsequent visitations, cf. IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_VII">7</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIV">14</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIX">19</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_486" id="note_486" class="pginternal">486.</a></dt>
			<dd class="tei tei-notetext">Cf. c. 26, p. <a class="tei tei-ref pginternal" href="#Pg201">201</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_487" id="note_487" class="pginternal">487.</a></dt>
			<dd class="tei tei-notetext">The Saxon Chronicle has <span class="tei tei-q">“on Wagele,”</span> which is supposed to be Whalley, on
			the borders of Lancashire, Cheshire, and Yorkshire, but the name
			varies greatly in different chroniclers. Smith considers that
			Bede's form <span class="tei tei-q">“Paegnalaech”</span> or
			<span class="tei tei-q">“Paegnalech”</span> points to Finchale
			(Wincanheale, in Simeon of Durham, or Pincahala), near Durham.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_488" id="note_488" class="pginternal">488.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_IV">4</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_489" id="note_489" class="pginternal">489.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XI">11</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">IV, 12</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_490" id="note_490" class="pginternal">490.</a></dt>
			<dd class="tei tei-notetext">Said, on doubtful authority, to be
			Melfont, or Mellifont, in County Louth.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_491" id="note_491" class="pginternal">491.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“Acceptum
			sacerdotii gradum,”</span> A.S. <span class="tei tei-q">“biscophade
			onfeng”</span> = he received the episcopate. Cf. c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_IV">4</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_492" id="note_492" class="pginternal">492.</a></dt>
			<dd class="tei tei-notetext">In 664. This was the young
			<span class="tei tei-q">“Fainéant”</span> king of Neustria,
			Clothaire III. Wilfrid was probably sent abroad at his own request.
			Doubtless he desired to have the canonical number of three bishops
			at his consecration, and Boniface of Dunwich (c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XX">20</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_V">IV, 5</a>) was the only
			prelate in England whose orders he would have regarded as entirely
			satisfactory, for Wini might be considered a usurper, and Cedd and
			Jaruman had been consecrated by schismatics. Archbishop Deusdedit
			was dead (<a class="tei tei-ref pginternal" href="#Book_III_Chap_XX">III,
			20</a>, note) and so probably was Damian of Rochester.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_493" id="note_493" class="pginternal">493.</a></dt>
			<dd class="tei tei-notetext">He was Wilfrid's friend: <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c.
			25, pp. <a class="tei tei-ref pginternal" href="#Pg194">194-5</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_494" id="note_494" class="pginternal">494.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">ibid.</span></span>,
			note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_495" id="note_495" class="pginternal">495.</a></dt>
			<dd class="tei tei-notetext">Compiègne, a royal <span class="tei tei-q">“villa.”</span> For the preposition, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_II_Chap_XIV">II, 14</a>, note.
			The ceremony was a specially magnificent one, Wilfrid being carried
			in a golden chair by twelve bishops in choral procession, according
			to an ancient custom of the Gallican Church.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_496" id="note_496" class="pginternal">496.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Preface">Preface</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIII">III, 23</a>, <span class="tei tei-hi"><span style="font-style: italic">et saep.</span></span> Why Oswy, who had
			consented to Wilfrid's consecration (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">V, 19</a>) acted in
			this manner is not clear. Probably it implies that the Celtic
			party, during Wilfrid's prolonged absence, had to some extent
			recovered their ascendency; and, if it was at this time that
			Alchfrid (who is not heard of again) rebelled against his father
			(<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIV">14</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			init.</span></span>) and was deprived of his kingdom, Wilfrid would
			have lost his warmest supporter.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_497" id="note_497" class="pginternal">497.</a></dt>
			<dd class="tei tei-notetext">He retired to Ripon from Lindsey, of
			which he was the first separate bishop, when Ethelred recovered
			that province for Mercia in 679. But cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">IV, 12</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span>, note, for the statement that he was
			<span class="tei tei-q">“Bishop”</span> of Ripon.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_498" id="note_498" class="pginternal">498.</a></dt>
			<dd class="tei tei-notetext">King of Northumbria, <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c.
			24, p. <a class="tei tei-ref pginternal" href="#Pg188">188</a>, note 3.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_499" id="note_499" class="pginternal">499.</a></dt>
			<dd class="tei tei-notetext">It does not appear why Boniface
			(Bertgils) of Dunwich, Bishop of the East Angles, 652-669 (c.
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_XX">20</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_V">IV, 5</a>), is ignored.
			Ceadda's consecration was afterwards regarded as of doubtful
			validity and was completed by Theodore (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">IV, 12</a>). The
			British (probably Cornish) bishops were schismatical, and Wini's
			position was irregular. Moreover, the see to which Ceadda was
			consecrated was not vacant.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_500" id="note_500" class="pginternal">500.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_IV_Chap_I">IV, 1</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_501" id="note_501" class="pginternal">501.</a></dt>
			<dd class="tei tei-notetext">Consecrated in 657—died in 672.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_502" id="note_502" class="pginternal">502.</a></dt>
			<dd class="tei tei-notetext">Isaiah, xi, 10.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_503" id="note_503" class="pginternal">503.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span>, xlix, 1.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_504" id="note_504" class="pginternal">504.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span>, 6.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_505" id="note_505" class="pginternal">505.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span>, 7.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_506" id="note_506" class="pginternal">506.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span>, 8-9.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_507" id="note_507" class="pginternal">507.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span>, xlii, 6-7. The readings
			are from the Vulgate.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_508" id="note_508" class="pginternal">508.</a></dt>
			<dd class="tei tei-notetext">It has not been stated that Oswy and
			Egbert asked the Pope to provide an archbishop, failing Wighard.
			But this seems to be implied in <a class="tei tei-ref pginternal" href="#Book_IV_Chap_I">IV, 1</a>: <span class="tei tei-q">“episcopum, quem
			petierant.”</span> Or, as is generally supposed, Vitalian may have
			arbitrarily assumed this to be the intention of their letter.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_509" id="note_509" class="pginternal">509.</a></dt>
			<dd class="tei tei-notetext">There were several martyrs of the name
			of Laurentius, but the best known is the Roman deacon, St.
			Laurence, who suffered at Rome in 258 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span> He was buried in the
			Via Tiburtina, where a church dedicated to him is said to have been
			founded by Constantine the Great. On the site stands the present
			Church of S. Lorenzo fuori le Mura, the older part of which dates
			from the sixth century at least. One of Aldhelm's foundations
			(<a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">V, 18</a>) was a
			little church dedicated to St. Laurence at Bradford-on-Avon in 705,
			probably the small Saxon church which still stands there. There
			were many martyrs named John and Paul, and more than one Gregory.
			St. Pancras was a boy-martyr, a Phrygian by birth, who suffered at
			Rome in 304 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>, when he was only
			fourteen years of age. His martyrdom was widely celebrated, and
			miraculous powers were attributed to his tomb outside the walls of
			Rome. An old British church at Canterbury, which had been
			desecrated by the heathen invaders, was restored for Christian use
			and dedicated to St. Pancras by Augustine.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_510" id="note_510" class="pginternal">510.</a></dt>
			<dd class="tei tei-notetext">Eanfled, <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c.
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_XV">15</a> and
			note.</dd>

			Sigbert the Little (<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXII">22</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			init.</span></span>).</dd>

			<dt class="tei tei-notelabel"><a href="#noteref_526" id="note_526" class="pginternal">526.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, the Eastern, which
			consisted in shaving the whole head. This method was supposed to
			have the authority of St. Paul (an idea derived from Acts, xviii,
			18), and of St. James <span class="tei tei-q">“the Less.”</span>
			Cf. II, 2, p. <a class="tei tei-ref pginternal" href="#Pg085">85</a>,

			<dt class="tei tei-notelabel"><a href="#noteref_527" id="note_527" class="pginternal">527.</a></dt>
			<dd class="tei tei-notetext">They were accompanied by Benedict
			Biscop (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVIII">18</a>) whom Vitalian had
			asked to act as their guide and interpreter (<span class="tei tei-q">“Hist. Abb.,”</span> § 3).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_528" id="note_528" class="pginternal">528.</a></dt>
			<dd class="tei tei-notetext">Archbishop of Arles, 658-675.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_529" id="note_529" class="pginternal">529.</a></dt>
			<dd class="tei tei-notetext">From this it has been inferred that
			Arles belonged to Neustria. The king was Clothaire III, king of
			Neustria. Ebroin had succeeded Ercinwald (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_XIX">III, 19</a>,
			<span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span>) as Mayor of the Palace. He was murdered in
			681.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_530" id="note_530" class="pginternal">530.</a></dt>
			<dd class="tei tei-notetext">III, <a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">7</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">25</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVI">26</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVIII">28</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_531" id="note_531" class="pginternal">531.</a></dt>
			<dd class="tei tei-notetext">Called also Emmo, or Haymo; Bishop of
			Sens, 658-675.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_532" id="note_532" class="pginternal">532.</a></dt>
			<dd class="tei tei-notetext">Or Burgundofarus, Bishop of Meaux,
			626-672. He was brother of Fara, mentioned <a class="tei tei-ref pginternal" href="#Book_III_Chap_VIII">III, 8</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_533" id="note_533" class="pginternal">533.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“Praefectus.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_534" id="note_534" class="pginternal">534.</a></dt>
			<dd class="tei tei-notetext">Etaples in Picardy; <span class="tei tei-q">“Quentae (or <span class="tei tei-q">‘ad
			Quantiam’</span>) vicus”</span> = the village at the mouth of the
			Canche. It was an important commercial town and port.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_535" id="note_535" class="pginternal">535.</a></dt>
			<dd class="tei tei-notetext">SS. Peter and Paul (St. Augustine's):
			cf. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XXXIII">I, 33</a>.
			Theodore had placed Benedict Biscop over it while Hadrian was still
			abroad.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_536" id="note_536" class="pginternal">536.</a></dt>
			<dd class="tei tei-notetext">II, <a class="tei tei-ref pginternal" href="#Book_II_Chap_XVI">16</a>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_XX">20</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_537" id="note_537" class="pginternal">537.</a></dt>
			<dd class="tei tei-notetext">Eddius, the biographer of Wilfrid. He
			mentions himself (<span class="tei tei-q">“Life of Wilfrid,”</span>
			Chapter XIV) as a <span class="tei tei-q">“cantor.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_538" id="note_538" class="pginternal">538.</a></dt>
			<dd class="tei tei-notetext">Bede can scarcely mean to impeach the
			orthodoxy of the bishops of native birth prior to Wilfrid. Probably
			the reference is mainly to the prominent part he took in bringing
			about the decision at Whitby.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_539" id="note_539" class="pginternal">539.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVIII">III, 28</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_540" id="note_540" class="pginternal">540.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XX">III, 20</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_541" id="note_541" class="pginternal">541.</a></dt>
			<dd class="tei tei-notetext">Cc. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_V">5</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a>. Florence of Worcester mentions a Putta,
			Bishop of Hereford, who died in 688, but it is very doubtful
			whether he can be identified with the above. Bede's words in
			Chapter <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a> do
			not imply that Putta, Bishop of Rochester, became Bishop of
			Hereford. Hereford was not one of the five sees into which Florence
			tells us that Theodore divided the great Mercian bishopric, but it
			appears soon after as a separate see for Hecana (Herefordshire).
			Possibly Putta, who is traditionally reckoned as its first bishop,
			may have acted as Sexwulf's deputy there.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_542" id="note_542" class="pginternal">542.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XX">II, 20</a> <span class="tei tei-hi"><span style="font-style: italic">ad fin.</span></span>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_543" id="note_543" class="pginternal">543.</a></dt>
			<dd class="tei tei-notetext">III, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">24</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXX">30</a>. He had probably died two years before Chad's
			appointment, <span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>, in 667, and the see had
			been vacant in the interval, for Wilfrid, then in retirement at
			Ripon, is said (by Eddius) to have discharged episcopal functions
			for the Mercians.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_544" id="note_544" class="pginternal">544.</a></dt>
			<dd class="tei tei-notetext">Lastingham. Cf. Preface, p. <a class="tei tei-ref pginternal" href="#Pg003">3</a>; III, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIII">23</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVIII">28</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_545" id="note_545" class="pginternal">545.</a></dt>
			<dd class="tei tei-notetext">Lindsey at this time belonged to
			Mercia. Cf. c. 12, p. <a class="tei tei-ref pginternal" href="#Pg243">243</a>,
			note 5.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_546" id="note_546" class="pginternal">546.</a></dt>
			<dd class="tei tei-notetext">Smith believed this place to be
			Barton-on-Humber. It is now generally identified with Barrow in
			Lincolnshire. For the preposition, cf. II, 14, p. <a class="tei tei-ref pginternal" href="#Pg119">119</a>, note 5.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_547" id="note_547" class="pginternal">547.</a></dt>
			<dd class="tei tei-notetext">It had not previously been an
			episcopal see, though Wulfhere had wished to establish Wilfrid
			there during the vacancy in the Mercian bishopric (p. <a class="tei tei-ref pginternal" href="#Pg218">218</a>, note 4). When the bishopric
			of Mercia and Lindsey was subdivided by Theodore in 679, Lichfield
			remained the see of the bishopric of Mercia proper. In 787, under
			Offa, King of Mercia, with the consent of Pope Hadrian, it was
			raised into a separate archbishopric for Mercia and East Anglia,
			but in 802 Canterbury was re-established as the sole archbishopric
			for the Southern Province. The popular derivation of the name,
			Lichfield (<span class="tei tei-q">“Field of the Dead”</span>) is
			from <span class="tei tei-foreign"><span style="font-style: italic">lic</span></span> = a corpse, and the place is
			traditionally connected with the martyrdom of a great number of
			British Christians. Another derivation, however (from <span class="tei tei-foreign"><span style="font-style: italic">leccian</span></span> = to irrigate), points
			to the meaning <span class="tei tei-q">“the watered
			field.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_548" id="note_548" class="pginternal">548.</a></dt>
			<dd class="tei tei-notetext">Eccl., iii. 5.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_549" id="note_549" class="pginternal">549.</a></dt>
			<dd class="tei tei-notetext">A stone which is believed to have
			formed part of Owini's tomb was found at the end of the eighteenth
			century at Haddenham, near Ely, and is now in Ely Cathedral. It
			bears the inscription, <span class="tei tei-q">“Lucem tuam Ovino da
			Deus et requiem. Amen”</span> (Mayor and Lumley).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_550" id="note_550" class="pginternal">550.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIX">19</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_551" id="note_551" class="pginternal">551.</a></dt>
			<dd class="tei tei-notetext">Ps. xviii, 13, 14.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_552" id="note_552" class="pginternal">552.</a></dt>
			<dd class="tei tei-notetext">III, <a class="tei tei-ref pginternal" href="#Book_III_Chap_IV">4</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVII">27</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_553" id="note_553" class="pginternal">553.</a></dt>
			<dd class="tei tei-notetext">He is said to have been Abbot of
			Bardney.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_554" id="note_554" class="pginternal">554.</a></dt>
			<dd class="tei tei-notetext">In 672. The original Church of St.
			Mary at Lichfield, said to have been built by Oswy in 656-657, was
			replaced about 1140 by the new Cathedral, and Ceadda's relics were
			soon after removed to it.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_555" id="note_555" class="pginternal">555.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">III, 24</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_556" id="note_556" class="pginternal">556.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVI">III, 26</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			init.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_557" id="note_557" class="pginternal">557.</a></dt>
			<dd class="tei tei-notetext">Iona. Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_III">III, 3</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_558" id="note_558" class="pginternal">558.</a></dt>
			<dd class="tei tei-notetext">Innisboffin, off the coast of Mayo.
			The annals of Ulster give 667 as the date of his retirement to
			it.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_559" id="note_559" class="pginternal">559.</a></dt>
			<dd class="tei tei-notetext">Mayo, called from this settlement,
			<span class="tei tei-q">“Mayo of the Saxons.”</span> It continued
			to be an English monastery (<span class="tei tei-hi"><span style="font-style: italic">v. infra</span></span>), and after awhile
			adopted those usages, to avoid which Colman had left England. It
			became an episcopal see, which in 1559 was annexed to the
			archbishopric of Tuam.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_560" id="note_560" class="pginternal">560.</a></dt>
			<dd class="tei tei-notetext">Hertford.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_561" id="note_561" class="pginternal">561.</a></dt>
			<dd class="tei tei-notetext">It seems probable that we ought to
			read 671; cf. Plummer <span class="tei tei-hi"><span style="font-style: italic">ad loc.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_562" id="note_562" class="pginternal">562.</a></dt>
			<dd class="tei tei-notetext">Oswy is the last king in Bede's list
			of those who held an <span class="tei tei-q">“imperium”</span>
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_II_Chap_V">II, 5</a>). With the rise of Mercia under
			Wulfhere (<a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">III,
			24</a>), the supremacy of Northumbria had virtually passed away.
			After Oswy's death, the position of Northumbria was an isolated
			one, and it was by conquests over Britons, not Englishmen, that
			Egfrid enlarged the bounds of his kingdom.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_563" id="note_563" class="pginternal">563.</a></dt>
			<dd class="tei tei-notetext">In his youth he had been a hostage at
			the court of Queen Cynwise, wife of Penda (III, 24, p. <a class="tei tei-ref pginternal" href="#Pg188">188</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_564" id="note_564" class="pginternal">564.</a></dt>
			<dd class="tei tei-notetext">This is of supreme importance as the
			first English provincial Council and the first national assembly of
			the English. The rule laid down at Nicaea and confirmed by later
			councils was that provincial synods should meet twice a year to
			settle all ecclesiastical matters which affected the province as a
			unity.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_565" id="note_565" class="pginternal">565.</a></dt>
			<dd class="tei tei-notetext">24th September, 673, falls in the
			first indiction, whether the Pontifical or the <span class="tei tei-q">“Caesarean”</span> system is meant (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			Haddan and Stubbs, III, 121). Bede himself used the Caesarean
			indiction, of which we get the first notice in his <span class="tei tei-q">“De Temporum Ratione.”</span> It began on 24th
			September. It does not, however, follow that Theodore also used it.
			The oldest scheme, viz., the Constantinopolitan, began on 1st
			September; the Roman or Pontifical, on New Year's Day as received
			at the time, <span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>, 25th December, 1st
			January, or 21st March. For Indictions, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<span class="tei tei-q">“Dictionary of Christian
			Antiquities.”</span> They were cycles of fifteen years, a mode of
			reckoning dates which appeared in the fourth century, based upon
			the Imperial fiscal system, but which came to be used irrespective
			of taxation. <span class="tei tei-q">“1st indiction”</span> stands
			for <span class="tei tei-q">“1st year of the
			indiction.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_566" id="note_566" class="pginternal">566.</a></dt>
			<dd class="tei tei-notetext">Of the six suffragans only four were
			present. Wilfrid was at this time (669-678) in possession of his
			see; why he did not appear in person is not explained. Possibly his
			action foreshadows the future troubles between him and Theodore.
			Wini, Bishop of London, was still alive (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">III, 7</a>, and
			note). If the story of his retirement to Winchester is true, this
			would account for his absence. For Bisi, <span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span>. His see was at Dunwich (cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XV">II, 15</a>). For Putta,
			<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_II">2</a> and note; for
			Leutherius, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">III, 7</a>; for Wynfrid, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">III, 24</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_III">IV, 3</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_567" id="note_567" class="pginternal">567.</a></dt>
			<dd class="tei tei-notetext">The collection of Canons approved by
			the Council of Chalcedon, translated into Latin by Dionysius
			Exiguus (early in the sixth century, cf. V, 21, p. <a class="tei tei-ref pginternal" href="#Pg369">369</a>, note) and adopted by the Western
			Church.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_568" id="note_568" class="pginternal">568.</a></dt>
			<dd class="tei tei-notetext">This place used to be identified with
			Cliff-at-Hoe near Rochester, but the theory rests mainly on the
			similarity of name. As in the recorded Councils of Clovesho the
			supremacy of Mercia is clearly indicated, it is generally assumed
			that the place must have been either in Mercia or a kingdom subject
			to it, as Kent was at the time. Except one Council in 716, we find
			none mentioned as having taken place at Clovesho till seventy years
			after this time (747), but councils were held at other places.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_569" id="note_569" class="pginternal">569.</a></dt>
			<dd class="tei tei-notetext">The subdivision of the great
			bishoprics was an important part of Theodore's policy, and though
			at this Council he failed to carry his point, possibly through the
			opposition of Wilfrid's representatives, in the succeeding years he
			effected a great change in the organization of the episcopate,
			creating dioceses co-extensive with tribal territories.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_570" id="note_570" class="pginternal">570.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIX">III, 29</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_I">IV, 1</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_571" id="note_571" class="pginternal">571.</a></dt>
			<dd class="tei tei-notetext">Cc. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXII">22</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">26</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_572" id="note_572" class="pginternal">572.</a></dt>
			<dd class="tei tei-notetext">His original name was Bertgils,
			<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_III_Chap_XX">III, 20</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_573" id="note_573" class="pginternal">573.</a></dt>
			<dd class="tei tei-notetext">Theodore availed himself of this
			opportunity for subdivision. Aecci was appointed to Dunwich and
			Badwin to the new see of Elmham. Suffolk and Norfolk thus each
			received a separate bishopric. The Danish invasions broke up this
			arrangement; Dunwich disappeared as an episcopal see, and the
			succession to Elmham was interrupted for a time. In 1075 the see of
			the single East Anglian bishopric was removed to Thetford, and in
			1094 to Norwich.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_574" id="note_574" class="pginternal">574.</a></dt>
			<dd class="tei tei-notetext">It has been conjectured that he
			resisted the subdivision of his diocese. For his subsequent
			adventures, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> III, 24, p. <a class="tei tei-ref pginternal" href="#Pg192">192</a>, note 4.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_575" id="note_575" class="pginternal">575.</a></dt>
			<dd class="tei tei-notetext">This was probably in 675 (Flor. of
			Wor.). Sexwulf (<span class="tei tei-hi"><span style="font-style: italic">v. infra</span></span> c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a>) had been a rich
			thegn who became a monk and was made first abbot of
			Medeshamstead.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_576" id="note_576" class="pginternal">576.</a></dt>
			<dd class="tei tei-notetext">Peterborough, as the town which grew
			up around the monastery came to be called in the tenth century, the
			monastery being dedicated to St. Peter. Peada is said to have
			planned the foundation (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Peterborough additions to the
			Saxon Chronicle), but the accounts are late and untrustworthy.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_577" id="note_577" class="pginternal">577.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_III_Chap_XX">III, 20</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_578" id="note_578" class="pginternal">578.</a></dt>
			<dd class="tei tei-notetext">C. 3, p. <a class="tei tei-ref pginternal" href="#Pg219">219</a>, note 2.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_579" id="note_579" class="pginternal">579.</a></dt>
			<dd class="tei tei-notetext">He succeeded Wini (<a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">III, 7</a>) in 675 and
			died about 693. He was canonized. It was in his house that the
			reconciliation between Theodore and Wilfrid took place. It is said
			that as a boy he had heard Mellitus preach in London. He was
			present at the West Saxon Witenagemot which enacted the
			<span class="tei tei-q">“Dooms of Ine”</span> (c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XV">15</a> and <a class="tei tei-ref pginternal" href="#Book_V_Chap_VII">V, 7</a>), and is spoken of
			as one of Ine's bishops, Essex being probably subject to Wessex at
			that time.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_580" id="note_580" class="pginternal">580.</a></dt>
			<dd class="tei tei-notetext">In <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXX">III, 30</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_581" id="note_581" class="pginternal">581.</a></dt>
			<dd class="tei tei-notetext">Cc. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_VII">7-10</a>. She is not to be confused with Ethelberg,
			daughter of Anna (<a class="tei tei-ref pginternal" href="#Book_III_Chap_VIII">III, 8</a>), Abbess of Faremoûtier-en-Brie.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_582" id="note_582" class="pginternal">582.</a></dt>
			<dd class="tei tei-notetext">Chertsey in Surrey. William of
			Malmesbury tells us that it was a flourishing monastery till it was
			destroyed by the Danes.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_583" id="note_583" class="pginternal">583.</a></dt>
			<dd class="tei tei-notetext">Barking in Essex, <span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span> cc. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_VII">7-10</a>. For the preposition, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> II,
			14, p. <a class="tei tei-ref pginternal" href="#Pg119">119</a>, note 5.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_584" id="note_584" class="pginternal">584.</a></dt>
			<dd class="tei tei-notetext">The plague of 664 has been mentioned
			in <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVII">III, 27</a>;
			IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_I">1</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_III">3</a>; but this may have
			been a later visitation. Barking is generally supposed to have been
			founded in 666.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_585" id="note_585" class="pginternal">585.</a></dt>
			<dd class="tei tei-notetext">Two different dates are given for her
			succession, 664 and 675. If the former is right, the plague (c.
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_VII">7</a>) must have
			been that of 664, and Ethelburg probably died of it. It appears
			from a letter of St. Boniface that Hildilid was alive in 709. She
			was one of Aldhelm's numerous women-scholars. He dedicated the
			prose version of his work in praise of virginity (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">V, 18</a>) to her
			and others of the sisterhood, and speaks highly of their scholarly
			attainments.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_586" id="note_586" class="pginternal">586.</a></dt>
			<dd class="tei tei-notetext">Apparently a life of St. Ethelburg not
			known to exist now.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_587" id="note_587" class="pginternal">587.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXX">III, 30</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_VI">IV, 6</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_588" id="note_588" class="pginternal">588.</a></dt>
			<dd class="tei tei-notetext">For Earconwald, <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c.
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_VI">6</a>. Waldhere is
			the first of a long list of undistinguished bishops of London given
			by William of Malmesbury. A letter of his to Archbishop Bertwald
			survives, and there is a charter in which Swefred (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> next
			note) grants lands at Twickenham to him in 704.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_589" id="note_589" class="pginternal">589.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_VIII">V, 8</a>, note on Suaebhard.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_590" id="note_590" class="pginternal">590.</a></dt>
			<dd class="tei tei-notetext">St. Paul's, London. Sebbi's tomb is
			believed to have survived till the fire of 1666.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_591" id="note_591" class="pginternal">591.</a></dt>
