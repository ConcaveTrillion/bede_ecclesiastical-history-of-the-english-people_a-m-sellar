			<dd class="tei tei-notetext">For these bishops, cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">III, 7</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_592" id="note_592" class="pginternal">592.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span> He died in 672 (Sax.
			Chron.). Of the sub-kings the most prominent were Aescwine and
			Centwine, a brother of Coinwalch. The Saxon Chronicle gives a
			different account. According to it, Coinwalch's widow, Sexburg,
			reigned for one year after him and was succeeded by Aescwine, who
			was succeeded by Centwine.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_593" id="note_593" class="pginternal">593.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">III, 7</a>, and for his character, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">V, 18</a>. The Saxon
			Chronicle says he succeeded in 676 and died in 703. Bede places his
			death in 705 (<a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">V,
			18</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_594" id="note_594" class="pginternal">594.</a></dt>
			<dd class="tei tei-notetext">Cc. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XV">15</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVI">16</a>, and <a class="tei tei-ref pginternal" href="#Book_V_Chap_VII">V, 7</a>. He was of Ceaulin's line (<a class="tei tei-ref pginternal" href="#Book_II_Chap_V">II, 5</a>) and so belonged to
			a younger branch of the West Saxon royal house. Welsh writers
			confuse him with the British king, Caedwalla (<a class="tei tei-ref pginternal" href="#Book_II_Chap_XX">II, 20</a>), and with his
			son, Cadwalader.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_595" id="note_595" class="pginternal">595.</a></dt>
			<dd class="tei tei-notetext">A son of Penda. He succeeded his
			brother Wulfhere in 675. In 704 he became a monk (<a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">V, 24</a>) and afterwards
			Abbot of Bardney Monastery (cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XI">III, 11</a>), which he is said to have founded. His
			invasion of Kent was probably provoked by an attempt on the part of
			that kingdom, at Wulfhere's death, to resume a position of
			independence towards Mercia. In spite of his conduct on this raid,
			Theodore, Florence of Worcester, and others, speak of the
			saintliness of his character.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_596" id="note_596" class="pginternal">596.</a></dt>
			<dd class="tei tei-notetext">Cc. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_II">2</a> (and note), <a class="tei tei-ref pginternal" href="#Book_IV_Chap_V">5</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_597" id="note_597" class="pginternal">597.</a></dt>
			<dd class="tei tei-notetext">C. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_VI">6</a>, and note, and <span class="tei tei-hi"><span style="font-style: italic">infra</span></span>,
			p. <a class="tei tei-ref pginternal" href="#Pg244">244</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_598" id="note_598" class="pginternal">598.</a></dt>
			<dd class="tei tei-notetext">The dates of these changes in the
			episcopate are uncertain. Probably Gebmund was consecrated in 678.
			For his death, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_V_Chap_VIII">V, 8</a> <span class="tei tei-hi"><span style="font-style: italic">ad fin.</span></span>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_599" id="note_599" class="pginternal">599.</a></dt>
			<dd class="tei tei-notetext">This was Wilfrid's first expulsion
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">V, 19</a>). Bede's reticence on the subject is
			noteworthy. Egfrid's hostility to his former friend, Wilfrid, was
			doubtless caused by Wilfrid's encouragement of Queen Ethelthryth
			(cc. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIX">19</a>,
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XX">20</a>) in her
			desire to take the veil. It was probably increased by Egfrid's
			second wife, Eormenburg, who is said to have resented Wilfrid's
			power and magnificence. Theodore, carrying out his policy of
			subdivision, availed himself of the opportunity afforded by this
			dissension. He consulted some of his suffragans (we do not know who
			they were; it was apparently at a mixed council of ecclesiastics
			and laymen), but did not communicate with Wilfrid, being, no doubt,
			conscious of the uselessness of trying to get his consent. Wilfrid,
			after demanding an explanation from the archbishop and the king in
			a Northumbrian <span class="tei tei-q">“gemot,”</span> and
			receiving no satisfaction, appealed to Rome (cf. V, 19, p. <a class="tei tei-ref pginternal" href="#Pg351">351</a>). For the importance of this
			step, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Bright, <span class="tei tei-q">“Early English Church History,”</span> pp.
			323-326.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_600" id="note_600" class="pginternal">600.</a></dt>
			<dd class="tei tei-notetext">Probably the intention was that
			Wilfrid should keep the larger part of Deira, with his see at York,
			and that three new dioceses should be formed. But, on his departure
			to appeal to Rome, it was assumed that he had resigned his
			bishopric, and Bosa was consecrated Bishop of Deira with his see at
			York, Eata, Bishop of the Bernicians, with the option of fixing his
			see either at Lindisfarne or Hagustald (Hexham). These two were
			<span class="tei tei-q">“substituted for him.”</span> Lindsey,
			which at this time belonged to Northumbria, became for the first
			time a separate diocese. When it passed again to Mercia in 679 it
			was included in the subdivision of the Mercian bishopric, and
			Ethelwin (<span class="tei tei-hi"><span style="font-style: italic">v. infra</span></span> note 6) became its
			bishop with his see at Sidnacaestir (generally identified with
			Stow, but the locality is unknown).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_601" id="note_601" class="pginternal">601.</a></dt>
			<dd class="tei tei-notetext">He was one of the bishops educated in
			Hilda's monastery (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIII">23</a>). Bede speaks
			highly of him (V, <a class="tei tei-ref pginternal" href="#Book_V_Chap_III">3</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XX">20</a>), and Alcuin calls him <span class="tei tei-q">“vir sine fraude bonus.”</span> He retired from York
			when Wilfrid was restored, but appears to have been reinstated on
			Wilfrid's second expulsion.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_602" id="note_602" class="pginternal">602.</a></dt>
			<dd class="tei tei-notetext">Abbot of Melrose, afterwards of
			Lindisfarne (<a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVI">III,
			26</a>, and note; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVII">IV, 27</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_IX">V, 9</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_603" id="note_603" class="pginternal">603.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVIII">III, 28</a>, and this Chapter, <span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_604" id="note_604" class="pginternal">604.</a></dt>
			<dd class="tei tei-notetext">In 675. Lindsey which had been
			Northumbrian under Edwin and Oswald, had passed through many
			vicissitudes. Penda conquered it, Oswy recovered it (in 655),
			Wulfhere conquered it again, Egfrid recovered it (675). It passed
			finally to Mercia under Ethelred in 679 (<span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span> this Chapter, <span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_605" id="note_605" class="pginternal">605.</a></dt>
			<dd class="tei tei-notetext">III, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XI">11</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVII">27</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_606" id="note_606" class="pginternal">606.</a></dt>
			<dd class="tei tei-notetext">He was still Bishop of Lindsey in 706,
			when he signed a charter of Ethelward, <span class="tei tei-q">“subregulus”</span> of the Hwiccas.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_607" id="note_607" class="pginternal">607.</a></dt>
			<dd class="tei tei-notetext">Preface, p. <a class="tei tei-ref pginternal" href="#Pg004">4</a>, and <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIII">V, 23</a>. Simeon of Durham says that he died in
			732.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_608" id="note_608" class="pginternal">608.</a></dt>
			<dd class="tei tei-notetext">Lindsey was at that time subject to
			Mercia. Sexwulf was expelled when Egfrid conquered it in 675. When
			the Mercian diocese was subdivided, he retained his see at
			Lichfield (<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. 3, p. <a class="tei tei-ref pginternal" href="#Pg219">219</a>, note) as Bishop of the Mercians
			proper.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_609" id="note_609" class="pginternal">609.</a></dt>
			<dd class="tei tei-notetext">By Theodore alone. The suffragans did
			not take part in the consecration.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_610" id="note_610" class="pginternal">610.</a></dt>
			<dd class="tei tei-notetext">In 681 a fresh subdivision took place.
			The Bernician diocese was divided, Eata retaining Lindisfarne and
			giving up Hexham to Tunbert. Afterwards Eata retired from
			Lindisfarne in favour of Cuthbert and took Hexham (<span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span> c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVIII">28</a>). Tunbert had been Abbot of Gilling (In
			Getlingum, III, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIV">14</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">24</a>). He was deposed by Theodore from Hexham three
			years after his consecration (<span class="tei tei-hi"><span style="font-style: italic">v. infra</span></span> c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVIII">28</a>), like Wynfrid,
			<span class="tei tei-q">“pro culpa cujusdam inobedientiae”</span>
			(Vita Eatae in <span class="tei tei-q">“Miscellanea
			Biographica,”</span> Surtees Society).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_611" id="note_611" class="pginternal">611.</a></dt>
			<dd class="tei tei-notetext">His see was not at Whitern among the
			Picts of Galloway, as has been supposed (Florence of Worcester,
			Richard of Hexham, and others), but at the monastery of Abercorn on
			the Forth (<a class="tei tei-ref pginternal" href="#Book_I_Chap_XII">I,
			12</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">IV,
			26</a>), the Picts north of the Forth being at this time subject to
			Northumbria. After Egfrid's disastrous expedition in 685, they
			freed themselves from Northumbrian rule, the see was abandoned, and
			Trumwine retired to Whitby (c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">26</a>). We hear of him as one of the deputation to
			Cuthbert in 684 (c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVIII">28</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_612" id="note_612" class="pginternal">612.</a></dt>
			<dd class="tei tei-notetext">In 679; <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span>,
			p. <a class="tei tei-ref pginternal" href="#Pg243">243</a>, note 5.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_613" id="note_613" class="pginternal">613.</a></dt>
			<dd class="tei tei-notetext">Whether Ripon became for a time an
			episcopal see seems doubtful. In <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVIII">III, 28</a>, Bede says distinctly that Eadhaed
			became <span class="tei tei-q">“praesul”</span> of the church
			there, and it does not seem consistent with his use to understand
			it as = abbot. Probably there was an attempt to subdivide the
			diocese of Deira (Eddius mentions it as one of Wilfrid's
			grievances), but the scheme was abandoned when Wilfrid was restored
			in 705. Ripon did not finally become an episcopal see till
			1836.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_614" id="note_614" class="pginternal">614.</a></dt>
			<dd class="tei tei-notetext">For a fuller account, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">V, 19</a>, and
			notes.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_615" id="note_615" class="pginternal">615.</a></dt>
			<dd class="tei tei-notetext">For the early importance of this
			kingdom under Aelli, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_II_Chap_V">II, 5</a>. It had become a small insignificant
			nation, cut off from its neighbours by forests (the <span class="tei tei-q">“Andredsweald”</span>) and marshes, and though we read
			(<a class="tei tei-ref pginternal" href="#Book_III_Chap_XX">III, 20</a>) that
			Damian, bishop of Rochester, was of the South Saxon race, it was
			almost untouched by Christian influences.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_616" id="note_616" class="pginternal">616.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">infra</span></span>
			c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XV">15</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_617" id="note_617" class="pginternal">617.</a></dt>
			<dd class="tei tei-notetext">He also brought about the reconversion
			of the East Saxons by sending Bishop Jaruman to them. Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXX">III, 30</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_618" id="note_618" class="pginternal">618.</a></dt>
			<dd class="tei tei-notetext">Wulfhere had invaded Wessex, probably
			in 661 (Sax. Chron.), and conquered the Isle of Wight and the
			district of the Meanware, <span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>, the district from
			Southampton Water to the South Downs. The inhabitants were Jutes.
			The name survives in the hundreds, Meonstoke, and East and West
			Meon. For the termination <span class="tei tei-q">“ware”</span> =
			dwellers, cf. Lindisfari, Cantuarii, Boructuari, etc.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_619" id="note_619" class="pginternal">619.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIV">14</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_620" id="note_620" class="pginternal">620.</a></dt>
			<dd class="tei tei-notetext">Cf. II, 2, p. <a class="tei tei-ref pginternal" href="#Pg084">84</a>, note 2.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_621" id="note_621" class="pginternal">621.</a></dt>
			<dd class="tei tei-notetext">They were probably joint kings of the
			Hwiccas.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_622" id="note_622" class="pginternal">622.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“Scottish,”</span> as usual, means Irish. There is
			another Dicul mentioned in <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIX">III, 19</a>. Stevenson suggests the identification of
			this Dicul with the Irish monk who wrote a geographical work, the
			<span class="tei tei-q">“De Mensura Orbis Terrae,”</span> but he
			lived in the ninth century.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_623" id="note_623" class="pginternal">623.</a></dt>
			<dd class="tei tei-notetext">Bosham, near Chichester. It was the
			favourite South Saxon abode of Harold and Godwine (Freeman,
			<span class="tei tei-q">“Norman Conquest”</span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_624" id="note_624" class="pginternal">624.</a></dt>
			<dd class="tei tei-notetext">Selsey, the island of the seal
			(<span class="tei tei-q">“sea-calf”</span>), south of Chichester.
			It was a royal <span class="tei tei-q">“vill.”</span> It became the
			episcopal see for the South Saxons at some time about 709 (cf.
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">V, 18</a>,
			<span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span> and note), transferred to Chichester in
			1075.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_625" id="note_625" class="pginternal">625.</a></dt>
			<dd class="tei tei-notetext">Egfrid fell at the battle of
			Nechtansmere in 685 (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">26</a>), and Wilfrid was
			restored to his bishopric <span class="tei tei-q">“in the second
			year of Aldfrid,”</span> Egfrid's successor (V, 19, p. <a class="tei tei-ref pginternal" href="#Pg353">353</a>). He was in Wessex with
			Caedwalla for part of the year 686 (cf. c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVI">16</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_626" id="note_626" class="pginternal">626.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_III_Chap_XIII">III, 13</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_627" id="note_627" class="pginternal">627.</a></dt>
			<dd class="tei tei-notetext">C. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIII">13</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_628" id="note_628" class="pginternal">628.</a></dt>
			<dd class="tei tei-notetext">This English equivalent for
			<span class="tei tei-q">“viaticum”</span> is used by Stapleton in
			his translation (1565).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_629" id="note_629" class="pginternal">629.</a></dt>
			<dd class="tei tei-notetext">Calendars to show the proper days for
			commemorative Masses, cf. <span class="tei tei-hi"><span style="font-style: italic">infra</span></span> <span class="tei tei-q">“chronicle”</span> (<span class="tei tei-q">“annale”</span>). The burial was generally on the day
			of death, hence <span class="tei tei-q">“depositio”</span> of the
			festival of a saint.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_630" id="note_630" class="pginternal">630.</a></dt>
			<dd class="tei tei-notetext">It must be remembered that this was a
			monastery of Northumbrians. But Oswald is said to have held an
			<span class="tei tei-q">“imperium”</span> over all England except
			Kent (<a class="tei tei-ref pginternal" href="#Book_II_Chap_V">II,
			5</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_631" id="note_631" class="pginternal">631.</a></dt>
			<dd class="tei tei-notetext">C. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_632" id="note_632" class="pginternal">632.</a></dt>
			<dd class="tei tei-notetext">The West Saxons, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_II_Chap_V">II, 5</a> and note.
			Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">III,
			7</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_633" id="note_633" class="pginternal">633.</a></dt>
			<dd class="tei tei-notetext">C. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIII">13</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_634" id="note_634" class="pginternal">634.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_V_Chap_VII">V, 7</a> <span class="tei tei-hi"><span style="font-style: italic">ad fin.</span></span> Like Caedwalla, a
			descendant of Ceaulin, <span class="tei tei-q">“A king who deserves
			the name of great”</span> (Bright), great both as a conqueror and a
			legislator. He was probably the first king to introduce written law
			into Wessex, viz., his famous <span class="tei tei-q">“Dooms,”</span> enacted by a West Saxon witenagemot in
			the early years of his reign.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_635" id="note_635" class="pginternal">635.</a></dt>
			<dd class="tei tei-notetext">Winchester. At this time Haedde was
			bishop there (c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a>). For the creation of a South Saxon bishopric
			<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_V_Chap_XIII">V, 18</a> <span class="tei tei-hi"><span style="font-style: italic">ad fin.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_636" id="note_636" class="pginternal">636.</a></dt>
			<dd class="tei tei-notetext">Eddius says that Caedwalla sent for
			him and made him his counsellor; Wilfrid had befriended him when in
			exile.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_637" id="note_637" class="pginternal">637.</a></dt>
			<dd class="tei tei-notetext">Roger of Wendover calls him a
			<span class="tei tei-foreign"><span style="font-style: italic">subregulus</span></span>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_638" id="note_638" class="pginternal">638.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XV">I, 15</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_639" id="note_639" class="pginternal">639.</a></dt>
			<dd class="tei tei-notetext">Stoneham on the Itchen, near
			Southampton. For the preposition, cf. II, 14, p. <a class="tei tei-ref pginternal" href="#Pg119">119</a>, note 5.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_640" id="note_640" class="pginternal">640.</a></dt>
			<dd class="tei tei-notetext">Redbridge in Hampshire.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_641" id="note_641" class="pginternal">641.</a></dt>
			<dd class="tei tei-notetext">Pref., p. <a class="tei tei-ref pginternal" href="#Pg003">3</a> and note; <a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">V, 18</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_642" id="note_642" class="pginternal">642.</a></dt>
			<dd class="tei tei-notetext">The Solent.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_643" id="note_643" class="pginternal">643.</a></dt>
			<dd class="tei tei-notetext">The Hamble.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_644" id="note_644" class="pginternal">644.</a></dt>
			<dd class="tei tei-notetext">Eutyches was Archimandrite of a
			monastery near Constantinople. He was condemned by the synod of
			Constantinople in 448, and by the council of Chalcedon in 451. He
			was the originator of the Monophysite heresy which denied the
			existence of the two natures, the Divine and human, in the
			Incarnate Son. Monothelitism, which was the subject of the
			controversy alluded to here, arose out of an attempt to reconcile
			the Monophysites by the assertion of one will and operation
			(activity, ἐνέργεια) in our Lord. It was condemned in the General
			Council of Constantinople, 680-681. In anticipation of this council
			various provincial synods were held, as well as the synod at Rome
			assembled by Pope Agatho, at which Wilfrid represented the English
			church (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">V. 19</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_645" id="note_645" class="pginternal">645.</a></dt>
			<dd class="tei tei-notetext">The year was 680 (cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">V, 24</a>), but it falls in
			the eighth year of Hlothere of Kent, who succeeded in July, 673.
			For Egfrid, <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_V">5</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			init.</span></span> Probably he succeeded in 671. Ethelred of
			Mercia succeeded in 675 (<a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">V, 24</a>), so that Sept., 680, might easily fall in
			his sixth year; Aldwulf, of East Anglia, in 663 or 664
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_II_Chap_XV">II, 15</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIII">IV, 23</a>). The eighth indiction, whether
			Cæsarean or Pontifical (<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_V">5</a>, note), includes Sept.
			17, 680.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_646" id="note_646" class="pginternal">646.</a></dt>
			<dd class="tei tei-notetext">Generally identified with Hatfield in
			Hertfordshire, but T. Kerslake (<span class="tei tei-q">“Vestiges
			of the supremacy of Mercia”</span>) supposes it to be Clovesho
			(Cliff-at-Hoe); <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_V">5</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_647" id="note_647" class="pginternal">647.</a></dt>
			<dd class="tei tei-notetext">The five Oecumenical Councils which
			had been held before this time, viz., Nicaea, in 325;
			Constantinople, in 381-382; Ephesus, in 431; Chalcedon, in 451;
			Constantinople, in 553. For the Arian heresy, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_I_Chap_VIII">I, 8</a> (and
			note), where <span class="tei tei-q">“madness”</span> (<span class="tei tei-q">“vesania”</span>) is, as here, the word used to
			describe it. Macedonius was a <span class="tei tei-q">“semi-Arian,”</span> Eudoxius an Arian; both were
			bishops of Constantinople. Nestorius was consecrated Bishop of
			Constantinople in 428. He popularized the heresy which originated
			with Theodore, Bishop of Mopsuestia, 392-428. It consisted in
			emphasizing the human element in our Lord's Nature to the practical
			exclusion of the Divine, as a reaction against Apollinarianism
			which explained away His real Humanity. <span class="tei tei-q">“The Christ of Nestorius was, after all, simply a
			deified man, not God incarnate”</span> (Gore, <span class="tei tei-q">“Bampton Lectures”</span>). Theodoret, Bishop of Cyrus
			in Syria (died 457) and Ibas, Bishop of Edessa, 435-457, were
			disciples of Theodore, Bishop of Mopsuestia, and opponents of Cyril
			of Alexandria, who is accused of Apollinarianism in the letter of
			Ibas.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_648" id="note_648" class="pginternal">648.</a></dt>
			<dd class="tei tei-notetext">Justinian I, 527-565.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_649" id="note_649" class="pginternal">649.</a></dt>
			<dd class="tei tei-notetext">The first Lateran Council, in 649,
			against the Monothelites. Martin I, Pope 649-655, died in the
			Crimea, exiled and imprisoned by the Emperor Constans II in
			consequence of his resistance to the heresy.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_650" id="note_650" class="pginternal">650.</a></dt>
			<dd class="tei tei-notetext">Constantine IV, more generally known
			as Constans II, 641-688.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_651" id="note_651" class="pginternal">651.</a></dt>
			<dd class="tei tei-notetext">We have here, under the auspices of an
			Eastern Archbishop, a clear enunciation of the doctrine which
			afterwards divided the east and west: the Double Procession of the
			Holy Spirit. The <span class="tei tei-q">“filioque”</span> clause,
			which formed no part of the Nicene Creed, nor of its
			Constantinopolitan recension, had been formally adopted at the
			Third Council of Toledo in 589 and at subsequent Spanish councils.
			The English prelates at Hatfield were probably influenced by this
			precedent.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_652" id="note_652" class="pginternal">652.</a></dt>
			<dd class="tei tei-notetext">Cf. Bede's <span class="tei tei-q">“History of the Abbots,”</span> § 6.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_653" id="note_653" class="pginternal">653.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, St. Peter's at Rome. The
			Monastery of St. Martin was on the Esquiline. It was founded by
			Pope Symmachus in honour of SS. Sylvester and Martin.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_654" id="note_654" class="pginternal">654.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_I">1</a>, notes. (For his life, v. Bede's
			<span class="tei tei-q">“History of the Abbots,”</span> and the
			Anon. <span class="tei tei-q">“History of the Abbots.”</span>) He
			has not been mentioned before in this history. His ecclesiastical
			surname was Benedict, <span class="tei tei-q">“Baducing”</span> was
			probably his patronymic. He was of noble birth and a thegn of King
			Oswy, born in 628. He was the companion of Wilfrid on his first
			journey to Rome (<a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">V,
			19</a>). In his native province of Northumbria he founded the
			monasteries of Wearmouth (in 674) and Jarrow (<span class="tei tei-hi"><span style="font-style: italic">circ.</span></span>
			681), where Bede's life was passed, and enriched them with
			furniture, vestments, relics, pictures, and a library of valuable
			books which he brought from the Continent. The rule which he framed
			for his monasteries was Benedictine, compiled from seventeen
			different monasteries which he had visited. He died Jan. 12,
			689.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_655" id="note_655" class="pginternal">655.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXI">V, 21</a>. Bede's <span class="tei tei-q">“History of
			the Abbots,”</span> and Anon. <span class="tei tei-q">“History of
			the Abbots.”</span> He added to Benedict's library. He had been a
			monk at Ripon under Wilfrid, became Abbot of Jarrow in 681, and of
			Wearmouth in addition to Jarrow in 688. In 716 he resigned and set
			out for Rome, but died at Langres in the same year. Bede was
			trained under him (<a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">V, 24</a>) and was probably the little boy left alone
			with him to recite the offices when the pestilence of 686 swept
			away the monks. (Anon. Hist. Abb. § 14.)</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_656" id="note_656" class="pginternal">656.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XX">II, 20</a>, <span class="tei tei-hi"><span style="font-style: italic">ad fin.</span></span>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_657" id="note_657" class="pginternal">657.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVII">17</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_658" id="note_658" class="pginternal">658.</a></dt>
			<dd class="tei tei-notetext">In the Council of Constantinople,
			680-681 (<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVII">17</a> <span class="tei tei-hi"><span style="font-style: italic">ad
			init.</span></span>, note.)</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_659" id="note_659" class="pginternal">659.</a></dt>
			<dd class="tei tei-notetext">To St. Martin's own church at Tours,
			where, as Abbot of St. Martin's monastery at Rome, it was specially
			fitting that he should find burial.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_660" id="note_660" class="pginternal">660.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">III, 7</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_661" id="note_661" class="pginternal">661.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“Princeps,”</span> A.S. Ealdorman. The county of the
			Southern Gyrwas was South Cambridgeshire. Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XX">III, 20</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_662" id="note_662" class="pginternal">662.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXV">25</a>. Bede tells us in the <span class="tei tei-q">“Life of Cuthbert,”</span> that she was a half sister
			of Oswy's on the mother's side. Her name survives in Ebchester on
			the Derwent, where she founded a nunnery; in St. Abb's Head, near
			which she afterwards founded the double monastery of Coldingham;
			and in St. Ebbe's, Oxford. She was the friend of Cuthbert, and it
			was to her exhortations to Egfrid that Wilfrid owed his release
			from prison.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_663" id="note_663" class="pginternal">663.</a></dt>
			<dd class="tei tei-notetext">Coldingham in Berwickshire. It was a
			mixed monastery. Cf. c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXV">25</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_664" id="note_664" class="pginternal">664.</a></dt>
			<dd class="tei tei-notetext">Ely. The Isle of Ely was her jointure
			from her first husband. She received the help and support of
			Aldwulf, king of East Anglia (<a class="tei tei-ref pginternal" href="#Book_II_Chap_XV">II, 15</a>; IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVII">17</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIII">23</a>), her cousin (he was the son of Ethelhere and
			nephew of Anna). The monastery was founded in 673. It was exempted
			from the jurisdiction of the East Anglian bishop, and subject to
			Wilfrid.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_665" id="note_665" class="pginternal">665.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_III_Chap_VIII">III, 8</a>, cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">III, 7</a>, note. After her husband's death she acted
			as regent for a time, then founded a monastery in the Isle of
			Sheppey, and became abbess of it. Thence she retired to Ely, where,
			after being a simple nun, she succeeded Ethelthryth as abbess. She
			was herself succeeded first at Sheppey, and afterwards at Ely, by
			her daughter Ermingild, widow of Wulfhere of Mercia.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_666" id="note_666" class="pginternal">666.</a></dt>
			<dd class="tei tei-notetext">Grantchester, near Cambridge.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_667" id="note_667" class="pginternal">667.</a></dt>
			<dd class="tei tei-notetext">A Roman sarcophagus. A number of
			fragments of very ancient stone coffins have been found there,
			built into the wall of the church (Mayor and Lumby).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_668" id="note_668" class="pginternal">668.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“Audrey”</span> is the popular form of the name
			Ethelthryth. A <span class="tei tei-q">“tawdry lace”</span>
			(<span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span> St. Audrey lace) is a
			necklace; cf. <span class="tei tei-q">“Winter's Tale,”</span> iv.
			3. Hence our word <span class="tei tei-q">“tawdry,”</span> which
			possibly only derives its meaning from the cheap necklaces, etc.,
			sold at St. Audrey's fair at Ely on the saint's day, October 17
			(the day of her translation), but may also be a reminiscence of
			this anecdote.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_669" id="note_669" class="pginternal">669.</a></dt>
			<dd class="tei tei-notetext">The poem is (1) alphabetical;
			<span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>, the first letters of the
			hexameter lines form the alphabet, and there are four additional
			couplets at the end, in which the first letters form the word
			<span class="tei tei-q">“Amen”</span>; (2) <span class="tei tei-q">“serpentine,”</span> reciprocal or echoing;
			<span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>, the last half of the
			pentameter repeats the first two and a half feet of the hexameter.
			Such verses are common in mediaeval Latin, and are doubtless a
			development from the occasional instances of echoing lines which
			occur in the classical poets (<span class="tei tei-hi"><span style="font-style: italic">e.g.</span></span>, Martial VIII, xxi, 1-2;
			IX, 97; Ovid, Fasti IV, 365-366), as the extreme form of that
			impulse to give emphasis by iteration which is a marked feature of
			Latin poetry, particularly of the Ovidian elegiac.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_670" id="note_670" class="pginternal">670.</a></dt>
			<dd class="tei tei-notetext">Agatha suffered 5th February, 251
			<span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>, in the Decian
			persecution, according to her <span class="tei tei-q">“Acta”</span>
			(the Diocletian, according to the Martyrology and Aldhelm). Eulalia
			was burnt to death at the age of twelve in the Diocletian
			persecution, having denounced herself. The legend tells that a
			white dove hovered over her ashes till snow fell and covered them.
			Tecla, the disciple of St. Paul, is said to have been the first
			virgin martyr. She was miraculously saved from her martyrdom and
			died in peace long after. Euphemia was torn by wild beasts at
			Chalcedon in 307 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span> in the Diocletian
			persecution. Asterius, Bishop of Amasea, 400 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>, says that he saw a
			tablet in the church at Chalcedon depicting her sufferings. We have
			thus very early evidence for her history. Agnes is said to have
			been beheaded in 304 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>, in the Diocletian
			persecution, at the age of twelve or thirteen. The date of St.
			Cecilia is very uncertain; Fortunatus, Bishop of Poitiers, says
			that she died <span class="tei tei-hi"><span style="font-style: italic">circ.</span></span> 176-180 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>, but another account
			places her martyrdom as late as the time of Diocletian. Her
			connection with music does not appear in the legends, and is
			probably due to the fact that Pope Paschal endowed the monastery
			which he built in connection with her church at Rome to provide for
			musical services at her tomb day and night.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_671" id="note_671" class="pginternal">671.</a></dt>
			<dd class="tei tei-notetext">She had not been a queen twelve years.
			The dates are probably these: she was born about 630 at Ermynge
			(Ixning) in Suffolk, and married to Tondbert in 652. Tondbert died
			in 655, and she was married to Egfrid (who must then have been only
			fifteen) in 660. Egfrid succeeded to the throne in 670 or 671, and
			it must have been in 672 that she retired to Coldingham. She was,
			therefore, queen for not more than two years, though perhaps we may
			accept the statement of the Liber Eliensis that Egfrid was sub-king
			of Deira for some years before his accession.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_672" id="note_672" class="pginternal">672.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, she had been buried
			sixteen years; <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIX">19</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_673" id="note_673" class="pginternal">673.</a></dt>
			<dd class="tei tei-notetext">Literally the water snake, ὕδρος, used
			generally for any serpent, and so = the Devil; <span class="tei tei-foreign"><span style="font-style: italic">Chelydrus</span></span> is similarly used
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Ducange).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_674" id="note_674" class="pginternal">674.</a></dt>
			<dd class="tei tei-notetext">The Battle of the Trent in 679 (cf.
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">V, 24</a>). It was
			on the anniversary of Wilfrid's expulsion; he is said to have
			foretold a calamity. The place may, perhaps, be identified with
			Elford-on-Trent, in Staffordshire; it is supposed that the name may
			be a reminiscence of Aelfwine. By this battle Mercia regained
			Lindsey, which never again became Northumbrian (cf. c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_675" id="note_675" class="pginternal">675.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXII">22</a>, where he is called <span class="tei tei-q">“King Aelfwine,”</span> as also twice in Eddius. He may
			have been sub-king of Deira.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_676" id="note_676" class="pginternal">676.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_III_Chap_XI">III, 11</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">V, 24</a>. When Wilfrid took refuge in Mercia in 681,
			she and her husband expelled him <span class="tei tei-q">“pro
			adulatione Egfridi regis”</span> (Eddius).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_677" id="note_677" class="pginternal">677.</a></dt>
			<dd class="tei tei-notetext">The <span class="tei tei-q">“Wergild,”</span> <span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>, pecuniary value set upon
			every man's life according to his status (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			Stubbs, <span class="tei tei-q">“Constitutional
			History”</span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_678" id="note_678" class="pginternal">678.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“Comes,”</span> A.S. <span class="tei tei-q">“gesith.”</span> Above, Imma is described as
			<span class="tei tei-q">“de militia ejus juvenis,”</span>
			<span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>, a young <span class="tei tei-q">“king's thegn”</span> (the term applied to him in the
			A.S. version).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_679" id="note_679" class="pginternal">679.</a></dt>
			<dd class="tei tei-notetext">Towcester (<span class="tei tei-q">“Tovecester,”</span> in Domesday Book) in
			Northamptonshire, Doncaster, and Littleborough have all been
			suggested, but the place has not been identified. The name
			indicates that it had been a Roman station.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_680" id="note_680" class="pginternal">680.</a></dt>
			<dd class="tei tei-notetext">Sexburg. Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_VIII">III, 8</a>; IV, 19, p.
			<a class="tei tei-ref pginternal" href="#Pg261">261</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_681" id="note_681" class="pginternal">681.</a></dt>
			<dd class="tei tei-notetext">Cf. III, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">24</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">25</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIV">IV, 24</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">V, 24</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_682" id="note_682" class="pginternal">682.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_683" id="note_683" class="pginternal">683.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">infra</span></span>,
			this Chapter. He was the son of Edwin's elder brother, who died in
			exile after the invasion of Deira by Ethelric, king of Bernicia, in
			589.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_684" id="note_684" class="pginternal">684.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_II_Chap_IX">II, 9</a>, foll.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_685" id="note_685" class="pginternal">685.</a></dt>
			<dd class="tei tei-notetext">Her sister, Heresuid, had married
			Ethelhere, brother of Anna, of East Anglia, whom he succeeded. In
			647, when Hilda took the veil, Anna was still king.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_686" id="note_686" class="pginternal">686.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_III_Chap_VIII">III, 8</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_687" id="note_687" class="pginternal">687.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XV">II, 15</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVII">IV, 17</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_688" id="note_688" class="pginternal">688.</a></dt>
			<dd class="tei tei-notetext">A small cell, not otherwise
			known.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_689" id="note_689" class="pginternal">689.</a></dt>
			<dd class="tei tei-notetext">Hartlepool, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> III,
			24, p. <a class="tei tei-ref pginternal" href="#Pg190">190</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_690" id="note_690" class="pginternal">690.</a></dt>
			<dd class="tei tei-notetext">Bede is the sole authority for her
			life. A fifteenth century gloss on one of the MSS. has led to her
			being wrongly identified with the Irish Bega, the supposed
			foundress of St. Bees.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_691" id="note_691" class="pginternal">691.</a></dt>
			<dd class="tei tei-notetext">A Roman station on the Wharfe, now
			Tadcaster. Probably the nunnery was at Healaugh (Heiu's
			<span class="tei tei-foreign"><span style="font-style: italic">laeg</span></span> = territory), three miles
			north of Calcaria. A gravestone bearing Heiu's name has been found
			there.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_692" id="note_692" class="pginternal">692.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_693" id="note_693" class="pginternal">693.</a></dt>
			<dd class="tei tei-notetext">His name does not appear in any of the
			lists of bishops. There is no evidence that a see of Dorchester
			(cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">III, 7</a>,
			and note) existed at this time, except from this passage and the
			statement of Florence of Worcester to the effect that a fivefold
			division of the Mercian diocese took place in 679, that Dorchester
			was included in Mercia, and that Aetla was appointed as its bishop.
			Probably this latter statement is derived from Bede. It has been
			proposed to identify Aetla with Haedde, Bishop of the West Saxons
			(<a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">III, 7</a>;
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">IV, 12</a>;
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">V, 18</a>), but it
			seems unlikely that Bede should not have mentioned their identity.
			The most probable explanation seems to be that a see was
			established about 679 at Dorchester (which may have been under
			Mercia at the time) and that Aetla was its bishop, but that it had
			only a very short existence.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_694" id="note_694" class="pginternal">694.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">infra</span></span>,
			notes.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_695" id="note_695" class="pginternal">695.</a></dt>
			<dd class="tei tei-notetext">John of Beverley, <span class="tei tei-q">“Inderauuda”</span> (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_II">V, 2</a>). He and
			Berthun (<span class="tei tei-hi"><span style="font-style: italic">ibid.</span></span>) are said to have founded
			Beverley. He was consecrated Bishop of Hexham, probably in 687,
			transferred to York 705, when Wilfrid was restored to Hexham, and
			died in 721, soon after his retirement to Beverley (<a class="tei tei-ref pginternal" href="#Book_V_Chap_VI">V, 6</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span>). As Bishop of Hexham he ordained Bede both
			deacon and priest (<a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">V. 24</a>). He had been a pupil of Archbishop
			Theodore (cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_III">V.
			3</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_696" id="note_696" class="pginternal">696.</a></dt>
			<dd class="tei tei-notetext">Wilfrid II, Bishop of York. He
			succeeded John (<a class="tei tei-ref pginternal" href="#Book_V_Chap_VI">V,
			6</a>) in 718, and was still Bishop of York in 731 when Bede
			finished the History (cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIII">V, 23</a>). In 732 he resigned and was succeeded by
			Egbert (to whom Bede addressed the Ep. ad Egb., and who in 735
			received the pallium as Archbishop of York). Wilfrid died in 745
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Continuation">Continuation</a>, 732, 735, and 745). His
			character is highly praised by Alcuin (De Sanct. Ebor.).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_697" id="note_697" class="pginternal">697.</a></dt>
			<dd class="tei tei-notetext">Hartlepool and Whitby, both apparently
			double monasteries.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_698" id="note_698" class="pginternal">698.</a></dt>
			<dd class="tei tei-notetext">Cf. II, 2, p. <a class="tei tei-ref pginternal" href="#Pg084">84</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_699" id="note_699" class="pginternal">699.</a></dt>
			<dd class="tei tei-notetext">Dr. Stubbs suggests that this sub-king
			of the Hwiccas may possibly be the same as Osric of Northumbria,
			<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIII">V, 23</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_700" id="note_700" class="pginternal">700.</a></dt>
			<dd class="tei tei-notetext">The see was at Worcester. The
			foundation of the bishopric is assigned by Florence of Worcester to
			the year 679, the date of the alleged fivefold division of the
			Mercian diocese (<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> p. <a class="tei tei-ref pginternal" href="#Pg272">272</a>, note 2), Bosel being appointed bishop.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_701" id="note_701" class="pginternal">701.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a> and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_702" id="note_702" class="pginternal">702.</a></dt>
			<dd class="tei tei-notetext">The consecration of Oftfor is
			generally placed in 691. It was after Wilfrid's second expulsion,
			when he was acting as Bishop of Leicester. Theodore had died in
			690, and Bertwald was not consecrated till 693 (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_VIII">V, 8</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_703" id="note_703" class="pginternal">703.</a></dt>
			<dd class="tei tei-notetext">So Florence of Worcester.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_704" id="note_704" class="pginternal">704.</a></dt>
			<dd class="tei tei-notetext">He was king of the Britons of Loidis
			and Elmet. It was probably to avenge the death of his nephew,
			Hereric, that Edwin conquered Loidis and drove out Cerdic.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_705" id="note_705" class="pginternal">705.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIV">14</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_706" id="note_706" class="pginternal">706.</a></dt>
			<dd class="tei tei-notetext">Hackness, thirteen miles from Whitby
			and three to the west of Scarborough. It was a cell belonging to
			Whitby. At the dissolution under Henry VIII, it contained only four
			monks, of the Benedictine order (Dugdale, <span class="tei tei-q">“Monasticon”</span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_707" id="note_707" class="pginternal">707.</a></dt>
			<dd class="tei tei-notetext">She has been confused with Heiu and
			with Bega, <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> p. <a class="tei tei-ref pginternal" href="#Pg271">271</a>, note 7.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_708" id="note_708" class="pginternal">708.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, the Prioress.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_709" id="note_709" class="pginternal">709.</a></dt>
			<dd class="tei tei-notetext">Obviously ballads, probably of a
			warlike character, existed before Caedmon, but he is regarded as
			the father of English sacred poetry. It is a question how far the
			new impulse arose independently among the Anglo-Saxons, or is to be
			connected with Old Saxon religious poetry of which the <span class="tei tei-q">“Heliand”</span> is the only extant specimen (cf.
			Plummer, <span class="tei tei-hi"><span style="font-style: italic">ad loc.</span></span>). Of the mass of poetry
			attributed to Caedmon, much must be regarded as not his actual
			work. The fragment translated here by Bede has been accepted as
			genuine by most critics. It exists in the Northumbrian dialect at
			the end of the Moore MS. of Bede, and in a West Saxon form in other
			MSS., as well as in the Anglo-Saxon translation of Bede's History,
			the Northumbrian version being the oldest.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_710" id="note_710" class="pginternal">710.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“Villicus,”</span> A.S. <span class="tei tei-q">“tun-gerefa”</span> = town-reeve, <span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>,
			headman of the township. Cædmon was apparently a herdsman on a farm
			belonging to the monastery.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_711" id="note_711" class="pginternal">711.</a></dt>
			<dd class="tei tei-notetext">Cf. Levit., xi, 3, and Deut., xiv,
			6.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_712" id="note_712" class="pginternal">712.</a></dt>
			<dd class="tei tei-notetext">Apparently reserved and kept in the
			Infirmary for the Communion of the dying.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_713" id="note_713" class="pginternal">713.</a></dt>
			<dd class="tei tei-notetext">Matins were sung soon after
			midnight.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_714" id="note_714" class="pginternal">714.</a></dt>
			<dd class="tei tei-notetext">Coldingham, <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c.
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIX">19</a> and
			note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_715" id="note_715" class="pginternal">715.</a></dt>
			<dd class="tei tei-notetext">Not the Abbot of Iona who wrote the
			the life of St. Columba (V, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XV">15</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXI">21</a>). This Adamnan is found in the Martyrology of
			Wilson, in Colgan's <span class="tei tei-q">“Lives of the Irish
			Saints,”</span> and in Bollandus, <span class="tei tei-q">“Acta
			Sanctorum.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_716" id="note_716" class="pginternal">716.</a></dt>
			<dd class="tei tei-notetext">From the Vulgate, Ps. xciv, 2. (xcv in
			our Psalter.)</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_717" id="note_717" class="pginternal">717.</a></dt>
			<dd class="tei tei-notetext">C. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIX">19</a> and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_718" id="note_718" class="pginternal">718.</a></dt>
			<dd class="tei tei-notetext">The detached dwellings built round the
			principal buildings of the community. Irish monasteries were built
			after this fashion.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_719" id="note_719" class="pginternal">719.</a></dt>
			<dd class="tei tei-notetext">Wearmouth and Jarrow.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_720" id="note_720" class="pginternal">720.</a></dt>
			<dd class="tei tei-notetext">For Berct, cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">V, 24</a> (<span class="tei tei-hi"><span style="font-style: italic">sub</span></span>
			698), note. The circumstances which led to the invasion are not
			known.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_721" id="note_721" class="pginternal">721.</a></dt>
			<dd class="tei tei-notetext">The Picts north of the Forth, cf. c.
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a>,
			<span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span> Their king at this time was Bruide mac Bili, who
			was Egfrid's distant kinsman. In 672 Egfrid had crushed a rising of
			Picts under the same king.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_722" id="note_722" class="pginternal">722.</a></dt>
			<dd class="tei tei-notetext">Cf. cc. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVII">27-32</a>. He had a mysterious intimation of
			the disaster at the hour of the king's defeat and death, and warned
			the queen (Eormenburg), who was with him at Carlisle (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			Bede's Life of Cuthbert, and the Anonymous Life). He is also said
			to have prophesied the king's death a year before to Elfled,
			Egfrid's sister (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">III, 24</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_723" id="note_723" class="pginternal">723.</a></dt>
			<dd class="tei tei-notetext">At Nechtansmere or Dunnechtan,
			identified with Dunnichen, near Forfar. Egfrid was buried in Iona,
			where Adamnan, the friend of his successor, was Abbot.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_724" id="note_724" class="pginternal">724.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_V">5</a> <span class="tei tei-hi"><span style="font-style: italic">ad init.</span></span>, note. If he succeeded
			in February, 670, this would be his sixteenth year.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_725" id="note_725" class="pginternal">725.</a></dt>
			<dd class="tei tei-notetext">III, <a class="tei tei-ref pginternal" href="#Book_III_Chap_IV">4</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVII">27</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_III">IV, 3</a>; V, <a class="tei tei-ref pginternal" href="#Book_V_Chap_IX">9</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_X">10</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XX">22</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">24</a>. His English birth and long residence in
			Ireland fitted him to be a mediator.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_726" id="note_726" class="pginternal">726.</a></dt>
			<dd class="tei tei-notetext">Vergil, Aen. II, 169.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_727" id="note_727" class="pginternal">727.</a></dt>
			<dd class="tei tei-notetext">The Dalriadic Scots (Cf. <a class="tei tei-ref pginternal" href="#Book_I_Chap_I">I, 1</a>, note; <a class="tei tei-ref pginternal" href="#Book_I_Chap_XXXIV">I, 34</a>) and the Britons
			of Strathclyde.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_728" id="note_728" class="pginternal">728.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_729" id="note_729" class="pginternal">729.</a></dt>
			<dd class="tei tei-notetext">Abercorn on the Forth, cf. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XII">I, 12</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">IV, 12</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_730" id="note_730" class="pginternal">730.</a></dt>
			<dd class="tei tei-notetext">III, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">24</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">25</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIII">IV, 23</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">V, 24</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_731" id="note_731" class="pginternal">731.</a></dt>
			<dd class="tei tei-notetext">Cf. III, 24, p. <a class="tei tei-ref pginternal" href="#Pg190">190</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_732" id="note_732" class="pginternal">732.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">III, 24</a>, and note. Elfled succeeded Hilda as
			abbess, and apparently ruled jointly with her mother.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_733" id="note_733" class="pginternal">733.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_V">V</a>, <span class="tei tei-hi"><span style="font-style: italic">passim</span></span>, and Bede's two lives of
			Cuthbert. His mother's name is said by the Irish authorities to
			have been Fina. He had lived among the Irish islands (<span class="tei tei-q">“in insulis Scottorum,”</span> and <span class="tei tei-q">“in regionibus Scottorum”</span>) for the sake of
			study, according to Bede, but William of Malmesbury implies that
			Egfrid may have been responsible for his exile. He was a man of
			great learning and of scholarly tastes. In Bede's <span class="tei tei-q">“History of the Abbots,”</span> we are told that he
			gave eight hides of land for a MS. which Benedict Biscop had
			brought from Rome.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_734" id="note_734" class="pginternal">734.</a></dt>
			<dd class="tei tei-notetext">Cc. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_V">5</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVII">17</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXII">22</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_735" id="note_735" class="pginternal">735.</a></dt>
			<dd class="tei tei-notetext">Cc. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_I">1</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_V">5</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_736" id="note_736" class="pginternal">736.</a></dt>
			<dd class="tei tei-notetext">Apparently at one time joint-king with
			Hlothere. Certain dooms are ascribed to them both. According to
			Thomas of Elmham, he was killed in war against Caedwalla, king of
			Wessex, and his brother, Mul, who were at this time encroaching on
			Kent.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_737" id="note_737" class="pginternal">737.</a></dt>
			<dd class="tei tei-notetext">Mul seems to have usurped the throne
			for a time.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_738" id="note_738" class="pginternal">738.</a></dt>
			<dd class="tei tei-notetext">In 692 we find him reigning as
			joint-king with Swaebhard (<a class="tei tei-ref pginternal" href="#Book_V_Chap_VIII">V, 8</a> <span class="tei tei-hi"><span style="font-style: italic">ad fin.</span></span>). He must have succeeded
			in 690, if Bede's dates are correct; cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIII">V, 23</a>, where it is
			said that he died on April 23, 725, after a reign of thirty-four
			and a half years.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_739" id="note_739" class="pginternal">739.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, 685.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_740" id="note_740" class="pginternal">740.</a></dt>
			<dd class="tei tei-notetext">C. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">26</a> and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_741" id="note_741" class="pginternal">741.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XVI">III, 16</a> and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_742" id="note_742" class="pginternal">742.</a></dt>
			<dd class="tei tei-notetext">As a boy he had been remarkable for
			his high spirits and love of athletic exercises. The rebuke of a
			little boy of three is said to have turned his thoughts to a more
			serious life, and a vision which he saw as he watched his sheep on
			the Lammermuir Hills on the night of Aidan's death, led him to form
			the resolve of entering a monastery. (Bede's Life of
			Cuthbert.)</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_743" id="note_743" class="pginternal">743.</a></dt>
			<dd class="tei tei-notetext">Melrose; cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVI">III, 26</a> and
			note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_744" id="note_744" class="pginternal">744.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span> and <a class="tei tei-ref pginternal" href="#Book_V_Chap_IX">V, 9</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_745" id="note_745" class="pginternal">745.</a></dt>
			<dd class="tei tei-notetext">C. 12, p. <a class="tei tei-ref pginternal" href="#Pg243">243</a>, note 1.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_746" id="note_746" class="pginternal">746.</a></dt>
			<dd class="tei tei-notetext">C. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVIII">28</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_IX">V, 9</a>. Probably here <span class="tei tei-q">“sacerdos”</span> = priest, A.S. version: <span class="tei tei-q">“masse-preost.”</span> But Aelfric calls him bishop.
			The town of St. Boswells on the Tweed is called after him. For an
			instance of his prophetic spirit, <span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span>, c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVIII">28</a>. It was his fame which drew Cuthbert to
			Melrose. When he saw the youth on his arrival, he exclaimed,
			<span class="tei tei-q">“Behold a servant of the Lord!”</span> He
			is generally supposed to have been carried off by the plague of
			664. For an account of his last days spent in reading the Gospel of
			St. John with Cuthbert, v. Bede's Prose Life of Cuthbert. The
			<span class="tei tei-q">“codex”</span> which they used was extant
			in Durham in Simeon of Durham's time.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_747" id="note_747" class="pginternal">747.</a></dt>
			<dd class="tei tei-notetext">Cf. III, 3, p. <a class="tei tei-ref pginternal" href="#Pg139">139</a>, note 3.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_748" id="note_748" class="pginternal">748.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XXVII">I, 27</a> <span class="tei tei-hi"><span style="font-style: italic">ad init.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_749" id="note_749" class="pginternal">749.</a></dt>
			<dd class="tei tei-notetext">Much of the account given here is from
			the prose life.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_750" id="note_750" class="pginternal">750.</a></dt>
			<dd class="tei tei-notetext">The synod of Twyford, a mixed assembly
			of clergy and laity, met in the autumn of 684. The place is
			<span class="tei tei-q">“perhaps where the Aln is crossed by two
			fords near Whittingham”</span> (in Northumberland) (Bright). This
			is another instance of the preposition prefixed to the name, cf.
			II, 14, p. <a class="tei tei-ref pginternal" href="#Pg119">119</a>, note
			5.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_751" id="note_751" class="pginternal">751.</a></dt>
			<dd class="tei tei-notetext">Cc. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">26</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_752" id="note_752" class="pginternal">752.</a></dt>
			<dd class="tei tei-notetext">Cf. c. 27, p. <a class="tei tei-ref pginternal" href="#Pg288">288</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_753" id="note_753" class="pginternal">753.</a></dt>
			<dd class="tei tei-notetext">In 685.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_754" id="note_754" class="pginternal">754.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a> and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_755" id="note_755" class="pginternal">755.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_756" id="note_756" class="pginternal">756.</a></dt>
			<dd class="tei tei-notetext">Soon after Christmas, 686. In
			February, 687, his last illness began.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_757" id="note_757" class="pginternal">757.</a></dt>
			<dd class="tei tei-notetext">St. Herbert's Island in Derwentwater.
			Strictly speaking, the Derwent flows through Derwentwater: it rises
			in Borrowdale. An indulgence of forty days was granted by Thomas
			Appleby, Bishop of Carlisle, in 1374 to pilgrims who visited the
			island.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_758" id="note_758" class="pginternal">758.</a></dt>
			<dd class="tei tei-notetext">Carlisle, called also Luel by Simeon
			of Durham.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_759" id="note_759" class="pginternal">759.</a></dt>
			<dd class="tei tei-notetext">In 687.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_760" id="note_760" class="pginternal">760.</a></dt>
			<dd class="tei tei-notetext">In St. Peter's Church. In 875, when
			the monks fled from Lindisfarne before the Danes, his relics were
			removed, first to Chester-le-Street, then to Ripon, and eventually
			to Durham. Simeon of Durham says the body was found to be
			uncorrupted, when it was placed in the new Cathedral there in
			1104.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_761" id="note_761" class="pginternal">761.</a></dt>
			<dd class="tei tei-notetext">The year in which he administered the
			bishopric falls between his restoration to York, Hexham, and the
			monastery of Ripon, and his second expulsion.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_762" id="note_762" class="pginternal">762.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">III, 25</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			init.</span></span>, and <span class="tei tei-hi"><span style="font-style: italic">infra</span></span> c. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXX">30</a>. In the life of
			Cuthbert he is described as a man <span class="tei tei-q">“magnarum
			virtutum”</span> (miraculous powers?). Alcuin tells that he calmed
			the winds by his prayers.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_763" id="note_763" class="pginternal">763.</a></dt>
			<dd class="tei tei-notetext">698 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_764" id="note_764" class="pginternal">764.</a></dt>
			<dd class="tei tei-notetext">The Dacre, a small stream near
			Penrith. There are the ruins of a castle, and Smith says there is a
			tradition of a monastery on its banks.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_765" id="note_765" class="pginternal">765.</a></dt>
			<dd class="tei tei-notetext">Not the missionary in <a class="tei tei-ref pginternal" href="#Book_V_Chap_XI">V, 11</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_766" id="note_766" class="pginternal">766.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“Innumera
			miracula”</span> are ascribed to him by Florence of Worcester.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_767" id="note_767" class="pginternal">767.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_III_Chap_XVI">III, 16</a>, and note; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVII">IV, 27-30</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_768" id="note_768" class="pginternal">768.</a></dt>
			<dd class="tei tei-notetext">Ripon, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> III,
			25, p. <a class="tei tei-ref pginternal" href="#Pg194">194</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">V, 19</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_769" id="note_769" class="pginternal">769.</a></dt>
			<dd class="tei tei-notetext">Cuthbert and Eadbert (IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIX">29</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXX">30</a>). His relics were
			removed with Cuthbert's and finally interred at Durham.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_770" id="note_770" class="pginternal">770.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">IV, 26</a>, and <a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">V, 18</a>. He reigned from 685 to 705.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_771" id="note_771" class="pginternal">771.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVI">III, 26</a>; IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVII">27</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVIII">28</a>. He died in 686.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_772" id="note_772" class="pginternal">772.</a></dt>
			<dd class="tei tei-notetext">John of Beverley, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> IV,
			23, p. <a class="tei tei-ref pginternal" href="#Pg273">273</a>, and note.
			Wilfrid administered the bishopric during the vacancy between
			Eata's death and John's consecration in 687.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_773" id="note_773" class="pginternal">773.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">ibid.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_774" id="note_774" class="pginternal">774.</a></dt>
			<dd class="tei tei-notetext">Beverley. The present name is said to
			be derived from a colony of beavers in the Hull river. In 866 the
			minster was destroyed by the Danes, but it was repaired three years
			later. In 925 Athelstan restored it and made it collegiate, giving
			it lands and various privileges. (For the preposition, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> II,
			14, p. <a class="tei tei-ref pginternal" href="#Pg119">119</a>, note 5.)</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_775" id="note_775" class="pginternal">775.</a></dt>
			<dd class="tei tei-notetext">Supposed to have been at St. John's
			Lee, near Hexham. The old name is Erneshow or Herneshaw. (Richard
			of Hexham, Folcard.)</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_776" id="note_776" class="pginternal">776.</a></dt>
			<dd class="tei tei-notetext">The reading of the best MSS.,
			<span class="tei tei-q">“Clymeterium”</span> (<span class="tei tei-hi"><span style="font-style: italic">v. ll.</span></span>
			clymiterium, climiterium, clymitorium) seems inexplicable. Smith
			reads <span class="tei tei-q">“coemeterium,”</span> probably on the
			authority of a gloss (<span class="tei tei-q">“id est
			cimeterium”</span>) on some of the later MSS., and it has generally
			been translated <span class="tei tei-q">“cemetery.”</span> The AS.
			version has <span class="tei tei-q">“gebæd hus 7 ciricean”</span> =
			oratory and church.</dd>
