			<dt class="tei tei-notelabel"><a href="#noteref_2" id="note_2" class="pginternal">2.</a></dt>

			<dt class="tei tei-notelabel"><a href="#noteref_5" id="note_5" class="pginternal">5.</a></dt>

			<dt class="tei tei-notelabel"><a href="#noteref_6" id="note_6" class="pginternal">6.</a></dt>
			<dd class="tei tei-notetext">King of Northumbria, cf. V, 23. He
			succeeded Osric, 729 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span> In a revolt he was
			forcibly tonsured, 731, but restored. He voluntarily became a monk
			in Lindisfarne in 737. The fact that Bede submitted the
			Ecclesiastical History to him for revision bears witness to his
			piety and learning.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_7" id="note_7" class="pginternal">7.</a></dt>
			<dd class="tei tei-notetext">Albinus, the first English abbot of
			the monastery of SS. Peter and Paul at Canterbury, succeeded
			Hadrian in 709 or 710. On his scholarship, cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XX">V, 20</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_8" id="note_8" class="pginternal">8.</a></dt>
			<dd class="tei tei-notetext">Theodore, the great archbishop, noted
			for his organization of the English Church and his services to
			education, consecrated in 668, at the age of sixty-five, by Pope
			Vitalian, on the recommendation of Hadrian, who had himself twice
			declined the office of archbishop. Theodore was a native of Tarsus,
			in Cilicia, a man of great learning and scholarly attainments. Cf.
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_I">IV, 1</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_9" id="note_9" class="pginternal">9.</a></dt>
			<dd class="tei tei-notetext">Hadrian (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			previous note, cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_I">IV, 1</a>), an African by birth, sent to England by
			Pope Vitalian along with Theodore, became Abbot of SS. Peter and
			Paul, Canterbury. He co-operated with Theodore in his educational
			work.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_10" id="note_10" class="pginternal">10.</a></dt>
			<dd class="tei tei-notetext">A presbyter of London, afterwards
			Archbishop of Canterbury, 735. Received the <span class="tei tei-foreign" lang="la"><span style="font-style: italic">pallium</span></span> (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> I,
			27, p. <a class="tei tei-ref pginternal" href="#Pg054">54</a>, note) in
			736.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_11" id="note_11" class="pginternal">11.</a></dt>
			<dd class="tei tei-notetext">Gregory I (the Great), who sent the
			Roman mission to England.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_12" id="note_12" class="pginternal">12.</a></dt>
			<dd class="tei tei-notetext">Gregory II, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			Plummer <span class="tei tei-hi"><span style="font-style: italic">ad loc.</span></span> for arguments showing
			conclusively that Gregory III cannot be meant.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_13" id="note_13" class="pginternal">13.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVI">IV, 16</a>, and <a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">V, 18</a>. In <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIII">V, 23</a> he is more accurately described as
			<span class="tei tei-q">“Ventanus antistes.”</span> He was
			consecrated Bishop of Winchester when the West Saxon bishopric was
			divided in 705; and his diocese comprised only the smaller part of
			Wessex. He was the friend and counsellor of St. Boniface.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_14" id="note_14" class="pginternal">14.</a></dt>
			<dd class="tei tei-notetext">Bishop of the East Saxons, cf.
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_XXI">III, 21</a>
			foll.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_15" id="note_15" class="pginternal">15.</a></dt>
			<dd class="tei tei-notetext">St. Chad, Bishop of the Northumbrians,
			afterwards of Lichfield; brother of Cedd: <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> III,
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIII">23</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVIII">28</a>; IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_II">2</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_III">3</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">V, 19</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_16" id="note_16" class="pginternal">16.</a></dt>
			<dd class="tei tei-notetext">Lastingham, near Pickering in
			Yorkshire N.R., <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIII">III, 23</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_17" id="note_17" class="pginternal">17.</a></dt>
			<dd class="tei tei-notetext">Nothing further is known of him.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_18" id="note_18" class="pginternal">18.</a></dt>
			<dd class="tei tei-notetext">The district to the north of the
			Wash.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_19" id="note_19" class="pginternal">19.</a></dt>
			<dd class="tei tei-notetext">Bishop of Sidnacester, in the province
			of Lindsey. He died in 732: <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">IV, 12</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIII">V, 23</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_20" id="note_20" class="pginternal">20.</a></dt>
			<dd class="tei tei-notetext">The saint and hermit who was for two
			years Bishop of Lindisfarne, 685-687: <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">IV, 26-32</a>.
			Bede wrote his life both in prose and verse.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_21" id="note_21" class="pginternal">21.</a></dt>
			<dd class="tei tei-notetext">Holy Island, off the coast of
			Northumberland. Aidan chose it as the place of his see and
			monastery in 635: <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_III_Chap_III">III, 3</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_22" id="note_22" class="pginternal">22.</a></dt>
			<dd class="tei tei-notetext">This total varies in different
			authors. The first few pages of Bede are to a great extent copied
			out of Pliny, Solinus, Orosius, and Gildas.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_23" id="note_23" class="pginternal">23.</a></dt>
			<dd class="tei tei-notetext">Richborough, Kent.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_24" id="note_24" class="pginternal">24.</a></dt>
			<dd class="tei tei-notetext">Boulogne.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_25" id="note_25" class="pginternal">25.</a></dt>
			<dd class="tei tei-notetext">Cf. Caes., B.G., <span class="tei tei-hi"><span style="font-style: italic">passim</span></span>;
			Verg., Aen., VIII, 727.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_26" id="note_26" class="pginternal">26.</a></dt>
			<dd class="tei tei-notetext">In his Hexameron.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_27" id="note_27" class="pginternal">27.</a></dt>
			<dd class="tei tei-notetext">Latin is included as being the
			ecclesiastical language common to all. Bede does not imply that
			there was a Latin-speaking race still in the island.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_28" id="note_28" class="pginternal">28.</a></dt>
			<dd class="tei tei-notetext">In Caesar's time, the whole district
			lying along the north-western coast of Gaul, afterwards narrowed
			down to the modern Brittany. That the Britons (or Brythons) came
			from Gaul is doubtless a fact. Another branch of the Celtic race,
			the Goidels or Gaels, appears to have been in possession in Britain
			before them.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_29" id="note_29" class="pginternal">29.</a></dt>
			<dd class="tei tei-notetext">By Scythia Bede means Scandinavia. He
			only mentions this account as a tradition. The problem of the Picts
			has not been solved yet. According to one view, they belonged to
			the pre-Aryan inhabitants of Britain, pushed westward and northward
			by the Celtic invaders. In Scotland they held their own for a
			considerable time in a wide tract of country, and they may have to
			some extent amalgamated with the Celts who dispossessed them
			(Rhŷs). Others regard them as Celts of the same branch as Welsh,
			Cornish, and Britons, being probably nearest to Cornish. The
			absence of all but the scantiest remains of their language makes
			the question of their origin one of great difficulty.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_30" id="note_30" class="pginternal">30.</a></dt>
			<dd class="tei tei-notetext">The legend is an attempt to account
			for the law of Pictish succession, which was vested in the mother,
			<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Rhŷs, <span class="tei tei-q">“Celtic Britain,”</span> pp. 170-171.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_31" id="note_31" class="pginternal">31.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“Dal,”</span>
			a division or part, is common in Irish names. Dalriada was a
			district in the north-eastern part of Ulster. From there, a tribe
			of Scots (a Celtic race who settled in Ireland at some unknown
			period) came to Kintyre and spread along the coasts of Argyll,
			which took from them the name of Dalriada (probably <span class="tei tei-hi"><span style="font-style: italic">circ.</span></span>
			500 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>). They brought the
			Christian religion with them. Bede follows that version of the
			legend which makes Cairbre Riada, the eponymous hero of the Irish
			Dalriada (<span class="tei tei-hi"><span style="font-style: italic">circ.</span></span> 200 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>), himself found the
			colony in Scotland.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_32" id="note_32" class="pginternal">32.</a></dt>
			<dd class="tei tei-notetext">Dumbarton; <span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span> c. 12, p. <a class="tei tei-ref pginternal" href="#Pg024">24</a> and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_33" id="note_33" class="pginternal">33.</a></dt>
			<dd class="tei tei-notetext">Caesar's invasion took place
			<span class="tei tei-hi"><span style="font-variant: small-caps">a.u.c.</span></span> 699 and 700;
			<span class="tei tei-hi"><span style="font-variant: small-caps">b.c.</span></span> 55 and 54.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_34" id="note_34" class="pginternal">34.</a></dt>
			<dd class="tei tei-notetext">Cf. Caes., B.G., V, 11, 18 ff. A
			powerful British chief. His territory lay north and north-east of
			the Thames, roughly comprising Hertfordshire, Buckinghamshire, and
			Berkshire, but the exact limits are uncertain. His people were the
			Catuvellauni (the name is Gaulish in form).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_35" id="note_35" class="pginternal">35.</a></dt>
			<dd class="tei tei-notetext">Cf. Caes., B.G., V, 20. The
			Trinovantes occupied Essex and part of Middlesex.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_36" id="note_36" class="pginternal">36.</a></dt>
			<dd class="tei tei-notetext">Variations of this name given by
			ancient authors are Andragius and Androgorius. Caesar calls him
			Mandubracius.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_37" id="note_37" class="pginternal">37.</a></dt>
			<dd class="tei tei-notetext">The position of this place is
			unknown.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_38" id="note_38" class="pginternal">38.</a></dt>
			<dd class="tei tei-notetext">Claudius came to Britain <span class="tei tei-hi"><span style="font-variant: small-caps">a.u.c.</span></span> 796, 43
			<span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_39" id="note_39" class="pginternal">39.</a></dt>
			<dd class="tei tei-notetext">He can only have done so in name; it
			was probably Agricola who first conquered the Orkneys. Cf. Tac.,
			Agric., 10.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_40" id="note_40" class="pginternal">40.</a></dt>
			<dd class="tei tei-notetext">Cf. Tac., Agric., 13.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_41" id="note_41" class="pginternal">41.</a></dt>
			<dd class="tei tei-notetext">Marcus Antoninus Verus, commonly
			called Marcus Aurelius, succeeded in 161 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span> His colleague in the
			empire was his adopted brother, Lucius Verus, whose full adoptive
			name was Lucius Aurelius Antoninus Verus Commodus. He died in 169.
			Eleutherus became Pope between 171 and 177. Bede's chronology is
			therefore wrong.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_42" id="note_42" class="pginternal">42.</a></dt>
			<dd class="tei tei-notetext">Most modern authorities consider the
			story fabulous. But cf. Bright, <span class="tei tei-q">“Early
			English Church History,”</span> pp. 3-5.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_43" id="note_43" class="pginternal">43.</a></dt>
			<dd class="tei tei-notetext">Severus succeeded in 193 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span> He died in 211.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_44" id="note_44" class="pginternal">44.</a></dt>
			<dd class="tei tei-notetext">This is the earthwork which runs
			parallel to the wall of Hadrian, between the Solway and the Tyne,
			at an interval of from 30 to 1,300 yards from it. Its origin and
			purpose are doubtful. Ancient authorities afford conflicting
			evidence with regard to the Roman walls in Britain. Modern research
			seems to show that Severus built no wall or rampart, though some
			ancient historians assert that he did (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			Haverfield, quoted by Plummer, <span class="tei tei-hi"><span style="font-style: italic">ad
			loc.</span></span>; cf. <span class="tei tei-hi"><span style="font-style: italic">infra</span></span> c. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XII">12</a> and note).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_45" id="note_45" class="pginternal">45.</a></dt>
			<dd class="tei tei-notetext">Bassianus Antoninus, surnamed
			Caracalla. Geta was murdered by Caracalla.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_46" id="note_46" class="pginternal">46.</a></dt>
			<dd class="tei tei-notetext">Diocletian succeeded in 284.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_47" id="note_47" class="pginternal">47.</a></dt>
			<dd class="tei tei-notetext">Carausius was a native of Menapia, in
			Belgium, appointed to command the Roman fleet stationed at Boulogne
			to guard the coasts. He took the fleet with him when he usurped
			imperial authority in Britain. Maximian, failing to reduce him,
			recognized his authority and gave him the title of Augustus. He
			governed vigorously and prosperously.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_48" id="note_48" class="pginternal">48.</a></dt>
			<dd class="tei tei-notetext">Allectus was a follower of Carausius.
			His revolt was apparently supported by the independent tribes,
			probably Caledonians.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_49" id="note_49" class="pginternal">49.</a></dt>
			<dd class="tei tei-notetext">Asclepiodotus was serving under
			Constantius Chlorus (one of the reigning Caesars), who sailed to
			Britain and marched against Allectus.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_50" id="note_50" class="pginternal">50.</a></dt>
			<dd class="tei tei-notetext">The statement that the Diocletian
			persecution extended to Britain rests on no trustworthy evidence at
			all. Yet though the time assigned is probably wrong, there seems to
			be no reason to doubt the existence of the British Protomartyr. The
			story rests upon a local tradition traceable up to the visit of
			Germanus in 429 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>, <span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span> c. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XVIII">18</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_51" id="note_51" class="pginternal">51.</a></dt>
			<dd class="tei tei-notetext">Venantius Fortunatus, a Christian
			poet, Bishop of Poitiers, b. 530 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span> He was the last Latin
			poet of any note in Gaul.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_52" id="note_52" class="pginternal">52.</a></dt>
			<dd class="tei tei-notetext">In the lives of St. Alban (all later
			than Bede) this clerk is called St. Amphibalus, a name probably
			invented from his cloak (<span class="tei tei-foreign" lang="la"><span style="font-style: italic">amphibalus</span></span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_53" id="note_53" class="pginternal">53.</a></dt>
			<dd class="tei tei-notetext">The text of this passage is probably
			corrupt, but all the MSS. agree. I believe the above gives the
			intended meaning.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_54" id="note_54" class="pginternal">54.</a></dt>
			<dd class="tei tei-notetext">There is again probably some confusion
			in the text.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_55" id="note_55" class="pginternal">55.</a></dt>
			<dd class="tei tei-notetext">Now St. Albans in Hertfordshire, on
			the Watling Street, hence probably the name, Vaeclingacaestir.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_56" id="note_56" class="pginternal">56.</a></dt>
			<dd class="tei tei-notetext">The place was afterwards called
			Holmhurst. The church mentioned by Bede was superseded by the
			monastery of St. Alban, the foundation of which is attributed to
			Offa, <span class="tei tei-hi"><span style="font-style: italic">circ.</span></span> 793 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span> Certain extraordinary
			privileges were granted to it, and its abbot obtained a superiority
			over all other English abbots (Dugdale, <span class="tei tei-q">“Monasticon”</span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_57" id="note_57" class="pginternal">57.</a></dt>
			<dd class="tei tei-notetext">The evidence for their martyrdom is
			very doubtful.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_58" id="note_58" class="pginternal">58.</a></dt>
			<dd class="tei tei-notetext">Caerleon-on-Usk, the headquarters of
			the Second legion, is here meant (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			Merivale, H.R., vi, 248), though the name was also applied to
			Chester, seat of the Twentieth legion (cf. II, 2, p. <a class="tei tei-ref pginternal" href="#Pg087">87</a>, <span class="tei tei-q">“civitas legionum”</span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_59" id="note_59" class="pginternal">59.</a></dt>
			<dd class="tei tei-notetext">Constantine the Great. For the
			legality of the marriage, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Dict. of Christian Biography,
			article <span class="tei tei-q">“Helena.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_60" id="note_60" class="pginternal">60.</a></dt>
			<dd class="tei tei-notetext">The First General Council, 325
			<span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span> It asserted the
			doctrine of the ὁμοούσιον against Arius. For a short account of the
			heresy, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Gore, Bampton Lectures, pp.
			89-92. All the evidence goes to show that this heresy affected
			Britain much less than Bede, on the authority of Gildas, here
			implies.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_61" id="note_61" class="pginternal">61.</a></dt>
			<dd class="tei tei-notetext">Valens died 378.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_62" id="note_62" class="pginternal">62.</a></dt>
			<dd class="tei tei-notetext">Another of the insular usurpers (cf.
			c. <a class="tei tei-ref pginternal" href="#Book_I_Chap_VI">6</a>). He had
			served under the elder Theodosius in Britain. He revolted from
			Rome, successfully repressed incursions of Picts and Scots, then
			crossed to Gaul, where he maintained himself for four years, but
			was killed by the Emperor, the younger Theodosius, at Aquileia, in
			388.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_63" id="note_63" class="pginternal">63.</a></dt>
			<dd class="tei tei-notetext">The real date is 395.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_64" id="note_64" class="pginternal">64.</a></dt>
			<dd class="tei tei-notetext">Pelagius, the founder of the heresy
			known as Pelagianism, was probably born in 370 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>, and is said to have
			been a Briton, but the tradition that his real name was Morgan
			(Marigena, Graecised Πελάγιος), and that he was a native of Bangor,
			rests on very doubtful authority. His great opponent, St.
			Augustine, speaks of him as a good and holy man; later slanders are
			to be attributed to Jerome's abusive language. The cardinal point
			in his doctrine is his denial of original sin, involving a too
			great reliance on the human will in achieving holiness, and a
			limitation of the action of the grace of God.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_65" id="note_65" class="pginternal">65.</a></dt>
			<dd class="tei tei-notetext">Julianus of Campania is regarded as
			the founder of semi-Pelagianism, <span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>,
			an intermediate position between the orthodox view and the heresy
			of Pelagius. He was Bishop of Eclanum, near Beneventum, and was
			along with seventeen other Italian bishops deposed in 418
			<span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span> for refusing to sign
			the circular letter of Pope Zosimus condemning the heresy.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_66" id="note_66" class="pginternal">66.</a></dt>
			<dd class="tei tei-notetext">A native of Aquitaine, born probably
			about 403 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>, a strong opponent of
			the Pelagians. It is uncertain whether he was in Holy Orders or
			not. He wrote in prose and verse; his longest poem is called
			<span class="tei tei-q">“De Ingratis”</span> (<span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>,
			opponents of the grace of God). His best known work is a Chronicle,
			not to be confused with the shorter chronicle of Prosper Tiro.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_67" id="note_67" class="pginternal">67.</a></dt>
			<dd class="tei tei-notetext">Bede includes elegiacs under this
			term, cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_VIII">V,
			8</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_68" id="note_68" class="pginternal">68.</a></dt>
			<dd class="tei tei-notetext">The date of Honorius is correct, but
			the invasion of Alaric is put a year too late, if Bede refers to
			the first siege of Rome, in 408.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_69" id="note_69" class="pginternal">69.</a></dt>
			<dd class="tei tei-notetext">The British army, alarmed by the
			inroads of barbarians, and actuated by a spirit of revolt against
			Roman authority, set up three local emperors in rapid succession:
			Marcus, Gratian, and Constantine. The first two they summarily
			deposed and killed, but Constantine by a great victory made himself
			master of Gaul and Britain and extorted from the Emperor Honorius a
			share in the Imperial authority. Meanwhile, the Britons expelled
			the few remaining Roman officials, and Honorius avenged himself on
			Constantine for the loss of Britain in the manner described in the
			text.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_70" id="note_70" class="pginternal">70.</a></dt>
			<dd class="tei tei-notetext">A Roman general, afterwards associated
			with Honorius in the empire for a few months.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_71" id="note_71" class="pginternal">71.</a></dt>
			<dd class="tei tei-notetext">Gerontius (Welsh <span class="tei tei-foreign" lang="cy"><span style="font-style: italic">Geraint</span></span>, akin to Irish
			<span class="tei tei-foreign" lang="ga"><span style="font-style: italic">Gerat</span></span> or <span class="tei tei-foreign" lang="ga"><span style="font-style: italic">Gerait</span></span>, a champion), was a
			Briton, one of Constantine's generals. Turning against his master,
			he invited the Germans to invade Gaul and Britain, probably
			intending to secure Britain for himself. But his own men conspired
			against him and he died by his own hand.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_72" id="note_72" class="pginternal">72.</a></dt>
			<dd class="tei tei-notetext">Rome was taken 1163 <span class="tei tei-hi"><span style="font-variant: small-caps">a.u.c.</span></span>; 410 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_73" id="note_73" class="pginternal">73.</a></dt>
			<dd class="tei tei-notetext">Possibly <span class="tei tei-q">“light-houses.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_74" id="note_74" class="pginternal">74.</a></dt>
			<dd class="tei tei-notetext">Probably Inchkeith in the Forth. The
			Irish called the Firth of Forth the <span class="tei tei-q">“Sea of
			Giudan”</span> (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Reeves' <span class="tei tei-q">“Culdees,”</span> p. 124). But Professor Rhŷs is
			inclined to think that Bede has confused the island Giudi with Urbs
			Giudi, which may perhaps be identified with the Urbs Iudeu of
			Nennius, probably either Carriden or Edinburgh (Rhŷs, <span class="tei tei-q">“Celtic Britain”</span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_75" id="note_75" class="pginternal">75.</a></dt>
			<dd class="tei tei-notetext">Alcluith is the Welsh name (Ail = a
			rock). The Goidels called it Dúnbrettan = the fortress of the
			Britons. Hence its modern name, Dumbarton. The river is, of course,
			the Clyde.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_76" id="note_76" class="pginternal">76.</a></dt>
			<dd class="tei tei-notetext">This is the earthen rampart, about
			thirty-five miles in length, between the Clyde and the Forth, now
			attributed to Antoninus Pius. Little is known about it, and it is
			probable that it was soon abandoned.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_77" id="note_77" class="pginternal">77.</a></dt>
			<dd class="tei tei-notetext">Abercorn, a village on the south bank
			of the Firth of Forth.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_78" id="note_78" class="pginternal">78.</a></dt>
			<dd class="tei tei-notetext">The name is probably Celtic
			(Goidelic), though, if the view which regards the Picts as a
			non-Celtic people be correct, it may show traces of Pictish
			influence. It seems to be connected with the Latin term
			<span class="tei tei-q">“penna valli”</span> = wing of
			(<span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>, pinnacle or turret at end
			of) the <span class="tei tei-foreign" lang="la"><span style="font-style: italic">vallum</span></span>. Readers
			of Scott's <span class="tei tei-q">“Antiquary”</span> will remember
			the celebrated dispute with regard to this word. The Anglian
			<span class="tei tei-foreign"><span style="font-style: italic">Penneltun</span></span> is derived from the
			Goidelic name.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_79" id="note_79" class="pginternal">79.</a></dt>
			<dd class="tei tei-notetext">This probably refers to the wall now
			attributed to Hadrian (<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_I_Chap_V">5</a> note). It ran for a distance of about
			eighty-five miles from Bowness-on-Solway to Wallsend-on-Tyne.
			Bede's authorities are Orosius and Gildas. The accounts he gives
			here and in c. <a class="tei tei-ref pginternal" href="#Book_I_Chap_V">5</a>
			are an attempt to explain the difficulties and conflicting evidence
			with regard to these walls.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_80" id="note_80" class="pginternal">80.</a></dt>
			<dd class="tei tei-notetext">In 431 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span> There is much
			confusion with regard to the mission of Palladius. According to
			later accounts, he was an unsuccessful forerunner of St. Patrick,
			but Bede here, following Prosper of Aquitaine, represents the Irish
			(Scotti) as in part already Christian. The origin of Irish
			Christianity is very obscure, and some have even doubted the
			existence of St. Patrick. Bede only mentions him once, viz., in the
			<span class="tei tei-q">“Martyrology,”</span> which has been
			largely interpolated, and is, perhaps, not his genuine work. St.
			Patrick's latest biographer, Professor Bury, has, however, clearly
			established a certain amount of fact underlying much legendary
			matter. Some later authorities represent Palladius as preaching to
			the Scots (in the modern sense) and Patrick to the Irish.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_81" id="note_81" class="pginternal">81.</a></dt>
			<dd class="tei tei-notetext">The great Roman general who preserved
			the Western Empire against the invasions of the barbarians for many
			years. He was assassinated by Valentinian in 454 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_82" id="note_82" class="pginternal">82.</a></dt>
			<dd class="tei tei-notetext">Really two years before, 444
			<span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_83" id="note_83" class="pginternal">83.</a></dt>
			<dd class="tei tei-notetext">Though he is the subject of many
			legends, Vortigern is doubtless a historical figure, a ruler of
			south-eastern Britain. Bede's form of the name, Uurtigernus, is
			right. It is a British word, meaning <span class="tei tei-q">“supreme lord”</span> (Rhŷs).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_84" id="note_84" class="pginternal">84.</a></dt>
			<dd class="tei tei-notetext">The date of Marcian's succession is
			450.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_85" id="note_85" class="pginternal">85.</a></dt>
			<dd class="tei tei-notetext">Bede only professes to give the date
			of the invasion approximately: cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIV">V, 24</a> (<span class="tei tei-q">“quorum
			tempore”</span>), <a class="tei tei-ref pginternal" href="#Book_I_Chap_XXIII">I, 23</a>; <a class="tei tei-ref pginternal" href="#Book_II_Chap_XIV">II, 14</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIII">V, 23</a> (<span class="tei tei-q">“circiter”</span>), calculating in round numbers
			apparently. He refers here to their first settlement, which, of
			course, does not preclude earlier attacks.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_86" id="note_86" class="pginternal">86.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, Vortigern.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_87" id="note_87" class="pginternal">87.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-foreign"><span style="font-style: italic">Anglia</span></span> was believed to be
			derived from <span class="tei tei-foreign"><span style="font-style: italic">Angulus</span></span>. The country is the
			modern Schleswig, which the Angles appear to have almost entirely
			evacuated. For the Continental Saxons, cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_IX">V, 9</a>. It has been
			supposed that the Jutes came from Jutland, where, at a later
			period, they mingled with the Danes (<span class="tei tei-hi"><span style="font-style: italic">ibid.</span></span>),
			but this is now regarded as doubtful.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_88" id="note_88" class="pginternal">88.</a></dt>
			<dd class="tei tei-notetext">At Aylesford, in Kent. Horsted is the
			traditional burial-place of Horsa.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_89" id="note_89" class="pginternal">89.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, in Thanet.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_90" id="note_90" class="pginternal">90.</a></dt>
			<dd class="tei tei-notetext">The most probable view is that he was
			the last of those Romans who usurped imperial authority in Britain
			(<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> cc. <a class="tei tei-ref pginternal" href="#Book_I_Chap_VI">6</a>, <a class="tei tei-ref pginternal" href="#Book_I_Chap_IX">9</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_91" id="note_91" class="pginternal">91.</a></dt>
			<dd class="tei tei-notetext">The identification of this place with
			Badbury, in Dorsetshire (Guest, followed by Freeman and Green)
			seems to be disproved (W. H. Stevenson, in the <span class="tei tei-q">“English Historical Review,”</span> xvii, pp. 633,
			634). The locality is quite uncertain; Skene actually places it
			near Linlithgow. According to Bede's reckoning the date of the
			battle would be 493 approximately. The <span class="tei tei-q">“Annales Cambriae”</span> give 516. For a full
			discussion of the question, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Plummer, <span class="tei tei-hi"><span style="font-style: italic">ad loc.</span></span>
			Cf. also Mr. Stevenson's article.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_92" id="note_92" class="pginternal">92.</a></dt>
			<dd class="tei tei-notetext">Nothing more is known of them.
			Pelagius left Britain in early life and did not himself spread his
			heresy there.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_93" id="note_93" class="pginternal">93.</a></dt>
			<dd class="tei tei-notetext">The life of Germanus was written by
			Constantius, a priest of Lyons, who is Bede's authority for cc.
			17-21. According to him, these bishops were sent to Britain by a
			Gallican Synod. Prosper of Aquitaine attributes the origin of the
			mission to Pope Celestine, <span class="tei tei-q">“acting on the
			advice of the deacon Palladius”</span> (probably the missionary to
			the Irish mentioned c. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XIII">13</a>). The two statements are not irreconcilable
			(cf. Bright, p. 18). There are churches dedicated to SS. Germanus
			and Lupus in Wales and Cornwall. Both had been trained in the
			school of Lérins, a monastery in the group of islands off the coast
			at Cannes.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_94" id="note_94" class="pginternal">94.</a></dt>
			<dd class="tei tei-notetext">This conference is said to have been
			held at Verulam.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_95" id="note_95" class="pginternal">95.</a></dt>
			<dd class="tei tei-notetext">Bede's authority, Constantius, shows
			here the first trace of any acquaintance of early historians with
			the story of St. Alban. The last sentence is somewhat obscure.
			Probably the idea is that the blood of the martyrs continues to cry
			aloud for vengeance.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_96" id="note_96" class="pginternal">96.</a></dt>
			<dd class="tei tei-notetext">Reading <span class="tei tei-q">“reserato.”</span> The reading <span class="tei tei-q">“reservato”</span> is perhaps easier and has some MS.
			authority.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_97" id="note_97" class="pginternal">97.</a></dt>
			<dd class="tei tei-notetext">Reading <span class="tei tei-q">“castitatis,”</span> from which it is difficult to
			extract any meaning. The above strains the Latin unduly.
			Constantius has <span class="tei tei-q">“castrorum,”</span> which
			gives a better sense.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_98" id="note_98" class="pginternal">98.</a></dt>
			<dd class="tei tei-notetext">Maes-y-Garmon (<span class="tei tei-q">“The Field of Germanus”</span>), near Mold, in
			Flintshire, has been fixed upon as the scene of the Hallelujah
			Victory, and the river in which the army was baptized is said to be
			the Alyn (Ussher, <span class="tei tei-q">“Antiqq.”</span>). The
			story is generally regarded as legendary.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_99" id="note_99" class="pginternal">99.</a></dt>
			<dd class="tei tei-notetext">Thirteenth bishop of Trèves. This
			account sums up nearly all that is known of him.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_100" id="note_100" class="pginternal">100.</a></dt>
			<dd class="tei tei-notetext">This second voyage of St. Germanus is
			supposed to have taken place about eighteen years after the first,
			<span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>, in 447.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_101" id="note_101" class="pginternal">101.</a></dt>
			<dd class="tei tei-notetext">The Armoricans had revolted, and
			Aetius (<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XIII">13</a> and note) had
			enlisted the services of the Alani against them. Germanus, who had
			at one time been duke of the Armoricans, went to the Imperial Court
			at Ravenna to intercede for them.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_102" id="note_102" class="pginternal">102.</a></dt>
			<dd class="tei tei-notetext">Really the fifth (16th March, 455
			<span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>). Romulus Augustulus
			is usually regarded as the last emperor of the west. He was
			overthrown in 476 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_103" id="note_103" class="pginternal">103.</a></dt>
			<dd class="tei tei-notetext">The British historian, author of the
			<span class="tei tei-q">“De Excidio Liber Querulus,”</span> so
			called from the historian's denunciations of the sins of the
			Britons. He himself tells us that he was born in the year of the
			battle of Badon Hill (Mons Badonicus), and that he wrote his
			History forty-four years after that date. According to Bede (cf. c.
			<a class="tei tei-ref pginternal" href="#Book_I_Chap_XV">15</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			init.</span></span>, and c. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XVI">16</a>, <span class="tei tei-hi"><span style="font-style: italic">ad fin.</span></span>) this would place his
			birth approximately in the year 493, but see note on c. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XVI">16</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_104" id="note_104" class="pginternal">104.</a></dt>
			<dd class="tei tei-notetext">Gregory the Great. Cf. <a class="tei tei-ref pginternal" href="#Preface">Preface</a>. Bede places the date of
			his accession a year too late as well as that of his death
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_I">II, 1</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			init.</span></span>, but in the same chapter he rightly places his
			death in the second year of Phocas, <span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>,
			604).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_105" id="note_105" class="pginternal">105.</a></dt>
			<dd class="tei tei-notetext">Augustine was prior of St. Gregory's
			Monastery dedicated to St. Andrew in Rome.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_106" id="note_106" class="pginternal">106.</a></dt>
			<dd class="tei tei-notetext">Cf. IV, 5, p. <a class="tei tei-ref pginternal" href="#Pg227">227</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_107" id="note_107" class="pginternal">107.</a></dt>
			<dd class="tei tei-notetext">This is a mistake. Aetherius was
			archbishop of Lyons. Vergilius was archbishop of Arles. The letter
			given here, however, is the letter sent to Aetherius. Similar
			letters were despatched to other bishops at this time; among them
			one to Vergilius of Arles.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_108" id="note_108" class="pginternal">108.</a></dt>
			<dd class="tei tei-notetext">A presbyter sent into Gaul by Gregory
			in 595 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span> to administer the
			little patrimony of St. Peter in Gaul, to collect its revenues and
			to invest them in raiment for the poor, or in English slave lads to
			serve in the monasteries and receive a Christian education.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_109" id="note_109" class="pginternal">109.</a></dt>
			<dd class="tei tei-notetext">Ethelbert was the third Bretwalda or
			dominant king. He had established a practical hegemony over the
			East Anglians, the Mercians of the Trent Valley, the South Saxons,
			East Saxons, and even the West Saxons (cf. II, 5, p. <a class="tei tei-ref pginternal" href="#Pg094">94</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_110" id="note_110" class="pginternal">110.</a></dt>
			<dd class="tei tei-notetext">Families, <span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>,
			<span class="tei tei-foreign"><span style="font-style: italic">hides</span></span>. The hide, probably, was
			as much land as would support a family, hence the extent must have
			varied with the different conditions in different parts of the
			country.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_111" id="note_111" class="pginternal">111.</a></dt>
			<dd class="tei tei-notetext">In Bede's time Thanet was divided from
			the rest of Kent by a broad channel called the Wantsum, now partly
			represented by the River Stour.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_112" id="note_112" class="pginternal">112.</a></dt>
			<dd class="tei tei-notetext">The conjecture that they landed at
			Ebbsfleet, which is also traditionally regarded as the
			landing-place of Hengist, has been generally adopted. Other
			possible landing-places are Stonar and Richborough. For a full
			discussion of the question, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <span class="tei tei-q">“The
			Mission of St. Augustine,”</span> ed. Rev. A. T. Mason, D.D.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_113" id="note_113" class="pginternal">113.</a></dt>
			<dd class="tei tei-notetext">It has been supposed, on the strength
			of this passage, that the speech of the Franks and the English was
			still mutually intelligible. This is supported by a statement of
			Gregory (letter to Theoderic and Theodebert) that he had desired
			Augustine to take some Frankish priests with him. It is assumed
			that these priests were the interpreters. On the other hand, in
			view of the fact that only fifty years later we find the language
			of the Franks regarded in England as a <span class="tei tei-q">“barbara loquella”</span> (<a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">III, 7</a>), it has been inferred that the
			interpreters were men who had acquired a knowledge of the dialect
			of Kent through commerce or otherwise.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_114" id="note_114" class="pginternal">114.</a></dt>
			<dd class="tei tei-notetext">Daughter of Charibert, king of
			Paris.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_115" id="note_115" class="pginternal">115.</a></dt>
			<dd class="tei tei-notetext">Said (on doubtful authority) to have
			been bishop of Senlis. He acted as the queen's private chaplain.
			There is nothing to show that either he or Bertha attempted to
			spread their religion in England, though probably their influence
			may not have been without effect on Ethelbert.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_116" id="note_116" class="pginternal">116.</a></dt>
			<dd class="tei tei-notetext">The old Roman town of Doruvernis,
			which is the name Bede gives to it throughout the History.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_117" id="note_117" class="pginternal">117.</a></dt>
			<dd class="tei tei-notetext">St. Martin was regarded with special
			reverence in Britain and Ireland. Possibly some of the earliest
			missionaries may have been his disciples, <span class="tei tei-hi"><span style="font-style: italic">e.g.</span></span>,
			St. Ninian and St. Patrick. The Roman church of St. Martin at
			Canterbury has been frequently altered and partly rebuilt, so that
			<span class="tei tei-q">“small portions only of the Roman walls
			remain. Roman bricks are used as old materials in the parts
			rebuilt”</span> (Parker).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_118" id="note_118" class="pginternal">118.</a></dt>
			<dd class="tei tei-notetext">Augustine was not consecrated as
			archbishop either of London or Canterbury, but by the general title
			of <span class="tei tei-q">“Archbishop of the English.”</span>
			According to Gregory's original scheme, London, not Canterbury, was
			to have been the seat of the primacy of southern England (cf. c.
			<a class="tei tei-ref pginternal" href="#Book_I_Chap_XXIX">29</a>), London and
			York being doubtless the most important cities of south and north
			known to him from their history during the Roman occupation. But
			Christianity was not permanently established in London till it was
			too late to remove the see from Canterbury, which would obviously
			commend itself to Augustine as the most suitable place to be the
			metropolitan city.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_119" id="note_119" class="pginternal">119.</a></dt>
			<dd class="tei tei-notetext">For Aetherius read Vergilius
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XXIV">24</a>, note). <span class="tei tei-q">“The occupant of the see of Arles was in some sense
			primate of France at this time, and, as such, Vergilius received
			the <span class="tei tei-foreign" lang="la"><span style="font-style: italic">pallium</span></span> and the
			papal vice-gerentship in the kingdom of Childebert”</span> (Dict.
			Christ. Biog.).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_120" id="note_120" class="pginternal">120.</a></dt>
			<dd class="tei tei-notetext">He succeeded Augustine as archbishop.
			For his history, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> II, <a class="tei tei-ref pginternal" href="#Book_II_Chap_VI">6</a>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_VII">7</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_121" id="note_121" class="pginternal">121.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">infra</span></span>
			c. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XXXIII">33</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_122" id="note_122" class="pginternal">122.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, those in minor orders; all
			below the subdiaconate.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_123" id="note_123" class="pginternal">123.</a></dt>
			<dd class="tei tei-notetext">St. Luke, xi, 41. <span class="tei tei-foreign" lang="la"><span style="font-style: italic">Quod superest</span></span> (Vulgate) = πλήν
			(R.V.,<span class="tei tei-q">“Howbeit”</span>; A.V., <span class="tei tei-q">“But rather”</span>), adverbial. Gregory takes it to
			mean <span class="tei tei-q">“what is over.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_124" id="note_124" class="pginternal">124.</a></dt>
			<dd class="tei tei-notetext">Augustine must have observed these
			differences of ritual as he travelled through Gaul. Presumably also
			he found the Gallic use adopted at St. Martin's, Canterbury, by
			Liudhard. Dr. Bright summarizes these differences, <span class="tei tei-q">“Early English Church History,”</span> p. 64.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_125" id="note_125" class="pginternal">125.</a></dt>
			<dd class="tei tei-notetext">Reading <span class="tei tei-q">“fratris et sororis”</span> (for <span class="tei tei-q">“frater et soror”</span>), as the sense requires, but
			there is no MS. authority for the change.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_126" id="note_126" class="pginternal">126.</a></dt>
			<dd class="tei tei-notetext">The text of this passage is corrupt,
			but no very satisfactory emendations have been suggested.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_127" id="note_127" class="pginternal">127.</a></dt>
			<dd class="tei tei-notetext">The <span class="tei tei-foreign" lang="la"><span style="font-style: italic">Pallium</span></span> is a long strip of fine
			cloth ornamented with crosses. It is made from wool of lambs reared
			in the convent of St. Agnes at Rome, and is laid for a night on the
			tomb of St. Peter. It is worn passing over the shoulders, with the
			ends hanging down in front and behind, somewhat in the form of the
			letter Y. (The form has varied at different times.) In the east it
			is called <span class="tei tei-q">“omophorion:”</span> the bishops
			wear it during the celebration of the Eucharist. It originally
			formed part of the imperial habit and was granted by the emperor as
			a special mark of honour. Afterwards the pope claimed the exclusive
			right of bestowing it, and its possession became restricted to
			metropolitans, and was considered necessary for the exercise of
			their functions.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_128" id="note_128" class="pginternal">128.</a></dt>
			<dd class="tei tei-notetext">Deut., xxiii, 25.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_129" id="note_129" class="pginternal">129.</a></dt>
			<dd class="tei tei-notetext">The reference may be to the third
			General Council held at Ephesus in 431 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>, at which the rule
			was laid down <span class="tei tei-q">“that no bishop may act in
			any province which has not always been subject to him.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_130" id="note_130" class="pginternal">130.</a></dt>
			<dd class="tei tei-notetext">This is Bede's attempt to reconcile
			the discrepancy created by his mistake in cc. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XXIV">24</a> and <a class="tei tei-ref pginternal" href="#Book_I_Chap_XXVII">27</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_131" id="note_131" class="pginternal">131.</a></dt>
			<dd class="tei tei-notetext">Mellitus was consecrated Bishop of
			London in 604, and succeeded Laurentius in the see of Canterbury in
			619. Justus was consecrated Bishop of Rochester in 604, and
			succeeded Mellitus as Primate in 624 (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_II_Chap_III">II, 3</a>, foll.).
			Paulinus was the great missionary bishop of the Northumbrians
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_II_Chap_IX">II, 9</a>, foll.). Rufinianus was the third
			abbot of St. Augustine's monastery (SS. Peter and Paul).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_132" id="note_132" class="pginternal">132.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XXVII">27</a> <span class="tei tei-hi"><span style="font-style: italic">ad init.</span></span>, note. Gregory's
			symmetrical scheme was never carried out, and it was not till 735
			that York became a metropolitan see.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_133" id="note_133" class="pginternal">133.</a></dt>
			<dd class="tei tei-notetext">The date is obviously wrong, as it
			makes this letter earlier than that in c. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XXIX">29</a>. The name of the
			month is omitted in two of the oldest MSS. A satisfactory
			emendation (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Plummer, <span class="tei tei-hi"><span style="font-style: italic">ad
			loc.</span></span>) is <span class="tei tei-foreign"><span style="font-style: italic">Augustarum</span></span> (for <span class="tei tei-foreign"><span style="font-style: italic">Juliarum</span></span>), the last month in
			Maurice's reign (XV Kal. Aug., <span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>
			18th July).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_134" id="note_134" class="pginternal">134.</a></dt>
			<dd class="tei tei-notetext">St. Luke, x, 17-20.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_135" id="note_135" class="pginternal">135.</a></dt>
			<dd class="tei tei-notetext">The Cathedral: Christchurch,
			Canterbury; but the original structure was destroyed by fire about
			1067. It was rebuilt by Lanfranc, and enlarged under his successor,
			St. Anselm. Prior Conrad finished and decorated the chancel, and
			the Church was dedicated in 1130. The choir was again burnt down in
			1174, but at once rebuilt. It was completed in 1184. A new nave and
			transept were built between 1378 and 1410, and the great central
			tower was carried up to its present height by the end of the
			fifteenth century.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_136" id="note_136" class="pginternal">136.</a></dt>
			<dd class="tei tei-notetext">Afterwards called St. Augustine's
			Abbey.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_137" id="note_137" class="pginternal">137.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XXVII">27</a> <span class="tei tei-hi"><span style="font-style: italic">ad init.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_138" id="note_138" class="pginternal">138.</a></dt>
			<dd class="tei tei-notetext">Ambleteuse, a small sea-port, about
			six miles to the north of Boulogne.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_139" id="note_139" class="pginternal">139.</a></dt>
			<dd class="tei tei-notetext">II, <a class="tei tei-ref pginternal" href="#Book_II_Chap_II">2</a>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_XII">12</a>; <a class="tei tei-ref pginternal" href="#Book_III_Chap_I">III, 1</a>. He was the grandson of Ida, first king of
			Bernicia (V, 24, and note). His father, Ethelric, seized Deira on
			the death of Aelli (II, 1, p. <a class="tei tei-ref pginternal" href="#Pg083">83</a>), and Ethelfrid ruled over both the
			Northumbrian kingdoms from 593 to 617.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_140" id="note_140" class="pginternal">140.</a></dt>
			<dd class="tei tei-notetext">Gen., xlix, 27.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_141" id="note_141" class="pginternal">141.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, the Dalriadic Scots,
			<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_I_Chap_I">1</a>, and note. For Aedan and his wars,
			<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Rhŷs, <span class="tei tei-q">“Celtic Britain,”</span> pp. 157-159.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_142" id="note_142" class="pginternal">142.</a></dt>
			<dd class="tei tei-notetext">Perhaps Dalston, near Carlisle; more
			probably, on philological grounds, Dawstane Rig in Liddesdale;
			<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Skene, <span class="tei tei-q">“Celtic Scotland,”</span> I, p. 162.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_143" id="note_143" class="pginternal">143.</a></dt>
			<dd class="tei tei-notetext">For a detailed study of St. Gregory,
			<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <span class="tei tei-q">“Gregory the Great, his place in History and
			Thought,”</span> by F. Homes Dudden, B.D. (1905). The oldest
			biographies are: (1) a Life of Gregory, written by a monk of
			Whitby, probably about 713 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>, recently discovered
			in a MS. belonging to the Monastery of St. Gallen; (2) the Life by
			Paul the Deacon, written towards the end of the eighth century; (3)
			the Life by John the Deacon, written about the end of the ninth
			century.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_144" id="note_144" class="pginternal">144.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XXIII">I, 23</a>. Gregory's pontificate extended from
			590 to 604.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_145" id="note_145" class="pginternal">145.</a></dt>
			<dd class="tei tei-notetext">1 Cor., ix, 2.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_146" id="note_146" class="pginternal">146.</a></dt>
			<dd class="tei tei-notetext">We cannot be certain which Felix is
			meant. The choice seems to lie between Felix III, Bishop of Rome,
			483-492, and Felix IV, 526-530. Mr. Homes Dudden decides in favour
			of the latter, on the authority of John the Deacon. In either case,
			the word <span class="tei tei-foreign"><span style="font-style: italic">atavus</span></span> cannot be used in its
			strict sense.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_147" id="note_147" class="pginternal">147.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-foreign"><span style="font-style: italic">Apocrisiarius</span></span>, official
			representative of the see of Rome at the Imperial Court of
			Constantinople (Latin: <span class="tei tei-foreign" lang="la"><span style="font-style: italic">responsalis</span></span>). Ducange explains
			the word as: <span class="tei tei-q">“nomen inditum legatis, quod
			ἀποκρίσεις seu responsa principum deferrent.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_148" id="note_148" class="pginternal">148.</a></dt>
			<dd class="tei tei-notetext">His <span class="tei tei-q">“Moralia,”</span> a commentary on the Book of Job,
			expounding it historically, allegorically, and in its practical
			bearing on morals. His other undoubtedly genuine works are those
			mentioned in the text: Twenty-two homilies on Ezekiel; forty
			homilies on the Gospels for the day, preached by himself at various
			times; the <span class="tei tei-q">“Liber Regulae
			Pastoralis,”</span> on the duties and responsibilities of the
			pastoral office, a very widely studied book; four books of
			Dialogues, <span class="tei tei-q">“De vita et miraculis patrum
			Italicorum et de aeternitate animae,”</span> also one of his most
			famous works; and fourteen books of letters to various persons on
			many subjects. There are also some doubtful works. Of these, the
			<span class="tei tei-q">“Liber Sacramentorum”</span> (<span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span>), the <span class="tei tei-q">“Liber
			Antiphonarius”</span> (a collection of Antiphons for Mass), and the
			Hymns have been generally regarded as genuine, but recent research
			seems to show that they cannot be attributed to Gregory. That he
			introduced the <span class="tei tei-q">“Cantus Gregorianus”</span>
			can also probably be no longer maintained; <span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span> c. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XX">20</a>, <span class="tei tei-hi"><span style="font-style: italic">ad fin.</span></span> note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_149" id="note_149" class="pginternal">149.</a></dt>
			<dd class="tei tei-notetext">Patriarch of Constantinople,
			celebrated as a saint by the Greeks. He was born at Theium in
			Phrygia, <span class="tei tei-hi"><span style="font-style: italic">circ.</span></span> 512 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span> Towards the end of
			his life he maintained the above theory in a book on the
			Resurrection. He was opposed by Gregory, and the book was burnt by
			order of the Emperor Tiberius, who, however, visited him when he
			fell ill soon after, and received his blessing. He died on Easter
			Day, 582, and the <span class="tei tei-q">“heresy”</span> was
			suffered to rest. (He is, of course, not to be confused with
			Eutyches, author of the heresy known as <span class="tei tei-q">“Eutychianism,”</span> <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVII">IV, 17</a>.)</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_150" id="note_150" class="pginternal">150.</a></dt>
			<dd class="tei tei-notetext">St. Luke, xxiv, 39.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_151" id="note_151" class="pginternal">151.</a></dt>
			<dd class="tei tei-notetext">Tiberius II, emperor of the East,
			578-582 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_152" id="note_152" class="pginternal">152.</a></dt>
			<dd class="tei tei-notetext">I, 27.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_153" id="note_153" class="pginternal">153.</a></dt>
			<dd class="tei tei-notetext">A Synodical epistle, such as
			newly-elected bishops were in the habit of sending to other
			bishops. The subject-matter is the same as that of the <span class="tei tei-q">“Pastoral Care.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_154" id="note_154" class="pginternal">154.</a></dt>
			<dd class="tei tei-notetext">Heb., xii, 6.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_155" id="note_155" class="pginternal">155.</a></dt>
			<dd class="tei tei-notetext">Job, xxix, 11-17.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_156" id="note_156" class="pginternal">156.</a></dt>
			<dd class="tei tei-notetext">The quotation is from the Vulgate
			(Job, xxxi, 16-18). The sentence is finished in v. 22: <span class="tei tei-q">“Then let mine arm fall from my shoulder
			blade....”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_157" id="note_157" class="pginternal">157.</a></dt>
			<dd class="tei tei-notetext">John the Deacon attributes to Gregory
			the <span class="tei tei-q">“Liber Sacramentorum,”</span> or
			Gregorian Sacramentary, a revision of the Gelasian Sacramentary. It
			seems probable, however, that it is of much later date. Only a few
			alterations in the Liturgy and in the ceremonial of the Mass are
			proved to have been effected by Gregory. In the Canon of the Mass
			he introduced two changes, viz.: (1) he inserted the words here
			quoted; (2) he altered the position of the Lord's Prayer
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Homes Dudden, pp.
			264-271).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_158" id="note_158" class="pginternal">158.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, 604 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>, cf. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XXIII">I, 23</a>; <a class="tei tei-ref pginternal" href="#Book_II_Chap_I">II, 1</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			init.</span></span>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_159" id="note_159" class="pginternal">159.</a></dt>
			<dd class="tei tei-notetext">Deira was the southern part of the
			province of Northumbria, the northern part being Bernicia. Deira
			was bounded on the south by the Humber; on the north, according to
			some authorities, by the Tyne, according to others, by the Tees.
			The discrepancy doubtless arose from the fact that the part between
			the two latter rivers was a desert subject to no authority. To the
			west lay the British kingdoms.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_160" id="note_160" class="pginternal">160.</a></dt>
			<dd class="tei tei-notetext">The son of Yffi, the first king of
			Deira. The ancient pedigrees trace the descent of the royal houses
			of Deira and Bernicia from two sons of Woden.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_161" id="note_161" class="pginternal">161.</a></dt>
			<dd class="tei tei-notetext">This pope was either Benedict I
			(574-578) or Pelagius II (578-590), the immediate predecessor of
			Gregory. The oldest extant life of Gregory (<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> p.
			<a class="tei tei-ref pginternal" href="#Pg075">75</a>, note) makes him
			Benedict, and is followed by John the Deacon. If this is right, the
			incident related in the text must be placed before Gregory's
			departure to Constantinople in 579. Paul the Deacon places it after
			his return in 585 or 586, and asserts that the pope was Pelagius
			II.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_162" id="note_162" class="pginternal">162.</a></dt>
			<dd class="tei tei-notetext">The date of the synod is uncertain. It
			was probably about 602 or 603 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>, after the arrival of
			Gregory's <span class="tei tei-q">“Responsa.”</span> The
			<span class="tei tei-q">“nearest province”</span> must mean what we
			call South Wales, though it is possible that the Britons of
			Cornwall were also represented. The scene of the conference has
			been generally supposed to be Aust, on the Severn, opposite
			Chepstow, and the name may possibly preserve the memory of
			Augustine, though more probably it is derived from <span class="tei tei-q">“Trajectus Augusti”</span> (Haddan and Stubbs). Other
			possible sites are Malmesbury (Green, <span class="tei tei-q">“Making of England”</span>), and a spot called
			<span class="tei tei-q">“the Oak,”</span> near Cricklade, on the
			Upper Thames, which would be on the borders of the Hwiccas and West
			Saxons (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Plummer, <span class="tei tei-hi"><span style="font-style: italic">ad
			loc.</span></span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_163" id="note_163" class="pginternal">163.</a></dt>
			<dd class="tei tei-notetext">The Hwiccas were in the present
			Gloucestershire and Worcestershire, north-west of Wessex.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_164" id="note_164" class="pginternal">164.</a></dt>
			<dd class="tei tei-notetext">
			<p>Cf. especially
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">III, 25</a>, and
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_XXI">V, 21</a>. (Other
			references are: II, <a class="tei tei-ref pginternal" href="#Book_II_Chap_IV">4</a>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_XIX">19</a>; III, <a class="tei tei-ref pginternal" href="#Book_III_Chap_III">3</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_IV">4</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVI">26</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIX">29</a>; V, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XV">15</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXII">22</a>.)</p>
			<p>A full
			discussion of this involved question is beyond our scope. Readers
			are referred to Plummer (Excursus on Paschal Controversy),
			Bright, or Hunt. Here, the point at issue may be briefly stated.
			It was regarded as essential by the Roman Church that Easter Day
			should be kept on a Sunday, in the third week of the first month,
			<span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>, the month in which the
			full moon occurred on or after the vernal equinox. The Celts
			observed the Feast on Sunday, and were, therefore, not rightly
			called <span class="tei tei-q">“Quartodecimans”</span> (the name
			given to those who observed it on the 14th of the month Nisan,
			the day of the Jewish Passover, without regard to the day of the
			week). They differed from the Romans in fixing the vernal equinox
			at March 25th, instead of March 21st, and in their reckoning of
			the third week, holding it to be from the 14th to the 20th of the
			moon inclusive. The Roman Church originally reckoned it from the
			16th to the 22nd, but ultimately fixed it from the 15th to the
			21st (cf. V, 21, p. <a class="tei tei-ref pginternal" href="#Pg365">365</a>).</p>
			<p>There was a
			further divergence in the <span class="tei tei-q">“cycles”</span>
			adopted to ascertain the day in each year on which the Paschal
			moon would fall. The Celts retained an old cycle of eighty-four
			years, while the Romans had finally adopted one of nineteen. It
			is obvious that these differences must necessarily lead to great
			divergence in practice and consequently serious inconvenience.
			The real importance of this and the other points of difference,
			settled afterwards at the Synod of Whitby, lay in the question
			whether England was to conform to the practice of the Catholic
			Church, or to isolate herself from it by local peculiarities (cf.
			the reply of the British to Augustine: <span class="tei tei-q">“They would do none of those things nor receive him
			as their archbishop”</span>).</p>
			</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_165" id="note_165" class="pginternal">165.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">E.g.</span></span>, Consecration of bishops by
			a single bishop, certain differences of ritual (Gregory's
			<span class="tei tei-q">“Responsa”</span> admit of some latitude in
			these matters), and the tonsure, which was a more controversial
			point (cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVI">III,
			26</a>, and <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXI">V,
			21</a>). The Romans shaved only the top of the head, letting the
			hair grow in the form of a crown. The Celts shaved the whole front
			of the head from ear to ear, leaving the hair at the back. A third
			method was the Oriental, which consisted in shaving the whole head
			(cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_I">IV, 1</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_166" id="note_166" class="pginternal">166.</a></dt>
			<dd class="tei tei-notetext">The place of the second conference is
			not mentioned. It is generally assumed that it was the same as that
			of the first. All attempts to determine the names and sees of these
			bishops rest upon the most uncertain evidence.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_167" id="note_167" class="pginternal">167.</a></dt>
			<dd class="tei tei-notetext">Probably Bangor-is-Coed, in
			Flintshire, from which it appears that North Wales was represented
			at the second conference. The size and importance of the monastery
			are inferred by William of Malmesbury, writing in the twelfth
			century, from the extent of the ruins, which were all that was left
			of it in his time.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_168" id="note_168" class="pginternal">168.</a></dt>
			<dd class="tei tei-notetext">Dunawd, or Dunod; Latin: Donatus
			(Rhŷs).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_169" id="note_169" class="pginternal">169.</a></dt>
			<dd class="tei tei-notetext">It is not known in what way the
			practice of the British Church differed from that of the Romans in
			the rite of Baptism. It may have been by the neglect of
			Confirmation as the completion of Baptism (cf. <span class="tei tei-q">“compleatis”</span> in the text). Other suggestions
			are: single immersion (but this was permitted in Spain); the
			omission of chrism, an omission which was affirmed of the Irish at
			a later period; some defect in the invocation of the Trinity. This
			conjecture rests on a canon respecting Baptism established in the
			English Church from the time of Augustine (quoted by Haddan and
			Stubbs from a letter of Pope Zacharias to Boniface), which enforces
			the full invocation.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_170" id="note_170" class="pginternal">170.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_I_Chap_XXXIV">I, 34</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_171" id="note_171" class="pginternal">171.</a></dt>
			<dd class="tei tei-notetext">Chester, the seat of the Twentieth
			legion. <span class="tei tei-q">“Legionum civitas, quae nunc
			simpliciter Cestra vocatur.”</span> (William of Malmesbury.) Cf.
			note on I, 7, p. <a class="tei tei-ref pginternal" href="#Pg018">18</a>. The
			date of the battle cannot be accurately fixed. The <span class="tei tei-q">“Annales Cambriae”</span> give 613, but it may have
			been a few years later. Bede only tells us that it was a
			considerable time after Augustine's death, which was probably in
			604 or 605.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_172" id="note_172" class="pginternal">172.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">supra</span></span>
			p. <a class="tei tei-ref pginternal" href="#Pg086">86</a>, note 2.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_173" id="note_173" class="pginternal">173.</a></dt>
			<dd class="tei tei-notetext">Nothing certain is known of this Welsh
			prince.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_174" id="note_174" class="pginternal">174.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_I_Chap_XXIX">I, 29</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_175" id="note_175" class="pginternal">175.</a></dt>
			<dd class="tei tei-notetext">The site is covered by the present
			cathedral.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_176" id="note_176" class="pginternal">176.</a></dt>
			<dd class="tei tei-notetext">Rochester. The new see was closely
			dependent on Canterbury, and till 1148 the archbishop had the
			appointment to this bishopric.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_177" id="note_177" class="pginternal">177.</a></dt>
			<dd class="tei tei-notetext">Probably in memory of his monastery on
			the Coelian (cf. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XXIII">I, 23</a>). According to Rochester tradition,
			Ethelbert gave to the church some land called Priestfield to the
			south of the city, and other lands to the north. There exists a
			charter of Ethelbert to the city of Rochester, believed to be
			genuine.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_178" id="note_178" class="pginternal">178.</a></dt>
			<dd class="tei tei-notetext">The year is not given, and is not
			certainly known. It is generally assumed to have been 604 or
			605.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_179" id="note_179" class="pginternal">179.</a></dt>
			<dd class="tei tei-notetext">This was in 613, by Laurentius. St.
			Augustine's body was translated on September 13th. It was moved
			again in the twelfth century and placed under the high altar.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_180" id="note_180" class="pginternal">180.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“Porticus”</span>; variously translated: <span class="tei tei-q">“porch,”</span> <span class="tei tei-q">“aisle,”</span>
			<span class="tei tei-q">“transept,”</span> and <span class="tei tei-q">“chapel.”</span> Ducange explains it as <span class="tei tei-q">“aedis sacrae propylaeum in porticus formam
			exstructum,”</span> and says it was also used improperly for the
			sanctuary. Plummer (<span class="tei tei-hi"><span style="font-style: italic">ad loc.</span></span>) says it means side
			chapel, as often. The mention of the altar just below seems to
			support this meaning (if, indeed, <span class="tei tei-foreign"><span style="font-style: italic">haec</span></span> refers to the <span class="tei tei-q">“porticus,”</span> and not to the church itself, as is
			assumed in the A.S. version).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_181" id="note_181" class="pginternal">181.</a></dt>
			<dd class="tei tei-notetext">For Theodore <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
