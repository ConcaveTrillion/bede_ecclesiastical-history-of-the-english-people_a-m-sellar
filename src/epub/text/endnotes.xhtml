			<dt class="tei tei-notelabel"><a href="#noteref_777" id="note_777" class="pginternal">777.</a></dt>
			<dd class="tei tei-notetext">Acts, iii, 2-8.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_778" id="note_778" class="pginternal">778.</a></dt>
			<dd class="tei tei-notetext">This was Wilfrid's second restoration.
			He recovered Hexham and the monastery of Ripon at the Synod on the
			Nidd in 705.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_779" id="note_779" class="pginternal">779.</a></dt>
			<dd class="tei tei-notetext">Bosa (IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIII">23</a>) died <span class="tei tei-hi"><span style="font-style: italic">circ.</span></span> 705.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_780" id="note_780" class="pginternal">780.</a></dt>
			<dd class="tei tei-notetext">Watton in the East Riding of
			Yorkshire. (<span class="tei tei-q">“Hodie Watton, <span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>,
			humida villa ex aquis et paludibus quibus septa est.”</span>
			Smith.) It is called Betendune by Folcard, the biographer of Bishop
			John.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_781" id="note_781" class="pginternal">781.</a></dt>
			<dd class="tei tei-notetext">For <span class="tei tei-q">“studium”</span> = medical treatment, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			Plummer, <span class="tei tei-hi"><span style="font-style: italic">ad loc.</span></span> Under the verb,
			<span class="tei tei-foreign"><span style="font-style: italic">studere</span></span>, Ducange gives instances
			of this meaning: <span class="tei tei-q">“Iussitque rex, ut
			studeretur a medicis”</span>; Greg. Turon., vi, 32. <span class="tei tei-q">“Episcopus, adhibito mulomedico, jussit ei (equo)
			studium impendere, quo scilicet sanari potuisset”</span>; St.
			Audoënus, lib. 2; Vit. St. Eligii, 44.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_782" id="note_782" class="pginternal">782.</a></dt>
			<dd class="tei tei-notetext">Bishop John had studied under
			Theodore. Cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIII">IV,
			23</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_783" id="note_783" class="pginternal">783.</a></dt>
			<dd class="tei tei-notetext">Note the tendency to hereditary
			succession in monasteries (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Haddan and Stubbs, III,
			337-338). Instances are, however, rare in England, though common in
			Ireland, where the clan system affected ecclesiastical preferments.
			Eanfled and Elfled at Whitby are not a case in point, as Eanfled
			did not precede her daughter, but was only associated with her in
			some way in the government of the monastery.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_784" id="note_784" class="pginternal">784.</a></dt>
			<dd class="tei tei-notetext">This <span class="tei tei-q">“vill”</span> was at South Burton (Folcard), now called
			Bishop Burton, between two and three miles from Beverley.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_785" id="note_785" class="pginternal">785.</a></dt>
			<dd class="tei tei-notetext">To redeem his fast, as the A.S.
			version explains.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_786" id="note_786" class="pginternal">786.</a></dt>
			<dd class="tei tei-notetext">St. Matt., viii, 14-15; St. Mark, i,
			30-31; St. Luke, iv, 38-39.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_787" id="note_787" class="pginternal">787.</a></dt>
			<dd class="tei tei-notetext">At North Burton (Dugdale, <span class="tei tei-q">“Monasticon”</span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_788" id="note_788" class="pginternal">788.</a></dt>
			<dd class="tei tei-notetext">He lived till 745, according to Simeon
			of Durham.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_789" id="note_789" class="pginternal">789.</a></dt>
			<dd class="tei tei-notetext">There were probably two monasteries at
			Tynemouth, the one mentioned here, and another (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			Bede's <span class="tei tei-q">“Life of Cuthbert”</span>), which
			had been a house of monks, but afterwards, when Bede wrote, had
			become a nunnery.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_790" id="note_790" class="pginternal">790.</a></dt>
			<dd class="tei tei-notetext">Breathing on the face and catechizing
			were practised in order to exorcise evil spirits from the hearts of
			catechumens (Bede, Opp. viii, 106).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_791" id="note_791" class="pginternal">791.</a></dt>
			<dd class="tei tei-notetext">The Saxon Chronicle is very exact:
			<span class="tei tei-q">“Thirty-three years, eight months, and
			thirteen days.”</span> This would date his episcopate from August,
			687, to May, 721, for May 7th was observed as the day of his
			festival at Beverley.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_792" id="note_792" class="pginternal">792.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_II">2</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_793" id="note_793" class="pginternal">793.</a></dt>
			<dd class="tei tei-notetext">Wilfrid II: <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> IV,
			23, p. <a class="tei tei-ref pginternal" href="#Pg273">273</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_794" id="note_794" class="pginternal">794.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, in 688. For Caedwalla,
			<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a> (and note), <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XV">15</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVI">16</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_795" id="note_795" class="pginternal">795.</a></dt>
			<dd class="tei tei-notetext">Sergius I, 687-701.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_796" id="note_796" class="pginternal">796.</a></dt>
			<dd class="tei tei-notetext">Cf. II, <a class="tei tei-ref pginternal" href="#Book_II_Chap_IX">9</a>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_XIV">14</a> and notes.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_797" id="note_797" class="pginternal">797.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XIV">II, 14</a> and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_798" id="note_798" class="pginternal">798.</a></dt>
			<dd class="tei tei-notetext">By Benedictus Crispus, Archbishop of
			Milan. He died in 725.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_799" id="note_799" class="pginternal">799.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, Sergius was his godfather
			(cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">III, 7</a>,
			where Oswald stands sponsor for Cynegils). The Saxon Chronicle says
			he also baptized him.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_800" id="note_800" class="pginternal">800.</a></dt>
			<dd class="tei tei-notetext">Justinian II. He succeeded in 685 and
			died in 711.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_801" id="note_801" class="pginternal">801.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XV">IV, 15</a>, and note. Thus, according to Bede's
			reckoning, he reigned from 688 to 725, but the date of his
			abdication is variously given.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_802" id="note_802" class="pginternal">802.</a></dt>
			<dd class="tei tei-notetext">Gregory II., 715-731, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			Preface, p. <a class="tei tei-ref pginternal" href="#Pg002">2</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_803" id="note_803" class="pginternal">803.</a></dt>
			<dd class="tei tei-notetext">He was consecrated 26th March, 668,
			and died, as Bede says here, on 19th September, 690.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_804" id="note_804" class="pginternal">804.</a></dt>
			<dd class="tei tei-notetext">The church of SS. Peter and Paul. Cf.
			II, 3, p. <a class="tei tei-ref pginternal" href="#Pg090">90</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_805" id="note_805" class="pginternal">805.</a></dt>
			<dd class="tei tei-notetext">They are elegiacs. Cf. <a class="tei tei-ref pginternal" href="#Book_I_Chap_X">I, 10</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_806" id="note_806" class="pginternal">806.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_III">II, 3</a>, and <span class="tei tei-hi"><span style="font-style: italic">infra</span></span> <a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">19</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIII">23</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_807" id="note_807" class="pginternal">807.</a></dt>
			<dd class="tei tei-notetext">The old Roman town Reculver, in Kent.
			A charter of 679 exists (the oldest original English charter
			extant) by which King Hlothere of Kent grants land in Thanet to
			Bertwald and his monastery.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_808" id="note_808" class="pginternal">808.</a></dt>
			<dd class="tei tei-notetext">Said to be the Inlade.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_809" id="note_809" class="pginternal">809.</a></dt>
			<dd class="tei tei-notetext">The see was, therefore, vacant for two
			years, possibly owing to the political troubles of the time, cf.
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">IV, 26</a>,
			<span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span> The further delay of a year between Bertwald's
			election and consecration may have been caused by his desire to
			obtain greater weight as consecrated by the Primate of a
			neighbouring Church (Haddan and Stubbs, III, 229).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_810" id="note_810" class="pginternal">810.</a></dt>
			<dd class="tei tei-notetext">For Wictred, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">IV, 26</a>, and
			note. Thomas of Elmham tries to identify Suaebhard with Suefred,
			son of Sebbi, king of the East Saxons (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XI">IV, 11</a>,
			<span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span>), and says that he made himself king of Kent by
			violence, but this seems very improbable.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_811" id="note_811" class="pginternal">811.</a></dt>
			<dd class="tei tei-notetext">He was Archbishop of Lyons. The Church
			of Lyons did not obtain the primacy over other metropolitan
			churches till the eleventh century, but apparently it held a
			leading position even before this time.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_812" id="note_812" class="pginternal">812.</a></dt>
			<dd class="tei tei-notetext">He was trained under Theodore and
			Hadrian in the School of Canterbury; cf. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIII">V, 23</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			init.</span></span> The date of Gebmund's death and the succession
			of Tobias cannot be earlier than 696, as Gebmund (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">IV, 12</a>) appears
			to have been present at the Kentish Witenagemot of Bersted in that
			year. (Haddan and Stubbs, III, 238, 241.) Tobias died in 726.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_813" id="note_813" class="pginternal">813.</a></dt>
			<dd class="tei tei-notetext">III, <a class="tei tei-ref pginternal" href="#Book_III_Chap_IV">4</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVII">27</a>; IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_III">3</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">26</a>, and <span class="tei tei-hi"><span style="font-style: italic">infra</span></span> cc. <a class="tei tei-ref pginternal" href="#Book_V_Chap_X">10</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XX">22</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIII">23</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">24</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_814" id="note_814" class="pginternal">814.</a></dt>
			<dd class="tei tei-notetext">The name does not occur in any Celtic
			literature which we possess. All the evidence seems to show that
			the Celts have always called the English <span class="tei tei-q">“Saxons.”</span> <span class="tei tei-q">“Ellmyn,”</span> for Allemanni, occurs sometimes in
			Welsh poetry (Rhŷs, <span class="tei tei-q">“Celtic
			Britain”</span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_815" id="note_815" class="pginternal">815.</a></dt>
			<dd class="tei tei-notetext">The Frisians at this time occupied the
			coastland from the Maas to the region beyond the Ems. The Rugini
			are probably the Rugii (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Tacitus, Germania, Chapter
			XLIII). They were on the shores of the Baltic, probably about the
			mouth of the Oder (the name survives in Rügen and Rügenwalde). They
			are found with other North German tribes in the army of Attila, and
			afterwards formed a settlement on the Lower Danube. The Danes were
			mainly in Jutland, Fünen, and the extreme south of Scandinavia. The
			Huns, who appeared in Europe towards the end of the fourth century
			and menaced both the Eastern and Western Empires, were, after
			Attila's death, driven eastwards, and settled near the Pontus,
			disappearing among the Bulgarians and other kindred tribes. The Old
			Saxons, or Saxons of the Continent (cf. <a class="tei tei-ref pginternal" href="#Book_I_Chap_XV">I, 15</a>), occupied both sides of the Elbe.
			The name Saxon does not occur in the oldest accounts of the
			Germans. Probably it was a new name for a union of nations which
			comprised the Cherusci, Chauci, Angrivarii (and perhaps other
			tribes) of Tacitus. The Boructuari are the Bructeri in Westphalia
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Zeuss, <span class="tei tei-q">“Die Deutschen und die Nachbarstämme”</span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_816" id="note_816" class="pginternal">816.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVII">IV, 27</a> (note) and <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVIII">28</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_817" id="note_817" class="pginternal">817.</a></dt>
			<dd class="tei tei-notetext">Melrose; cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVI">III, 26</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVII">IV, 27</a>, and
			<span class="tei tei-hi"><span style="font-style: italic">infra</span></span> c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XII">12</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_818" id="note_818" class="pginternal">818.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVII">IV, 27</a>. Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVI">III, 26</a>; IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVIII">28</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_II">V, 2</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_819" id="note_819" class="pginternal">819.</a></dt>
			<dd class="tei tei-notetext">Cf. III, <a class="tei tei-ref pginternal" href="#Book_III_Chap_III">3</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_IV">4</a>, and notes; <span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>,
			the monasteries which owed their origin to Columba and were
			included in the <span class="tei tei-q">“province”</span> of Iona.
			They are distinguished from those which are mentioned in c.
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_XV">15</a> as
			<span class="tei tei-q">“ab Hiensium dominio liberi.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_820" id="note_820" class="pginternal">820.</a></dt>
			<dd class="tei tei-notetext">His baptismal name was Colum
			(<span class="tei tei-foreign"><span style="font-style: italic">columba</span></span> = a dove). He is said to
			have acquired the name of Colum-cille, because in his youth he was
			so constantly in the <span class="tei tei-q">“cell”</span> or
			oratory.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_821" id="note_821" class="pginternal">821.</a></dt>
			<dd class="tei tei-notetext">Jonah, i, 12.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_822" id="note_822" class="pginternal">822.</a></dt>
			<dd class="tei tei-notetext">Nothing more is known of him. Alcuin
			mentions him in his life of Wilbrord. His name is included in a
			list of the eleven companions of Wilbrord given in a life of St.
			Suidbert (<span class="tei tei-hi"><span style="font-style: italic">v. infra</span></span> c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XI">11</a>), but no value is to
			be attached to it (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> Haddan and Stubbs, III, 225).
			Bede distinctly says that he retired from missionary efforts after
			this unsuccessful attempt.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_823" id="note_823" class="pginternal">823.</a></dt>
			<dd class="tei tei-notetext">The story is told that at one time
			Rathbed was about to receive baptism at the hands of St. Wulfram,
			Archbishop of Sens, but drew back on being told that his ancestors
			were among the lost, refusing to go to Heaven without them. His
			perpetual wars with the Franks ended in his defeat and expulsion,
			and he died in 719.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_824" id="note_824" class="pginternal">824.</a></dt>
			<dd class="tei tei-notetext">The authority for Wilbrord's life is
			Alcuin, who wrote it both in prose and verse. Wilbrord was born in
			657 or 658 in Northumbria, and was handed over by his mother to the
			monks at Ripon in his infancy. His father, Wilgils, became a hermit
			on a promontory at the mouth of the Humber. At the age of twenty he
			went to Ireland for the sake of study and a stricter life. In 690
			he set out for Frisland with eleven others, landed at Katwyk and
			went to Utrecht, which was afterwards his episcopal see
			(<span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span> c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XI">11</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_825" id="note_825" class="pginternal">825.</a></dt>
			<dd class="tei tei-notetext">They turned aside to Pippin on finding
			Rathbed obdurate. Pippin of Heristal, Mayor of the Palace of the
			Austrasian kings, had defeated the Neustrians at Testry in 687 and
			was now the actual ruler of the Franks, though it was his grandson,
			Pippin the Short, who first assumed royal power.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_826" id="note_826" class="pginternal">826.</a></dt>
			<dd class="tei tei-notetext">Cf. c. 9, p. <a class="tei tei-ref pginternal" href="#Pg319">319</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_827" id="note_827" class="pginternal">827.</a></dt>
			<dd class="tei tei-notetext">Roger of Wendover places their mission
			in 695. It must have been later than Wilbrord's in 690.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_828" id="note_828" class="pginternal">828.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“Satrap,”</span> cf. Stubbs, Constitutional History, i,
			pp. 41-42. From this passage and similar notices of the Continental
			Saxons he infers that they had remained free from Roman influences
			and from any foreign intermixture of blood or institutions.
			<span class="tei tei-q">“They had preserved the ancient features of
			German life in their purest forms.... King Alfred, when he
			translated Bede had no difficulty in recognizing in the satrap the
			ealdorman, in the villicus the <span class="tei tei-foreign"><span style="font-style: italic">tungerefa</span></span>, in the vicus the
			<span class="tei tei-foreign"><span style="font-style: italic">tunscipe</span></span> of his own
			land.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_829" id="note_829" class="pginternal">829.</a></dt>
			<dd class="tei tei-notetext">The year cannot be fixed.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_830" id="note_830" class="pginternal">830.</a></dt>
			<dd class="tei tei-notetext">The Church of St. Cunibert, Cologne
			(Gallican Martyrology, quoted by Smith).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_831" id="note_831" class="pginternal">831.</a></dt>
			<dd class="tei tei-notetext">Sergius I: <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c.
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_VII">7</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_832" id="note_832" class="pginternal">832.</a></dt>
			<dd class="tei tei-notetext">Alcuin tells how he killed some of the
			sacred cattle of the god Fosite, a son of Balder, in Heligoland,
			and baptized three men in his well.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_833" id="note_833" class="pginternal">833.</a></dt>
			<dd class="tei tei-notetext">A life of him by Marcellinus
			(<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_IX">9</a>, note on Wictbert) is
			worthless historically. Besides what we learn from Bede, we have
			the date of his death (713) given by the <span class="tei tei-q">“Annales Francorum.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_834" id="note_834" class="pginternal">834.</a></dt>
			<dd class="tei tei-notetext">This was after Wilfrid's second
			expulsion (<a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">V,
			19</a>). Bertwald was elected in July, 692, and returned from the
			Continent in August, 693 (<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_VIII">8</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_835" id="note_835" class="pginternal">835.</a></dt>
			<dd class="tei tei-notetext">The usual form of the name is
			Plectrude.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_836" id="note_836" class="pginternal">836.</a></dt>
			<dd class="tei tei-notetext">Kaiserwerth on the Rhine, where it is
			believed that his relics still remain in a silver shrine in the
			thirteenth-century church. (For the preposition, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> II,
			14, p. <a class="tei tei-ref pginternal" href="#Pg119">119</a>, note 5.)</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_837" id="note_837" class="pginternal">837.</a></dt>
			<dd class="tei tei-notetext">This was Santa Cecilia in Trastevere.
			The festival is 22nd November. As to the year, Mr. Plummer
			considers that an entry in an old calendar belonging to Epternach,
			near Trèves, Wilbrord's own monastery, giving the date 695, is
			almost certainly by Wilbrord himself.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_838" id="note_838" class="pginternal">838.</a></dt>
			<dd class="tei tei-notetext">Utrecht. A distinction has been drawn
			between the two places, Wiltaburg, or Wiltenburg, being a village
			near Utrecht, but the names appear to be interchangeable.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_839" id="note_839" class="pginternal">839.</a></dt>
			<dd class="tei tei-notetext">The Church of St. Saviour. He also
			rebuilt a small church which had been destroyed by the pagans, and
			consecrated it in honour of St. Martin (Letter of St. Boniface to
			Pope Stephen). The cathedral stands on the site of this
			church.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_840" id="note_840" class="pginternal">840.</a></dt>
			<dd class="tei tei-notetext">Bede writes in 731. As Alcuin says
			Wilbrord lived to be eighty-one years of age, he must have died in
			738 or 739. Boniface is fairly accurate when he says that he
			preached for fifty years.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_841" id="note_841" class="pginternal">841.</a></dt>
			<dd class="tei tei-notetext">Mr. Skene (<span class="tei tei-q">“Celtic Scotland,”</span> i., p. 219) has shown that
			the place cannot be Cunningham in Ayrshire, which was not in
			Northumbria, but in Strathclyde, and not at that time subject to
			Northumbria. He suggests Tininghame in East Lothian, which Simeon
			of Durham calls Intiningaham, and places in the diocese of
			Lindisfarne (C being a scribe's error for T). Chester-le-Street
			(Saxon: Cunungaceaster) has also been suggested.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_842" id="note_842" class="pginternal">842.</a></dt>
			<dd class="tei tei-notetext">Melrose, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVI">III, 26</a>;
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVII">IV, 27</a>;
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_IX">V, 9</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_843" id="note_843" class="pginternal">843.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIX">III, 19</a>. On mediaeval visions, cf. Plummer,
			<span class="tei tei-hi"><span style="font-style: italic">ad
			loc.</span></span>, and Bright, p. 144.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_844" id="note_844" class="pginternal">844.</a></dt>
			<dd class="tei tei-notetext">Vergil, Aen. VI, 268.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_845" id="note_845" class="pginternal">845.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">IV, 26</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_I">V. 1</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_846" id="note_846" class="pginternal">846.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIII">23</a>. He began life in the service of St.
			Cuthbert. He became first Prior, or Provost, then Abbot of Melrose,
			and succeeded Eadfrid, who died in 721, as Bishop of Lindisfarne.
			He enriched Lindisfarne with two treasures of art: a beautiful
			stone cross which he erected there, and a cover of gold and jewels
			for the Lindisfarne Gospels, written by Eadfrid in honour of St.
			Cuthbert. The book is now in the British Museum, but the cover is
			lost.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_847" id="note_847" class="pginternal">847.</a></dt>
			<dd class="tei tei-notetext">704-709. Cf. <span class="tei tei-hi"><span style="font-style: italic">infra</span></span>,
			c. 19, pp. <a class="tei tei-ref pginternal" href="#Pg345">345</a>, <a class="tei tei-ref pginternal" href="#Pg356">356</a>, and c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">24</a>. He was the son of
			Wulfhere, but being a boy at the time of his father's death, was
			passed over in favour of Ethelred, Wulfhere's brother.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_848" id="note_848" class="pginternal">848.</a></dt>
			<dd class="tei tei-notetext">Ps. xxxi, 1, in the Vulgate (xxxii in
			our Psalter).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_849" id="note_849" class="pginternal">849.</a></dt>
			<dd class="tei tei-notetext">Bishop of Whitern; <span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span>, cc. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">18</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIII">23</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_850" id="note_850" class="pginternal">850.</a></dt>
			<dd class="tei tei-notetext">Cf. 1 John, v, 16.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_851" id="note_851" class="pginternal">851.</a></dt>
			<dd class="tei tei-notetext">Acts, vii, 56.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_852" id="note_852" class="pginternal">852.</a></dt>
			<dd class="tei tei-notetext">The northern Irish, and of them only
			those who were independent of Iona (<span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span>). The southern Irish had conformed much
			earlier; cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_III">III,
			3</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_853" id="note_853" class="pginternal">853.</a></dt>
			<dd class="tei tei-notetext">It is not clear whether Bede means
			that any Britons were converted by Adamnan. If so, they must have
			been Britons of Strathclyde. The Welsh only conformed 755-777. The
			reference may be to those of the Cornish Britons, subject to the
			West Saxons, who were led in 705 by Aldhelm's letter to Geraint to
			adopt the Catholic Easter (<span class="tei tei-hi"><span style="font-style: italic">v. infra</span></span>, c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">18</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_854" id="note_854" class="pginternal">854.</a></dt>
			<dd class="tei tei-notetext">Ninth Abbot of Iona, 679-704, the
			author of the Life of St. Columba.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_855" id="note_855" class="pginternal">855.</a></dt>
			<dd class="tei tei-notetext">Of Northumbria. Aldfrid, who had
			studied in Iona during his exile, was his friend. Adamnan visited
			the king twice, first, circ. 686, when he obtained the release of
			the sixty Irish prisoners taken to England by Berct in 684
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXVI">IV, 26</a> <span class="tei tei-hi"><span style="font-style: italic">ad
			init.</span></span>) and again two years later (cf. <span class="tei tei-hi"><span style="font-style: italic">infra</span></span>
			c. 21, p. <a class="tei tei-ref pginternal" href="#Pg372">372</a>, note
			2).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_856" id="note_856" class="pginternal">856.</a></dt>
			<dd class="tei tei-notetext">The Irish annals mention two voyages
			to Ireland subsequent to that in 686 with the prisoners, viz., in
			692 and 697, after which he probably stayed there till after
			Easter, 704.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_857" id="note_857" class="pginternal">857.</a></dt>
			<dd class="tei tei-notetext">On 23rd September, 704. (The dates are
			those of Tighernach and the <span class="tei tei-q">“Annales
			Cambriae.”</span>)</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_858" id="note_858" class="pginternal">858.</a></dt>
			<dd class="tei tei-notetext">Adamnan's <span class="tei tei-q">“De
			Locis Sanctis,”</span> and Bede's account here, are the only
			sources of information with regard to this bishop. Adamnan's book
			is based on the narrative of Arculf compared with other
			authorities. Bede, again, in his own work on the the same subject,
			made selections from Adamnan, using also other authorities,
			<span class="tei tei-hi"><span style="font-style: italic">e.g.</span></span> Josephus.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_859" id="note_859" class="pginternal">859.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, he had copies made of
			it.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_860" id="note_860" class="pginternal">860.</a></dt>
			<dd class="tei tei-notetext">Nevertheless he quotes his own book
			rather than Adamnan's.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_861" id="note_861" class="pginternal">861.</a></dt>
			<dd class="tei tei-notetext">Cf. Warren and Conder, <span class="tei tei-q">“Survey of Western Palestine”</span>: <span class="tei tei-q">“Bethlehem, a well-built stone town, standing on a
			narrow ridge which runs east and west ... towards the east is the
			open market place, and, beyond this, the convent in which is the
			fourth century church of St. Mary, including the Grotto of the
			Nativity beneath the main apse.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_862" id="note_862" class="pginternal">862.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“Vulturnus”</span> seems to be distinguished from its
			Greek equivalent, <span class="tei tei-q">“Eurus.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_863" id="note_863" class="pginternal">863.</a></dt>
			<dd class="tei tei-notetext">The Basilica of the Anastasis was
			completed by Constantine in 335 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>, and destroyed in 614
			by Chosroes II, King of Persia. Other ancient travellers besides
			Arculf describe the Holy Places. Eucherius, writing about 427-440,
			mentions the Martyrium, Golgotha and the Anastasis, and describes
			their respective sites in similar terms. Theodorus (about 530
			<span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>) alludes to the
			Invention of the Holy Cross by Helena, but the earliest authorities
			do not connect her with it.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_864" id="note_864" class="pginternal">864.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-q">“Brucosa.”</span> The adjective is not found in the
			dictionaries. But Ducange has the following words from which one
			may, perhaps, infer an adjective of kindred meaning: <span class="tei tei-q">“<span class="tei tei-foreign"><span style="font-style: italic">Brua</span></span>, idem quod supra
			<span class="tei tei-foreign"><span style="font-style: italic">Brossa</span></span>, silvula,
			dumetum,”</span> <span class="tei tei-q">“<span class="tei tei-foreign"><span style="font-style: italic">Bruarium</span></span>, ericetum,”</span> and
			<span class="tei tei-q">“<span class="tei tei-foreign"><span style="font-style: italic">Broca</span></span>, ager incultus,
			dumetum.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_865" id="note_865" class="pginternal">865.</a></dt>
			<dd class="tei tei-notetext">The Basilica of the Ascension, on the
			summit of Mount Olivet, is mentioned by the Pilgrim of Bordeaux who
			was in Jerusalem in 333 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span> No traces of the
			church have been found. He also speaks of the Anastasis, which was
			being built at the time.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_866" id="note_866" class="pginternal">866.</a></dt>
			<dd class="tei tei-notetext">Saewulf (1102 <span class="tei tei-hi"><span style="font-variant: small-caps">a.d.</span></span>) writes: <span class="tei tei-q">“Below is the place called Golgotha, where Adam is said
			to have been raised to life by the Blood of our Lord which fell
			upon him, as is said in the Passion, <span class="tei tei-q">‘And
			many bodies of the saints which slept arose.’</span> But in the
			sentences of St. Augustine we read that he was buried in Hebron,
			where also the three patriarchs were afterwards buried with their
			wives, Abraham with Sarah, Isaac with Rebecca, and Jacob with Leah,
			as well as the bones of Joseph which the children of Israel carried
			with them from Egypt.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_867" id="note_867" class="pginternal">867.</a></dt>
			<dd class="tei tei-notetext">He died at Driffield (supposed to mean
			the <span class="tei tei-q">“field of Deira”</span>), in the East
			Riding of Yorkshire, on 14th December, 705 (Saxon Chronicle).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_868" id="note_868" class="pginternal">868.</a></dt>
			<dd class="tei tei-notetext">Bede and the Chronicle do not mention
			the usurper Eadwulf, who held the sovereignty for eight weeks. With
			Aldfrid the greatness of Northumbria, which had begun to decline
			after Egfrid's defeat and death, passed away, except for a brief
			revival in the time of Eadbert and his brother, Archbishop Egbert.
			Osred was a tyrannical and lawless boy, and a period of political
			and ecclesiastical trouble set in (cf. Bede, <span class="tei tei-q">“Epistola ad Egbertum”</span>; Boniface, Ep. 62,
			etc.).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_869" id="note_869" class="pginternal">869.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">III, 7</a>; <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">IV, 12</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_870" id="note_870" class="pginternal">870.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Infra</span></span> c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIII">23</a>. He has been
			mentioned, c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XIII">13</a>, <span class="tei tei-hi"><span style="font-style: italic">ad fin.</span></span> He studied under Aldhelm
			at Malmesbury (<span class="tei tei-hi"><span style="font-style: italic">v. infra</span></span>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_871" id="note_871" class="pginternal">871.</a></dt>
			<dd class="tei tei-notetext">The greatest scholar of his time and
			the man of widest influence as a teacher. He was a West Saxon, of
			royal blood, born about 639; he studied first under Hadrian in the
			School of Canterbury, then under Maildufus (<span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span>), was ordained priest by Bishop Hlothere
			(Leutherius, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">III, 7</a>), and about the year 675 became
			Abbot of Malmesbury, which under his rule grew to be a place of
			importance and attracted crowds of students. On one occasion he
			went by invitation of Pope Sergius to Rome. He became Bishop of
			Sherborne, when in 705 the West Saxon diocese was divided
			(<span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span>). He died in 709 in the little church of
			Doulting in Somerset and was buried in St. Michael's Church at
			Malmesbury. He greatly strengthened the Church in Wessex by his
			influence with King Ini and his zeal in building churches and
			monasteries in various places. His widespread influence, as well as
			his generous use of it, is shown by his letter to Wilfrid's clergy
			after the Council of Estrefeld, exhorting them to remain faithful
			to their bishop (v. Haddan and Stubbs, III, 254).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_872" id="note_872" class="pginternal">872.</a></dt>
			<dd class="tei tei-notetext">In 705. The bishopric of the West
			Saxons was the only one which Theodore did not subdivide. The delay
			may have been due to the political disturbances of the time, and
			these had come to an end under the rule of Ini. Haedde's death
			removed a further difficulty. He seems to have resisted Bertwald's
			attempt to divide the diocese, for we find in 704 a council
			threatening the West Saxons with excommunication if the division is
			not carried out. Hampshire, Surrey, and, for a time, Sussex, were
			assigned to Winchester; Berkshire, Wiltshire, Dorsetshire, and
			Somersetshire to Sherborne (Haddan and Stubbs, III, 276), but the
			authorities differ on this point. After the Conquest, the combined
			bishoprics of Sherborne and Ramsbury (founded in 909 for Wiltshire)
			had their see established at Old Sarum.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_873" id="note_873" class="pginternal">873.</a></dt>
			<dd class="tei tei-notetext">Cf. Preface, p. <a class="tei tei-ref pginternal" href="#Pg003">3</a>, and note, and <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVI">IV, 16</a>. In 744 he
			resigned his see and died in 745. It appears from a letter of
			Boniface to him that he became blind in his old age.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_874" id="note_874" class="pginternal">874.</a></dt>
			<dd class="tei tei-notetext">Malmesbury. It was founded by an Irish
			monk and scholar, Maildufus (Irish <span class="tei tei-q">“Maelduib”</span>), as a small settlement living under
			monastic rule (<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> note on Aldhelm).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_875" id="note_875" class="pginternal">875.</a></dt>
			<dd class="tei tei-notetext">His letter to Geraint or Gerontius,
			king of Dumnonia (Devon and Cornwall). A West Saxon synod in 705
			appointed Aldhelm to write a book, <span class="tei tei-q">“quo
			maligna haeresis Britonum destrueretur”</span> (Faricius, Life of
			Aldhelm). He appears to have influenced only those Britons who were
			subject to the West Saxons. Devon and Cornwall did not finally
			conform to the Catholic Easter till early in the tenth
			century.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_876" id="note_876" class="pginternal">876.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_X">IV, 10</a> (note on Hildilid).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_877" id="note_877" class="pginternal">877.</a></dt>
			<dd class="tei tei-notetext">A poet of the fifth century (circ.
			450), author of a poem called <span class="tei tei-q">“Carmen
			Paschale.”</span> He translated it into prose and called it
			<span class="tei tei-q">“Opus Paschale.”</span> Aldhelm wrote his
			prose work first.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_878" id="note_878" class="pginternal">878.</a></dt>
			<dd class="tei tei-notetext">His style is turgid and grandiloquent,
			and, owing to the high estimation in which he was held, his
			influence in this respect on contemporary writing was harmful.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_879" id="note_879" class="pginternal">879.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">infra</span></span>
			c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIII">23</a>. A
			letter to him from Archbishop Bertwald is extant. We do not know
			how long he lived. We have his signature to a charter of 739.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_880" id="note_880" class="pginternal">880.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XV">IV, 15</a>. The see was established at Selsey. The
			date of this event is not known (Matthew of Westminster is the only
			authority for 711). Bede indicates it very vaguely (<span class="tei tei-q">“quibus administrantibus”</span>), and does not make it
			clear to whose administration he alludes. The more obvious
			reference is surely to Daniel and Aldhelm, the passage about
			Forthere being parenthetical, but the other view has the authority
			of Haddan and Stubbs (III, 296), viz., that he means Daniel and
			Forthere, and that thus the date is fixed to some time after
			Aldhelm's death (709).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_881" id="note_881" class="pginternal">881.</a></dt>
			<dd class="tei tei-notetext">Selsey, cf. IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIII">13</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIV">14</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_882" id="note_882" class="pginternal">882.</a></dt>
			<dd class="tei tei-notetext">The vacancy was filled in 733 by the
			appointment of Sigfrid (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Continuation">Continuation</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_883" id="note_883" class="pginternal">883.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">18</a>, <span class="tei tei-hi"><span style="font-style: italic">ad init.</span></span> His fourth year was
			709.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_884" id="note_884" class="pginternal">884.</a></dt>
			<dd class="tei tei-notetext">C. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XIII">13</a> and <span class="tei tei-hi"><span style="font-style: italic">infra</span></span> c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">19</a> <span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span>, and c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">24</a>. For a similar action, cf. Caedwalla and Ini
			(<span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_VII">7</a>) and (<span class="tei tei-hi"><span style="font-style: italic">infra</span></span>)
			Offa.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_885" id="note_885" class="pginternal">885.</a></dt>
			<dd class="tei tei-notetext">Constantine I, 708-715.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_886" id="note_886" class="pginternal">886.</a></dt>
			<dd class="tei tei-notetext">709-716. St. Boniface (Letter to
			Ethelbald) gives Ceolred a very bad character, and says that he
			died impenitent at a banquet, seized with sudden madness. He
			alludes to him and Osred of Northumbria as the first kings who
			tampered with the privileges of the Church.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_887" id="note_887" class="pginternal">887.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_III_Chap_XXX">III, 30</a>, and <a class="tei tei-ref pginternal" href="#Book_IV_Chap_VI">IV, 6</a>. Sighere reigned jointly with Sebbi. They
			were succeeded by Sebbi's sons, Sighard and Swefred (<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XI">IV, 11</a>). Offa probably
			succeeded them just before this time (709); William of Malmesbury
			says he reigned for a short time. He was succeeded by Selred (d.
			746).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_888" id="note_888" class="pginternal">888.</a></dt>
			<dd class="tei tei-notetext">St. Matt., xix, 29; St. Mark, x, 30;
			St. Luke, xviii, 30.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_889" id="note_889" class="pginternal">889.</a></dt>
			<dd class="tei tei-notetext">Oundle in Northamptonshire, where he
			had a monastery on land given him by Wulfhere of Mercia. For the
			form of the name, cf. <span class="tei tei-hi"><span style="font-style: italic">infra</span></span>, <span class="tei tei-q">“in provincia Undalum.”</span> Here the preposition is
			prefixed as often; <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_II_Chap_XIV">II, 14</a>, note. Wilfrid died on a Thursday in
			October: there is some uncertainty about the day of the month.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_890" id="note_890" class="pginternal">890.</a></dt>
			<dd class="tei tei-notetext">Cf. the epitaph (<span class="tei tei-hi"><span style="font-style: italic">infra</span></span>)
			and c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">24</a>,
			where Bede places his consecration in 664. This is supported by
			William of Malmesbury, but Eddius says he was bishop for forty-six
			years.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_891" id="note_891" class="pginternal">891.</a></dt>
			<dd class="tei tei-notetext">Ripon, <span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span>, p. 56. In the tenth century, Odo, Archbishop
			of Canterbury, removed certain relics to Canterbury, believing them
			to be the body of Wilfrid. At Ripon it was maintained that the
			relics were those of Wilfrid II.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_892" id="note_892" class="pginternal">892.</a></dt>
			<dd class="tei tei-notetext">Our main authority for the life of
			Wilfrid is Eddius (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_IV_Chap_II">IV, 2</a>). Bede's account is remarkable for
			its omissions, though it gives a few facts which Eddius omits.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_893" id="note_893" class="pginternal">893.</a></dt>
			<dd class="tei tei-notetext">His birth must be placed in 634 (cf.
			<span class="tei tei-hi"><span style="font-style: italic">infra</span></span>, his consecration at the
			age of thirty). His father was a Northumbrian thegn. He is said to
			have had an unkind stepmother. He was sent by his father to the
			court of Oswy, thence, by Eanfled (cf. II, <a class="tei tei-ref pginternal" href="#Book_II_Chap_IX">9</a>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_XX">20</a>; III, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XV">15</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXIV">24</a>, <span class="tei tei-hi"><span style="font-style: italic">et
			saep.</span></span>) to Lindisfarne, at that time under the rule of
			Aidan.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_894" id="note_894" class="pginternal">894.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_III_Chap_VIII">III, 8</a>. He was the son of Eadbald (II, <a class="tei tei-ref pginternal" href="#Book_II_Chap_V">5</a>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_VI">6</a>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_IX">9</a>, <span class="tei tei-hi"><span style="font-style: italic">et
			saep.</span></span>). Eanfled's mother was the sister of Eadbald,
			the Kentish princess Ethelberg (<span class="tei tei-q">“Tata”</span>), wife of Edwin (II, <a class="tei tei-ref pginternal" href="#Book_II_Chap_IX">9</a>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_XI">11</a>, <a class="tei tei-ref pginternal" href="#Book_II_Chap_XX">20</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_895" id="note_895" class="pginternal">895.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_II_Chap_XVIII">II, 18</a> <span class="tei tei-hi"><span style="font-style: italic">et saep.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_896" id="note_896" class="pginternal">896.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVIII">IV, 18</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_897" id="note_897" class="pginternal">897.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">III, 25</a>. Annemundus was the name of the
			Archbishop. Dalfinus, Count of Lyons, was his brother. Eddius makes
			the same mistake.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_898" id="note_898" class="pginternal">898.</a></dt>
			<dd class="tei tei-notetext">A daughter of the Count.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_899" id="note_899" class="pginternal">899.</a></dt>
			<dd class="tei tei-notetext">He presented Wilfrid to the Pope,
			Eugenius I. A leaden <span class="tei tei-q">“bulla”</span> with
			the name of Boniface, Archdeacon, inscribed upon it was found at
			Whitby not long ago.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_900" id="note_900" class="pginternal">900.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span>, to Annemundus.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_901" id="note_901" class="pginternal">901.</a></dt>
			<dd class="tei tei-notetext">This seems to be another mistake in
			which Bede follows Eddius. It was probably Ebroin (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_I">IV, 1</a>, note),
			Mayor of the Palace to her infant son Clothaire III, who put
			Annemundus to death. Baldhild was, however, regent at the time.
			Eddius calls her a Jezebel, but all that we know of her shows her
			to have been a most pious and charitable lady, and she has been
			canonized by the Church. She was especially active in her efforts
			to stop the traffic in slaves. She herself, though she is said to
			have been of noble English birth, had been sold as a slave into
			Gaul. She was married first to Ercinwald, Mayor of the Palace, the
			predecessor of Ebroin (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIX">III, 19</a>), and afterwards to Clovis II, King
			of Neustria and Burgundy, 638-656. Baldhild ended her life in the
			monastery of Chelles (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_III_Chap_VIII">III, 8</a>, and note).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_902" id="note_902" class="pginternal">902.</a></dt>
			<dd class="tei tei-notetext">III, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIV">14</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXI">21</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIV">24</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">25</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XVIII">28</a>. He was a friend of Coinwalch of Wessex, from
			whom, as Eddius says, he learned to love the Roman rules.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_903" id="note_903" class="pginternal">903.</a></dt>
			<dd class="tei tei-notetext">Possibly Stamford, in Lincolnshire;
			more probably, since the land belonged to Alchfrid, Stamford
			Bridge, on the Derwent, in Yorkshire.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_904" id="note_904" class="pginternal">904.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">III, 25</a>, where the extent is given as forty
			families, <span class="tei tei-hi"><span style="font-style: italic">i.e.</span></span>, <span class="tei tei-q">“hides.”</span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_905" id="note_905" class="pginternal">905.</a></dt>
			<dd class="tei tei-notetext">Cf. III, <a class="tei tei-ref pginternal" href="#Book_III_Chap_VII">7</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">25</a>, <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVIII">28</a>; IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_I">1</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a>. For the Gewissae, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_II_Chap_V">II, 5</a> and
			note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_906" id="note_906" class="pginternal">906.</a></dt>
			<dd class="tei tei-notetext">At the synod of Whitby, 664 (<a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">III, 25</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_907" id="note_907" class="pginternal">907.</a></dt>
			<dd class="tei tei-notetext">Tuda (<a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVI">III, 26</a>) had died of the plague of 664. For
			Wilfrid's consecration, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVIII">III, 28</a>,
			<span class="tei tei-hi"><span style="font-style: italic">ad
			init.</span></span>, and note. Agilbert was not Bishop of Paris
			till 666 (cf. III, 25, p. <a class="tei tei-ref pginternal" href="#Pg194">194</a>, note).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_908" id="note_908" class="pginternal">908.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXVIII">III, 28</a>, and note. Wilfrid did not return
			to Britain till 666. Bede omits the story of his shipwreck on the
			coast of Sussex, and says nothing of the three years spent as Abbot
			of Ripon, whither he retired on finding Ceadda installed in his
			place. During this time he acted occasionally as Bishop for Mercia,
			where the see was vacant by the death of Jaruman in 667, and for
			Kent, during part of the vacancy between the death of Deusdedit in
			664 and Theodore's arrival in 669.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_909" id="note_909" class="pginternal">909.</a></dt>
			<dd class="tei tei-notetext">The same Witan which elected Wilfrid
			decided to transfer the Northumbrian see from Lindisfarne back to
			York, where Paulinus had originally established it.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_910" id="note_910" class="pginternal">910.</a></dt>
			<dd class="tei tei-notetext">In 678, <span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">IV, 12</a>, and
			note. Bede passes over nine years of ceaseless activity in the
			diocese. It was during this time that Wilfrid built his great
			churches.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_911" id="note_911" class="pginternal">911.</a></dt>
			<dd class="tei tei-notetext">Eddius says that he went there by his
			own wish. This is not the occasion referred to in <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIII">III, 13</a> (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span>
			note, <span class="tei tei-hi"><span style="font-style: italic">ad
			loc.</span></span>). Ebroin, from motives of private enmity
			(Wilfrid had helped his enemy, Dagobert II of Austrasia), attempted
			to bribe Aldgils to kill or surrender Wilfrid, but his offer was
			indignantly rejected.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_912" id="note_912" class="pginternal">912.</a></dt>
			<dd class="tei tei-notetext">Cc. <a class="tei tei-ref pginternal" href="#Book_V_Chap_X">10</a>, <a class="tei tei-ref pginternal" href="#Book_V_Chap_XI">11</a>; cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIII">III, 13</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_913" id="note_913" class="pginternal">913.</a></dt>
			<dd class="tei tei-notetext">On the way he visited Dagobert II of
			Austrasia, and Perctarit, king of the Lombards.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_914" id="note_914" class="pginternal">914.</a></dt>
			<dd class="tei tei-notetext">At a council of fifty bishops held in
			the Lateran in 679. Theodore had sent documents stating his side of
			the case in charge of a monk named Coenwald. For Agatho,
			<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVIII">IV, 18</a>. The decision was that Wilfrid
			should be reinstated in his bishopric and the intruding bishops
			removed, but that afterwards he should appoint coadjutors who
			should be consecrated by the Archbishop.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_915" id="note_915" class="pginternal">915.</a></dt>
			<dd class="tei tei-notetext">This council was held in 680 in
			preparation for the Council at Constantinople in 680-681, against
			the Monothelites (cf. IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVII">17</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVIII">18</a>, and notes).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_916" id="note_916" class="pginternal">916.</a></dt>
			<dd class="tei tei-notetext">In 680. Here Bede strangely omits
			important events. On Wilfrid's return to Northumbria he was accused
			of having procured his acquittal by bribery and was imprisoned for
			nine months, first at Bromnis (unidentified) and then at Dunbar.
			Being released at the request of Aebba, Abbess of Coldingham
			(<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIX">19</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXV">25</a>), who was Egfrid's
			aunt, he went first to Mercia and then to Wessex, but was expelled
			from both provinces. Egfrid's sister Osthryth was the wife of
			Ethelred of Mercia, and in Wessex the king, Centwine, had married a
			sister of the Northumbrian queen, Eormenburg.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_917" id="note_917" class="pginternal">917.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIII">IV, 13</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_918" id="note_918" class="pginternal">918.</a></dt>
			<dd class="tei tei-notetext">IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XIII">13</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVI">16</a>. His connection with Caedwalla of Wessex is to
			be placed here (<a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVI">IV,
			16</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_919" id="note_919" class="pginternal">919.</a></dt>
			<dd class="tei tei-notetext">In 686 he was restored to the
			bishopric of York and the monastery of Ripon. The diocese over
			which he was now placed was greatly circumscribed. Lindsey and
			Abercorn, besides having been detached by the subdivision, had both
			ceased to belong to Northumbria; Lindisfarne and Hexham were
			separate bishoprics and were merely administered by Wilfrid till
			the appointment of Eadbert to Lindisfarne and of John to Hexham.
			The restoration of Wilfrid was brought about by Theodore who had
			become reconciled to him and induced Aldfrid to allow him to be
			reinstated.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_920" id="note_920" class="pginternal">920.</a></dt>
			<dd class="tei tei-notetext">This was his second expulsion, in 691.
			Dissensions had arisen about various matters. The most important
			were the attempt, resisted by Wilfrid, to form Ripon into a
			separate see, and the requirement that he should accept the decrees
			of Theodore of 678. To accept these would have been equivalent to a
			rejection of the Pope's judgement in his case.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_921" id="note_921" class="pginternal">921.</a></dt>
			<dd class="tei tei-notetext">Bede omits here Wilfrid's second
			sojourn in Mercia (eleven years), when he acted temporarily as
			Bishop of the Middle English (he alludes to it in <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIII">IV, 23</a>), and the
			great Council, representative of the whole English Church, summoned
			by Aldfrid in 702 and held at a place in Northumbria (unidentified;
			possibly Austerfield in the West Riding of Yorkshire) called by
			Eddius <span class="tei tei-q">“Ouestraefelda”</span> and
			<span class="tei tei-q">“Aetswinapathe”</span> (supposed to mean
			<span class="tei tei-q">“at the swine's path,”</span> or
			<span class="tei tei-q">“Edwinspath”</span>). At this Council
			Wilfrid was excommunicated and deprived of all his possessions
			except the monastery of Ripon. He appealed again to the Apostolic
			see and returned to Mercia. Probably in the following year he set
			out for Rome, visiting Wilbrord in Frisia by the way (cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XIII">III, 13</a>).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_922" id="note_922" class="pginternal">922.</a></dt>
			<dd class="tei tei-notetext">John VI, 701-705. Bertwald had sent
			envoys to represent Wilfrid's opponents. The investigation took
			four months, during which seventy sittings of the Council were
			held.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_923" id="note_923" class="pginternal">923.</a></dt>
			<dd class="tei tei-notetext">Bertwald was admonished to hold a
			synod and come to an agreement with Wilfrid. In the event of
			failure, both parties were to appear in Rome. The letter is
			cautious and conciliatory in tone.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_924" id="note_924" class="pginternal">924.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">supra</span></span>,
			p. <a class="tei tei-ref pginternal" href="#Pg352">352</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_925" id="note_925" class="pginternal">925.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">supra</span></span>,
			p. <a class="tei tei-ref pginternal" href="#Pg349">349</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_926" id="note_926" class="pginternal">926.</a></dt>
			<dd class="tei tei-notetext">Meaux, cf. <a class="tei tei-ref pginternal" href="#Book_IV_Chap_I">IV, 1</a> (Meldi).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_927" id="note_927" class="pginternal">927.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_III_Chap_XIII">III, 13</a>, and note; <span class="tei tei-hi"><span style="font-style: italic">infra</span></span>
			c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XX">20</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_928" id="note_928" class="pginternal">928.</a></dt>
			<dd class="tei tei-notetext">Ethelred of Mercia had resigned his
			throne and was now Abbot of Bardney; cf. <a class="tei tei-ref pginternal" href="#Book_III_Chap_XI">III, 11</a>, and IV, 12, p.
			<a class="tei tei-ref pginternal" href="#Pg241">241</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_929" id="note_929" class="pginternal">929.</a></dt>
			<dd class="tei tei-notetext">Cc. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XIII">13</a> and <a class="tei tei-ref pginternal" href="#Book_V_Chap_XIX">19</a>, <span class="tei tei-hi"><span style="font-style: italic">ad init.</span></span>; cf. c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">24</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_930" id="note_930" class="pginternal">930.</a></dt>
			<dd class="tei tei-notetext">Cf. c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XVIII">18</a>, <span class="tei tei-hi"><span style="font-style: italic">ad init.</span></span> He received his envoys
			courteously, but refused to alter his decision for any <span class="tei tei-q">“alleged writings from the Apostolic see.”</span> But
			Eddius says he repented on his deathbed.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_931" id="note_931" class="pginternal">931.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_932" id="note_932" class="pginternal">932.</a></dt>
			<dd class="tei tei-notetext">In 705. It was a Northumbrian council,
			not, like Estrefeld, representative of the whole Church. Bertwald
			was present and adopted a conciliatory line.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_933" id="note_933" class="pginternal">933.</a></dt>
			<dd class="tei tei-notetext">He was restored only to Hexham and to
			his monastery at Ripon. Bishop John, on the death of Bosa about
			this time, was transferred to York; <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> c.
			<a class="tei tei-ref pginternal" href="#Book_V_Chap_III">3</a>, <span class="tei tei-hi"><span style="font-style: italic">ad
			init.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_934" id="note_934" class="pginternal">934.</a></dt>
			<dd class="tei tei-notetext">Oundle, <span class="tei tei-hi"><span style="font-style: italic">v.s.</span></span> p.
			<a class="tei tei-ref pginternal" href="#Pg346">346</a>, note 4.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_935" id="note_935" class="pginternal">935.</a></dt>
			<dd class="tei tei-notetext">Or Cudwald. A Cuthbald succeeded
			Sexwulf (<a class="tei tei-ref pginternal" href="#Book_IV_Chap_VI">IV, 6</a>)
			as Abbot at Medeshamstead. He is, perhaps, identical with the Abbot
			of Oundle.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_936" id="note_936" class="pginternal">936.</a></dt>
			<dd class="tei tei-notetext">Cf. <span class="tei tei-hi"><span style="font-style: italic">supra</span></span>,
			p. <a class="tei tei-ref pginternal" href="#Pg346">346</a>, and <a class="tei tei-ref pginternal" href="#Book_III_Chap_XXV">III, 25</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_937" id="note_937" class="pginternal">937.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span> 710. But Hadrian left Rome
			in 668 (<span class="tei tei-hi"><span style="font-style: italic">v.</span></span> <a class="tei tei-ref pginternal" href="#Book_IV_Chap_I">IV, 1</a>), and Bede says he died forty-one
			years after that event. This would be in 709.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_938" id="note_938" class="pginternal">938.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Preface">Preface</a> and <a class="tei tei-ref pginternal" href="#Book_IV_Chap_I">IV, 1</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_939" id="note_939" class="pginternal">939.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_940" id="note_940" class="pginternal">940.</a></dt>
			<dd class="tei tei-notetext">St. Augustine's, Canterbury; cf.
			<a class="tei tei-ref pginternal" href="#Book_IV_Chap_I">IV, 1</a>,
			<span class="tei tei-hi"><span style="font-style: italic">ad
			fin.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_941" id="note_941" class="pginternal">941.</a></dt>
			<dd class="tei tei-notetext">Cf. <a class="tei tei-ref pginternal" href="#Preface">Preface</a> and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_942" id="note_942" class="pginternal">942.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_III_Chap_XIII">III, 13</a>, and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_943" id="note_943" class="pginternal">943.</a></dt>
			<dd class="tei tei-notetext">A.S. version: Mafa. For the Roman
			style of Church music, cf. <a class="tei tei-ref pginternal" href="#Book_II_Chap_XX">II, 20</a>, <span class="tei tei-hi"><span style="font-style: italic">ad fin.</span></span></dd>
			<dt class="tei tei-notelabel"><a href="#noteref_944" id="note_944" class="pginternal">944.</a></dt>
			<dd class="tei tei-notetext">IV, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XII">12</a>, <a class="tei tei-ref pginternal" href="#Book_IV_Chap_XXIII">23</a>; <a class="tei tei-ref pginternal" href="#Book_V_Chap_III">V, 3</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_945" id="note_945" class="pginternal">945.</a></dt>
			<dd class="tei tei-notetext">In 710. Naiton, or Nechtan mac Derili,
			succeeded in 706. The northern Picts had received Christianity
			through Columba (<a class="tei tei-ref pginternal" href="#Book_III_Chap_IV">III, 4</a>). Naiton is said to have been converted to
			Roman usages by a missionary named Boniface, who was probably an
			Irishman, St. Cuiritin. Naiton did not succeed in forcing all his
			people to adopt them, but in 717 he expelled the Columban clergy
			who refused to conform.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_946" id="note_946" class="pginternal">946.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVIII">IV, 18</a> and note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_947" id="note_947" class="pginternal">947.</a></dt>
			<dd class="tei tei-notetext">Wearmouth (<span class="tei tei-hi"><span style="font-style: italic">ibid.</span></span>)
			and Jarrow, Bede's own monastery (<span class="tei tei-hi"><span style="font-style: italic">v.
			infra</span></span>, c. <a class="tei tei-ref pginternal" href="#Book_V_Chap_XXIV">24</a>). Though they were some distance apart,
			Wearmouth and Jarrow formed together one monastery.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_948" id="note_948" class="pginternal">948.</a></dt>
			<dd class="tei tei-notetext"><a class="tei tei-ref pginternal" href="#Book_IV_Chap_XVIII">IV, 18</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_949" id="note_949" class="pginternal">949.</a></dt>
			<dd class="tei tei-notetext">II, 2, p. <a class="tei tei-ref pginternal" href="#Pg085">85</a>, note.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_950" id="note_950" class="pginternal">950.</a></dt>
			<dd class="tei tei-notetext">Wood being the usual material, cf.
			<a class="tei tei-ref pginternal" href="#Book_III_Chap_IV">III, 4</a>,
			<span class="tei tei-q">“Candida Casa.”</span> The locality of the
			church is not known. Rosemarkie, on the Moray Frith, and, more
			probably, Restennet, near Forfar, have been suggested.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_951" id="note_951" class="pginternal">951.</a></dt>
			<dd class="tei tei-notetext">The letter has been supposed to have
			been written by Bede himself.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_952" id="note_952" class="pginternal">952.</a></dt>
			<dd class="tei tei-notetext">Plato, Rep. 473, D.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_953" id="note_953" class="pginternal">953.</a></dt>
			<dd class="tei tei-notetext">Exod., xii, 1-3. (The quotations are
			from the Vulgate.)</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_954" id="note_954" class="pginternal">954.</a></dt>
			<dd class="tei tei-notetext">Exod., xii, 6.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_955" id="note_955" class="pginternal">955.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span>, xii, 15.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_956" id="note_956" class="pginternal">956.</a></dt>
			<dd class="tei tei-notetext">Exod., xii, 15.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_957" id="note_957" class="pginternal">957.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">Ibid.</span></span>, xii, 17.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_958" id="note_958" class="pginternal">958.</a></dt>
			<dd class="tei tei-notetext">Numbers, xxxiii, 13.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_959" id="note_959" class="pginternal">959.</a></dt>
			<dd class="tei tei-notetext">Exod., xii, 17-19.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_960" id="note_960" class="pginternal">960.</a></dt>
			<dd class="tei tei-notetext">1 Cor., v, 7.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_961" id="note_961" class="pginternal">961.</a></dt>
			<dd class="tei tei-notetext">St. John, i, 29.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_962" id="note_962" class="pginternal">962.</a></dt>
			<dd class="tei tei-notetext">Levit., xxiii, 5-7.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_963" id="note_963" class="pginternal">963.</a></dt>
			<dd class="tei tei-notetext">Cf. Bede's <span class="tei tei-q">“Expositio in Marci Evangelium”</span> (Opp. X, 2),
			where he says that St. Mark founded the Church in Alexandria, and
			taught the canonical observance of Easter; and Opp. VI, 235 (De
			Temp. Rat.).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_964" id="note_964" class="pginternal">964.</a></dt>
			<dd class="tei tei-notetext">Levit., xxiii, 8.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_965" id="note_965" class="pginternal">965.</a></dt>
			<dd class="tei tei-notetext">This was an error of the Latins in the
			fifth century. The object was to make it possible for Good Friday
			to fall on the fourteenth of the month Nisan, which they believed
			to be the actual day of the Crucifixion, and to keep Easter Day
			entirely clear of the Jewish festival.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_966" id="note_966" class="pginternal">966.</a></dt>
			<dd class="tei tei-notetext"><span class="tei tei-hi"><span style="font-style: italic">I.e.</span></span> Alexandrians.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_967" id="note_967" class="pginternal">967.</a></dt>
			<dd class="tei tei-notetext">Gen., i, 16.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_968" id="note_968" class="pginternal">968.</a></dt>
			<dd class="tei tei-notetext">The Itala.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_969" id="note_969" class="pginternal">969.</a></dt>
			<dd class="tei tei-notetext">Mal., iv, 2.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_970" id="note_970" class="pginternal">970.</a></dt>
			<dd class="tei tei-notetext">Habak., iii, 11 (from the Itala).</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_971" id="note_971" class="pginternal">971.</a></dt>
			<dd class="tei tei-notetext">The Pelagians; <a class="tei tei-ref pginternal" href="#Book_I_Chap_X">I, 10</a>, and note; cf.
			<a class="tei tei-ref pginternal" href="#Book_I_Chap_XVII">I, 17</a>.</dd>
			<dt class="tei tei-notelabel"><a href="#noteref_972" id="note_972" class="pginternal">972.</a></dt>
			<dd class="tei tei-notetext">The reference must be to p. 364,
