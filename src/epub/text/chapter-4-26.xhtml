		<section data-parent="book-4" id="chapter-4-26" epub:type="chapter">
			<header>
				<h3 epub:type="z3998:ordinal z3998:roman">XXVI</h3>
				<p epub:type="se:bridgehead">Of the death of the Kings Egfrid and Hlothere. [684-685 a.d.]</p>
			</header>
			<!--
			<h2 class="tei tei-head" style="text-align: left; margin-bottom: 2.88em; margin-top: 2.88em">
			<span style="font-size: 144%">Chap. XXVI. Of the death of the Kings
			Egfrid and Hlothere. [684-685</span> <span class="tei tei-hi" style="text-align: left"><span style="font-size: 144%; font-variant: small-caps">a.d.</span></span><span style="font-size: 144%">]</span></h2>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year of
			our Lord 684, Egfrid, king of the Northumbrians, sending his
			general, Berct,<a href="#note_720" id="noteref_720" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">720</span></span></a> with
			an army into Ireland, miserably laid waste that unoffending nation,
			which had always been most friendly to the English; insomuch that
			the invading force spared not even the churches or monasteries. But
			the islanders, while to the utmost of their power they repelled
			force with force, implored the assistance of the Divine mercy, and
			with constant imprecations invoked the vengeance of Heaven; and
			though such as curse cannot inherit the kingdom of God, yet it was
			believed, that those who were justly cursed on account of their
			impiety, soon suffered the penalty of their guilt at the avenging
			hand of God. For the very next year, when that same king had rashly
			led his army to ravage the province of the Picts,<a href="#note_721" id="noteref_721" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">721</span></span></a>
			greatly against the advice of his friends, and particularly of
			Cuthbert,<a href="#note_722" id="noteref_722" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">722</span></span></a> of
			blessed memory, who had been lately ordained bishop, the enemy made
			a feigned retreat, and the king was drawn into a narrow pass among
			remote mountains,<a href="#note_723" id="noteref_723" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">723</span></span></a> and
			slain, with the greater part of the forces he had led thither, on
			the 20th of May, in the fortieth year of his age, and the fifteenth
			of his reign.<a href="#note_724" id="noteref_724" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">724</span></span></a> His
			friends, <span class="tei tei-pb" id="page286">[pg
			286]</span><a class="tei tei-anchor" id="Pg286"/>
			as has been said, advised him not to engage in this war; but since
			he had the year before refused to listen to the most reverend
			father, Egbert,<a href="#note_725" id="noteref_725" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">725</span></span></a>
			advising him not to attack the Scots, who were doing him no harm,
			it was laid upon him as a punishment for his sin, that he should
			now not listen to those who would have prevented his death.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">From that time
			the hopes and strength of the Anglian kingdom <span class="tei tei-q">“began to ebb and fall away;”</span><a href="#note_726" id="noteref_726" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">726</span></span></a> for
			the Picts recovered their own lands, which had been held by the
			English, and so did also the Scots that were in Britain; and some
			of the Britons<a href="#note_727" id="noteref_727" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">727</span></span></a>
			regained their liberty, which they have now enjoyed for about
			forty-six years. Among the many English that then either fell by
			the sword, or were made slaves, or escaped by flight out of the
			country of the Picts, the most reverend man of God, Trumwine,<a href="#note_728" id="noteref_728" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">728</span></span></a> who
			had been made bishop over them, withdrew with his people that were
			in the monastery of Aebbercurnig,<a href="#note_729" id="noteref_729" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">729</span></span></a> in
			the country of the English, but close by the arm of the sea which
			is the boundary between the lands of the English and the Picts.
			Having commended his followers, wheresoever he could, to his
			friends in the monasteries, he chose his own place of abode in the
			monastery, which we have so often mentioned, of servants and
			handmaids of God, at Streanaeshalch;<a href="#note_730" id="noteref_730" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">730</span></span></a> and
			there for many years, with a few of his own brethren, he led a life
			in all monastic austerity, not only to his own benefit, but to the
			benefit of many others, and dying there, he was buried in the
			church of the blessed Peter the Apostle,<a href="#note_731" id="noteref_731" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">731</span></span></a> with
			the honour due to his life and rank. The royal virgin,
			Elfled,<a href="#note_732" id="noteref_732" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">732</span></span></a> with
			her mother, Eanfled, whom we have mentioned before, then presided
			over that monastery; but when the <span class="tei tei-pb" id="page287">[pg 287]</span><a class="tei tei-anchor" id="Pg287"/> bishop came thither, that devout teacher
			found in him the greatest help in governing, and comfort in her
			private life. Aldfrid<a href="#note_733" id="noteref_733" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">733</span></span></a>
			succeeded Egfrid in the throne, being a man most learned in the
			Scriptures, said to be brother to Egfrid, and son to King Oswy; he
			nobly retrieved the ruined state of the kingdom, though within
			narrower bounds.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">The same year,
			being the 685th from the Incarnation of our Lord, Hlothere,<a href="#note_734" id="noteref_734" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">734</span></span></a> king
			of Kent, died on the 6th of February, when he had reigned twelve
			years after his brother Egbert,<a href="#note_735" id="noteref_735" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">735</span></span></a> who
			had reigned nine years: he was wounded in battle with the South
			Saxons, whom Edric,<a href="#note_736" id="noteref_736" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">736</span></span></a> the
			son of Egbert, had raised against him, and died whilst his wound
			was being dressed. After him, this same Edric reigned a year and a
			half. On his death, kings of doubtful title, or of foreign
			origin,<a href="#note_737" id="noteref_737" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">737</span></span></a> for
			some time wasted the kingdom, till the lawful king, Wictred,<a href="#note_738" id="noteref_738" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">738</span></span></a> the
			son of Egbert, being settled in the throne, by his piety and zeal
			delivered his nation from foreign invasion.</p>
