		<section data-parent="book-5" id="chapter-5-8" epub:type="chapter">
			<header>
				<h3 epub:type="z3998:ordinal z3998:roman">VIII</h3>
				<p epub:type="se:bridgehead">How, when Archbishop Theodore died, Bertwald succeeded him as archbishop, and, among many others whom he ordained, he made the learned Tobias bishop of the church of Rochester. [690 a.d.]</p>
			</header>
			<!--
			<h2 class="tei tei-head" style="text-align: left; margin-bottom: 2.88em; margin-top: 2.88em">
			<span style="font-size: 144%">Chap. VIII. How, when Archbishop
			Theodore died, Bertwald succeeded him as archbishop, and, among
			many others whom he ordained, he made the learned Tobias bishop of
			the church of Rochester. [690</span> <span class="tei tei-hi" style="text-align: left"><span style="font-size: 144%; font-variant: small-caps">a.d.</span></span><span style="font-size: 144%">]</span></h2>
			<p class="tei tei-p" style="margin-bottom: 1.00em">The year after
			that in which Caedwalla died at Rome, that is, 690 after the
			Incarnation of our Lord, Archbishop Theodore, of blessed memory,
			departed this life, being old and full of days, for he was
			eighty-eight years of age; which number of years he had been wont
			long before to foretell to his friends that he should live, the
			same having been revealed to him in a dream. He held the bishopric
			twenty-two years,<a href="#note_803" id="noteref_803" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">803</span></span></a> and
			was buried in St. Peter's church,<a href="#note_804" id="noteref_804" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">804</span></span></a> where
			all the bodies of the bishops of <span class="tei tei-pb" id="page315">[pg 315]</span><a class="tei tei-anchor" id="Pg315"/> Canterbury are buried. Of whom, as well as of
			his fellows of the same degree, it may rightly and truly be said,
			that their bodies are buried in peace, and their names shall live
			to all generations. For to say all in few words, the English
			Churches gained more spiritual increase while he was archbishop,
			than ever before. His character, life, age, and death, are plainly
			and manifestly described to all that resort thither, by the epitaph
			on his tomb, in thirty-four heroic verses.<a href="#note_805" id="noteref_805" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">805</span></span></a> The
			first whereof are these:</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em"><span class="tei tei-q">“Here in the tomb rests the body of the holy prelate,
			called now in the Greek tongue Theodore. Chief pontiff, blest high
			priest, pure doctrine he set forth to his disciples.”</span></p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">The last are as
			follow:</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em"><span class="tei tei-q">“For September had reached its nineteenth day, when his
			spirit went forth from the prison-bars of the flesh. Mounting in
			bliss to the gracious fellowship of the new life, he was united to
			the angelic citizens in the heights of Heaven.”</span></p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">Bertwald<a href="#note_806" id="noteref_806" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">806</span></span></a>
			succeeded Theodore in the archbishopric, being abbot of the
			monastery called Racuulfe,<a href="#note_807" id="noteref_807" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">807</span></span></a> which
			stands at the northern mouth of the river Genlade.<a href="#note_808" id="noteref_808" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">808</span></span></a> He
			was a man learned in the Scriptures, and perfectly instructed in
			ecclesiastical and monastic teaching, yet in no wise to be compared
			to his predecessor. He was chosen bishop in the year of our Lord
			692,<a href="#note_809" id="noteref_809" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">809</span></span></a> on
			the first day of July, when Wictred and Suaebhard were kings
			<span class="tei tei-pb" id="page316">[pg 316]</span><a class="tei tei-anchor" id="Pg316"/> in Kent;<a href="#note_810" id="noteref_810" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">810</span></span></a> but
			he was ordained the next year, on Sunday the 29th of June, by
			Godwin, metropolitan bishop of Gaul,<a href="#note_811" id="noteref_811" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">811</span></span></a> and
			was enthroned on Sunday the 31st of August. Among the many bishops
			whom he ordained was Tobias,<a href="#note_812" id="noteref_812" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">812</span></span></a> a man
			instructed in the Latin, Greek, and Saxon tongues, and otherwise of
			manifold learning, whom he consecrated in the stead of Gedmund,
			bishop of the Church of Rochester, who had died.</p>
			</div>
