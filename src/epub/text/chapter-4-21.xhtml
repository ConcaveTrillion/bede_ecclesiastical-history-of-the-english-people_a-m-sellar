				<p epub:type="se:bridgehead">How Bishop Theodore made peace between the kings Egfrid and Ethelred. [679 a.d.]</p>
			</header>

			appeased, and no man was put to death, but only the due mulct<a href="#note_677" id="noteref_677" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">677</span></span></a> paid
