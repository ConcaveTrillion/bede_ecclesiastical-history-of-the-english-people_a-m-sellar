		<section data-parent="book-2" id="chapter-2-14" epub:type="chapter">
			<header>
				<h3 epub:type="z3998:ordinal z3998:roman">XIV</h3>
				<p epub:type="se:bridgehead">How King Edwin and his nation became Christians; and where Paulinus baptized them. [627 a.d.]</p>
			</header>
			<!--
			<h2 class="tei tei-head" style="text-align: left; margin-bottom: 2.88em; margin-top: 2.88em">
			<span style="font-size: 144%">Chap. XIV. How King Edwin and his
			nation became Christians; and where Paulinus baptized them.
			[627</span> <span class="tei tei-hi" style="text-align: left"><span style="font-size: 144%; font-variant: small-caps">a.d.</span></span><span style="font-size: 144%">]</span></h2>
			<p class="tei tei-p" style="margin-bottom: 1.00em">King Edwin,
			therefore, with all the nobility of the nation, and a large number
			of the common sort, received the faith, and the washing of holy
			regeneration, in the eleventh year of his reign, which is the year
			of our Lord 627, and about one hundred and eighty after the coming
			of the English into Britain. He was baptized at York, on the holy
			day of Easter,<a href="#note_233" id="noteref_233" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">233</span></span></a> being
			the 12th of April, in the church of St. Peter the Apostle, which he
			himself had built of timber there in haste, whilst he was a
			catechumen receiving instruction in order to be admitted to
			baptism. In that city also he bestowed upon his instructor and
			bishop, Paulinus, his episcopal see. But as soon as he was
			baptized, he set about building, by the direction of <span class="tei tei-pb" id="page119">[pg 119]</span><a class="tei tei-anchor" id="Pg119"/> Paulinus, in the same place a larger
			and nobler church of stone, in the midst whereof the oratory which
			he had first erected should be enclosed.<a href="#note_234" id="noteref_234" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">234</span></span></a>
			Having, therefore, laid the foundation, he began to build the
			church square, encompassing the former oratory. But before the
			walls were raised to their full height, the cruel death<a href="#note_235" id="noteref_235" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">235</span></span></a> of
			the king left that work to be finished by Oswald his successor.
			Paulinus, for the space of six years from this time, that is, till
			the end of the king's reign, with his consent and favour, preached
			the Word of God in that country, and as many as were foreordained
			to eternal life believed and were baptized. Among them were Osfrid
			and Eadfrid, King Edwin's sons who were both born to him, whilst he
			was in banishment, of Quenburga, the daughter of Cearl, king of the
			Mercians.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">Afterwards other
			children of his, by Queen Ethelberg, were baptized, Ethelhun and
			his daughter Ethelthryth, and another, Wuscfrea, a son; the first
			two were snatched out of this life whilst they were still in the
			white garments of the newly-baptized,<a href="#note_236" id="noteref_236" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">236</span></span></a> and
			buried in the church at York. Yffi,<a href="#note_237" id="noteref_237" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">237</span></span></a> the
			son of Osfrid, was also baptized, and many other noble and royal
			persons. So great was then the fervour of the faith, as is
			reported, and the desire for the laver of salvation among the
			nation of the Northumbrians, that Paulinus at a certain time coming
			with the king and queen to the royal township, which is called
			Adgefrin,<a href="#note_238" id="noteref_238" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">238</span></span></a>
			stayed there with them thirty-six days, fully occupied in
			catechizing and baptizing; during which <span class="tei tei-pb" id="page120">[pg 120]</span><a class="tei tei-anchor" id="Pg120"/> days, from morning till night, he did nothing
			else but instruct the people resorting from all villages and
			places, in Christ's saving Word; and when they were instructed, he
			washed them with the water of absolution in the river Glen,<a href="#note_239" id="noteref_239" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">239</span></span></a> which
			is close by. This township, under the following kings, was
			abandoned, and another was built instead of it, at the place called
			Maelmin.<a href="#note_240" id="noteref_240" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">240</span></span></a></p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">These things
			happened in the province of the Bernicians; but in that of the
			Deiri also, where he was wont often to be with the king, he
			baptized in the river Swale, which runs by the village of
			Cataract;<a href="#note_241" id="noteref_241" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">241</span></span></a> for
			as yet oratories, or baptisteries, could not be built in the early
			infancy of the Church in those parts. But in Campodonum,<a href="#note_242" id="noteref_242" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">242</span></span></a> where
			there was then a royal township, he built a church which the
			pagans, by whom King Edwin was slain, afterwards burnt, together
			with all the place. Instead of this royal seat the later kings
			built themselves a township in the country called Loidis.<a href="#note_243" id="noteref_243" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">243</span></span></a> But
			the altar, being of stone, escaped the fire and is still preserved
			in the monastery of the most reverend abbot and priest, Thrydwulf,
			which is in the forest of Elmet.<a href="#note_244" id="noteref_244" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">244</span></span></a></p>
			</div>
