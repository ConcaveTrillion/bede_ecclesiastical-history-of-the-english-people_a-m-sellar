		<section data-parent="book-1" id="chapter-1-34" epub:type="chapter">
			<header>
				<h3 epub:type="z3998:ordinal z3998:roman">XXXIV</h3>
				<p epub:type="se:bridgehead">How Ethelfrid, king of the Northumbrians, having vanquished the nations of the Scots, expelled them from the territories of the English. [603 a.d.]</p>
			</header>
			<!--
			<h2 class="tei tei-head" style="text-align: left; margin-bottom: 2.88em; margin-top: 2.88em">
			<span style="font-size: 144%">Chap. XXXIV. How Ethelfrid, king of
			the Northumbrians, having vanquished the nations of the Scots,
			expelled them from the territories of the English. [603</span>
			<span class="tei tei-hi" style="text-align: left"><span style="font-size: 144%; font-variant: small-caps">a.d.</span></span><span style="font-size: 144%">]</span></h2>
			<p class="tei tei-p" style="margin-bottom: 1.00em">At this time,
			the brave and ambitious king, Ethelfrid,<a href="#note_139" id="noteref_139" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">139</span></span></a>
			governed the kingdom of the Northumbrians, and ravaged the Britons
			more than all the chiefs of the English, insomuch that he might be
			compared to Saul of old, king of the Israelites, save only in this,
			that he was ignorant of Divine religion. For he conquered more
			territories from the Britons than any other chieftain or king,
			either subduing the inhabitants and making them tributary, or
			driving them out and planting the English in their places. To him
			might justly be applied the saying of the patriarch blessing his
			son in the person of Saul, <span class="tei tei-q">“Benjamin shall
			ravin as a wolf; in the morning he shall devour the prey, and at
			night he shall divide the spoil.”</span><a href="#note_140" id="noteref_140" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">140</span></span></a>
			Hereupon, Aedan, king of the Scots that dwell in Britain,<a href="#note_141" id="noteref_141" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">141</span></span></a> being
			alarmed by his success, came against him with a great and mighty
			army, but was defeated and fled with a few followers; for almost
			all his army was cut to pieces at a famous place, called Degsastan,
			that is, Degsa Stone.<a href="#note_142" id="noteref_142" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">142</span></span></a> In
			which battle also Theodbald, brother to Ethelfrid, <span class="tei tei-pb" id="page074">[pg 074]</span><a class="tei tei-anchor" id="Pg074"/> was killed, with almost all the forces
			he commanded. This war Ethelfrid brought to an end in the year of
			our Lord 603, the eleventh of his own reign, which lasted
			twenty-four years, and the first year of the reign of Phocas, who
			then was at the head of the Roman empire. From that time, no king
			of the Scots durst come into Britain to make war on the English to
			this day.</p>
			</div>
