		<section data-parent="book-5" id="chapter-5-23" epub:type="chapter">
			<header>
				<h3 epub:type="z3998:ordinal z3998:roman">XXIII</h3>
				<p epub:type="se:bridgehead">Of the present state of the English nation, or of all Britain. [725-731 a.d.]</p>
			</header>
			<!--
			<h2 class="tei tei-head" style="text-align: left; margin-bottom: 2.88em; margin-top: 2.88em">
			<span style="font-size: 144%">Chap. XXIII. Of the present state of
			the English nation, or of all Britain. [725-731</span> <span class="tei tei-hi" style="text-align: left"><span style="font-size: 144%; font-variant: small-caps">a.d.</span></span><span style="font-size: 144%">]</span></h2>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year of
			our Lord 725, being the seventh year of Osric,<a href="#note_996" id="noteref_996" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">996</span></span></a> king
			of the Northumbrians, who had succeeded Coenred, Wictred,<a href="#note_997" id="noteref_997" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">997</span></span></a> the
			son of Egbert, king of Kent, died on the 23rd of April, and left
			his three sons, Ethelbert, Eadbert, and Alric,<a href="#note_998" id="noteref_998" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">998</span></span></a> heirs
			of that kingdom, which he had governed thirty-four years and a
			half. The next year Tobias,<a href="#note_999" id="noteref_999" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">999</span></span></a>
			bishop of the church of Rochester, died, a most learned man, as has
			been said before; for he was disciple to those masters of blessed
			memory, Theodore, the archbishop, and Abbot Hadrian, wherefore, as
			has been said, besides having a great knowledge of letters both
			ecclesiastical and general, he learned both the Greek and Latin
			tongues to such perfection, that they were as well known and
			familiar to him as his native language. He was buried in the chapel
			of St. Paul the <span class="tei tei-pb" id="page378">[pg
			378]</span><a class="tei tei-anchor" id="Pg378"/>
			Apostle, which he had built within the church of St. Andrew<a href="#note_1000" id="noteref_1000" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1000</span></span></a> for
			his own place of burial. After him Aldwulf<a href="#note_1001" id="noteref_1001" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1001</span></span></a> took
			upon him the office of bishop, having been consecrated by
			Archbishop Bertwald.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year of
			our Lord 729, two comets appeared about the sun, to the great
			terror of the beholders. One of them went before the sun in the
			morning at his rising, the other followed him when he set in the
			evening, as it were presaging dire disaster to both east and west;
			or without doubt one was the forerunner of the day, and the other
			of the night, to signify that mortals were threatened with
			calamities at both times. They carried their flaming brands towards
			the north, as it were ready to kindle a conflagration. They
			appeared in January, and continued nearly a fortnight. At which
			time a grievous blight fell upon Gaul, in that it was laid waste by
			the Saracens with cruel bloodshed; but not long after in that
			country they received the due reward of their unbelief.<a href="#note_1002" id="noteref_1002" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1002</span></span></a> In
			that year the holy man of God, Egbert, departed to the Lord, as has
			been said above, on Easter day;<a href="#note_1003" id="noteref_1003" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1003</span></span></a> and
			immediately after Easter, that is, on the 9th of May, Osric,<a href="#note_1004" id="noteref_1004" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1004</span></span></a> king
			of the Northumbrians, departed this life, after he had reigned
			eleven years, and appointed Ceolwulf,<a href="#note_1005" id="noteref_1005" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1005</span></span></a>
			brother to Coenred,<a href="#note_1006" id="noteref_1006" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1006</span></span></a> who
			had reigned before him, his successor; the beginning and progress
			of whose reign have been so filled with many and great commotions
			and conflicts, that it cannot yet be known what is to be said
			concerning them, or what end they will have.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year of
			our Lord 731, Archbishop Bertwald died of old age, on the 13th of
			January, having held his <span class="tei tei-pb" id="page379">[pg
			379]</span><a class="tei tei-anchor" id="Pg379"/>
			see thirty-seven years, six months and fourteen days.<a href="#note_1007" id="noteref_1007" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1007</span></span></a> In
			his stead, the same year, Tatwine,<a href="#note_1008" id="noteref_1008" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1008</span></span></a> of
			the province of the Mercians, was made archbishop, having been a
			priest in the monastery called Briudun.<a href="#note_1009" id="noteref_1009" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1009</span></span></a> He
			was consecrated in the city of Canterbury by the venerable men,
			Daniel,<a href="#note_1010" id="noteref_1010" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1010</span></span></a>
			bishop of Winchester, Ingwald of London,<a href="#note_1011" id="noteref_1011" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1011</span></span></a>
			Aldwin of Lichfield,<a href="#note_1012" id="noteref_1012" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1012</span></span></a> and
			Aldwulf of Rochester,<a href="#note_1013" id="noteref_1013" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1013</span></span></a> on
			Sunday, the 10th of June, being a man renowned for piety and
			wisdom, and of notable learning in Holy Scripture.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">Thus at the
			present time,<a href="#note_1014" id="noteref_1014" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1014</span></span></a> the
			bishops Tatwine and <span class="tei tei-pb" id="page380">[pg
			380]</span><a class="tei tei-anchor" id="Pg380"/>
			Aldwulf preside in the churches of Kent; Ingwald is bishop in the
			province of the East Saxons. In the province of the East Angles,
			the bishops are Aldbert and Hadulac;<a href="#note_1015" id="noteref_1015" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1015</span></span></a> in
			the province of the West Saxons, Daniel and Forthere;<a href="#note_1016" id="noteref_1016" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1016</span></span></a> in
			the province of the Mercians, Aldwin.<a href="#note_1017" id="noteref_1017" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1017</span></span></a>
			Among those peoples who dwell beyond the river Severn to the
			westward,<a href="#note_1018" id="noteref_1018" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1018</span></span></a>
			Walhstod is bishop; in the province of the Hwiccas, Wilfrid;<a href="#note_1019" id="noteref_1019" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1019</span></span></a> in
			the province of Lindsey, Bishop Cynibert<a href="#note_1020" id="noteref_1020" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1020</span></span></a>
			presides; the bishopric of the Isle of Wight<a href="#note_1021" id="noteref_1021" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1021</span></span></a>
			belongs to Daniel, bishop of the city of Winchester. The province
			of the South Saxons,<a href="#note_1022" id="noteref_1022" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1022</span></span></a>
			having now continued some years without a bishop, receives
			episcopal ministrations from the prelate of the West Saxons. All
			these provinces, and the other southern provinces, as far as the
			boundary formed by the river Humber, with their several kings, are
			subject to King Ethelbald.<a href="#note_1023" id="noteref_1023" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1023</span></span></a></p><span class="tei tei-pb" id="page381">[pg 381]</span><a class="tei tei-anchor" id="Pg381"/>
			<p class="tei tei-p" style="margin-bottom: 1.00em">But in the
			province of the Northumbrians, where King Ceolwulf reigns, four
			bishops now preside; Wilfrid<a href="#note_1024" id="noteref_1024" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1024</span></span></a> in
			the church of York, Ethelwald<a href="#note_1025" id="noteref_1025" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1025</span></span></a> in
			that of Lindisfarne, Acca<a href="#note_1026" id="noteref_1026" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1026</span></span></a> in
			that of Hagustald, Pecthelm<a href="#note_1027" id="noteref_1027" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1027</span></span></a> in
			that which is called the White House, which, as the number of the
			faithful has increased, has lately become an episcopal see, and has
			him for its first prelate. The Pictish people also at this time are
			at peace with the English nation, and rejoice in having their part
			in Catholic peace and truth with the universal Church. The
			Scots<a href="#note_1028" id="noteref_1028" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1028</span></span></a> that
			inhabit Britain, content with their own territories, devise no
			plots nor hostilities against the English nation. The
			Britons,<a href="#note_1029" id="noteref_1029" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1029</span></span></a>
			though they, for the most part, as a nation hate and oppose the
			English nation, and wrongfully, and from wicked lewdness, set
			themselves against the appointed Easter of the whole Catholic
			Church; yet, inasmuch as both Divine and human power withstand
			them, they can in neither purpose prevail as they desire; for
			though in part they are their own masters, yet part of them are
			brought under subjection to the English. In these favourable times
			of peace and calm,<a href="#note_1030" id="noteref_1030" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">1030</span></span></a> many
			of the Northumbrians, as well of the nobility as private persons,
			laying aside their weapons, and receiving the tonsure, desire
			rather both for themselves and their children to take upon them
			monastic vows, than to practise the pursuit of war. What will be
			the end hereof, the next age will see. This is for the present the
			state <span class="tei tei-pb" id="page382">[pg 382]</span><a class="tei tei-anchor" id="Pg382"/> of all Britain;
			about two hundred and eighty-five years after the coming of the
			English into Britain, and in the 731st year of our Lord, in Whose
			kingdom that shall have no end let the earth rejoice; and Britain
			being one with them in the joy of His faith, let the multitude of
			isles be glad, and give thanks at the remembrance of His
			holiness.</p>
			</div>
