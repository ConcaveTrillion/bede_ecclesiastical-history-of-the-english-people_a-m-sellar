			<header>
				<h3 epub:type="z3998:ordinal z3998:roman">XX</h3>
				<p epub:type="se:bridgehead">How, when Honorius died, Deusdedit became Archbishop of Canterbury; and of those who were at that time bishops of the East Angles, and of the church of Rochester. [653 a.d.]</p>
			</header>
			<!--
			<h2 class="tei tei-head" style="text-align: left; margin-bottom: 2.88em; margin-top: 2.88em">
			<span style="font-size: 144%">Chap. XX. How, when Honorius died,
			Deusdedit became Archbishop of Canterbury; and of those who were at
			that time bishops of the East Angles, and of the church of
			Rochester. [653</span> <span class="tei tei-hi" style="text-align: left"><span style="font-size: 144%; font-variant: small-caps">a.d.</span></span><span style="font-size: 144%">]</span></h2>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the meantime,
			Felix, bishop of the East Angles, dying, when he had held that see
			seventeen years,<a href="#note_393" id="noteref_393" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">393</span></span></a>
			<span class="tei tei-pb" id="page179">[pg 179]</span><a class="tei tei-anchor" id="Pg179"/> Honorius ordained
			Thomas his deacon, of the province of the Gyrwas,<a href="#note_394" id="noteref_394" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">394</span></span></a> in
			his place; and he being taken from this life when he had been
			bishop five years, Bertgils, surnamed Boniface,<a href="#note_395" id="noteref_395" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">395</span></span></a> of
			the province of Kent, was appointed in his stead. Honorius<a href="#note_396" id="noteref_396" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">396</span></span></a>
			himself also, having run his course, departed this life in the year
			of our Lord 653, on the 30th of September; and when the see had
			been vacant a year and six months, Deusdedit<a href="#note_397" id="noteref_397" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">397</span></span></a> of
			the nation of the West Saxons, was chosen the sixth Archbishop of
			Canterbury. To ordain him, Ithamar,<a href="#note_398" id="noteref_398" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">398</span></span></a>
			bishop of Rochester, came thither. His ordination was on the 26th
			of March, and he ruled the church nine years, four months, and two
			days; and when Ithamar died, he consecrated in his place
			Damian,<a href="#note_399" id="noteref_399" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">399</span></span></a> who
			was of the race of the South Saxons.</p>
			</div>
