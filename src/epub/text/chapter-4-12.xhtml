		<section data-parent="book-4" id="chapter-4-12" epub:type="chapter">
			<header>
				<h3 epub:type="z3998:ordinal z3998:roman">XII</h3>
				<p epub:type="se:bridgehead">How Haedde succeeded Leutherius in the bishopric of the West Saxons; how Cuichelm succeeded Putta in the bishopric of the church of Rochester, and was himself succeeded by Gebmund; and who were then bishops of the Northumbrians. [673-681 a.d.]</p>
			</header>
			<!--
			<h2 class="tei tei-head" style="text-align: left; margin-bottom: 2.88em; margin-top: 2.88em">
			<span style="font-size: 144%">Chap. XII. How Haedde succeeded
			Leutherius in the bishopric of the West Saxons; how Cuichelm
			succeeded Putta in the bishopric of the church of Rochester, and
			was himself succeeded by Gebmund; and who were then bishops of the
			Northumbrians. [673-681</span> <span class="tei tei-hi" style="text-align: left"><span style="font-size: 144%; font-variant: small-caps">a.d.</span></span><span style="font-size: 144%">]</span></h2>
			<p class="tei tei-p" style="margin-bottom: 1.00em">Leutherius was
			the fourth bishop of the West Saxons; for Birinus was the first,
			Agilbert the second, and Wini the third.<a href="#note_591" id="noteref_591" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">591</span></span></a> When
			Coinwalch,<a href="#note_592" id="noteref_592" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">592</span></span></a> in
			whose reign the said Leutherius was made bishop, died, the
			sub-kings took upon them the government of the nation, and dividing
			it among themselves, held it for about ten years; and during their
			rule he died, and Haedde<a href="#note_593" id="noteref_593" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">593</span></span></a>
			succeeded him in the bishopric, having been consecrated by
			Theodore, in the city of London. During his episcopate,
			Caedwalla,<a href="#note_594" id="noteref_594" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">594</span></span></a>
			having subdued and removed the sub-kings, took upon himself the
			supreme authority. When he had held it for two years, and whilst
			the same bishop still governed the church, at length impelled by
			love of the heavenly kingdom, he quitted it and, going away to
			Rome, ended his days there, as shall be said more fully
			hereafter.</p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year of
			our Lord 676, when Ethelred, king of the Mercians,<a href="#note_595" id="noteref_595" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">595</span></span></a>
			ravaged Kent with a hostile army, and <span class="tei tei-pb" id="page242">[pg 242]</span><a class="tei tei-anchor" id="Pg242"/> profaned churches and monasteries, without
			regard to pity, or the fear of God, in the general destruction he
			laid waste the city of Rochester; Putta,<a href="#note_596" id="noteref_596" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">596</span></span></a> who
			was bishop, was absent at that time, but when he understood that
			his church was ravaged, and everything taken away from it, he went
			to Sexwulf, bishop of the Mercians,<a href="#note_597" id="noteref_597" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">597</span></span></a> and
			having received of him a certain church, and a small piece of land,
			ended his days there in peace; in no way endeavouring to restore
			his bishopric, for, as has been said above, he was more industrious
			in ecclesiastical than in worldly affairs; serving God only in that
			church, and going wherever he was desired, to teach Church music.
			Theodore consecrated Cuichelm bishop of Rochester in his stead; but
			he, not long after, departing from his bishopric for want of
			necessaries, and withdrawing to other parts, Gebmund was put in his
			place by Theodore.<a href="#note_598" id="noteref_598" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">598</span></span></a></p>
			<p class="tei tei-p" style="margin-bottom: 1.00em">In the year of
			our Lord 678, which is the eighth of the reign of Egfrid, in the
			month of August, appeared a star, called a comet, which continued
			for three months, rising in the morning, and sending forth, as it
			were, a tall pillar of radiant flame. The same year a dissension
			broke out between King Egfrid and the most reverend prelate,
			Wilfrid, who was driven from his see,<a href="#note_599" id="noteref_599" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">599</span></span></a> and
			two bishops substituted for him, to preside over the nation
			<span class="tei tei-pb" id="page243">[pg 243]</span><a class="tei tei-anchor" id="Pg243"/> of the
			Northumbrians,<a href="#note_600" id="noteref_600" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">600</span></span></a>
			namely, Bosa,<a href="#note_601" id="noteref_601" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">601</span></span></a> to
			govern the province of the Deiri; and Eata<a href="#note_602" id="noteref_602" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">602</span></span></a> that
			of the Bernicians; the former having his episcopal see in the city
			of York, the latter either in the church of Hagustald, or of
			Lindisfarne; both of them promoted to the episcopal dignity from a
			community of monks. With them also Eadhaed<a href="#note_603" id="noteref_603" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">603</span></span></a> was
			ordained bishop for the province of Lindsey, which King Egfrid had
			but newly acquired, having defeated Wulfhere and put him to
			flight;<a href="#note_604" id="noteref_604" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">604</span></span></a> and
			this was the first bishop of its own which that province had; the
			second was Ethelwin;<a href="#note_605" id="noteref_605" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">605</span></span></a> the
			third Edgar;<a href="#note_606" id="noteref_606" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">606</span></span></a> the
			fourth <span class="tei tei-pb" id="page244">[pg
			244]</span><a class="tei tei-anchor" id="Pg244"/>
			Cynibert,<a href="#note_607" id="noteref_607" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">607</span></span></a> who
			is there at present. Before Eadhaed, Sexwulf<a href="#note_608" id="noteref_608" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">608</span></span></a> was
			bishop as well of that province as of the Mercians and Midland
			Angles; so that, when expelled from Lindsey, he continued in the
			government of those provinces. Eadhaed, Bosa, and Eata, were
			ordained at York by archbishop Theodore;<a href="#note_609" id="noteref_609" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">609</span></span></a> who
			also, three years after the departure of Wilfrid, added two bishops
			to their number: Tunbert,<a href="#note_610" id="noteref_610" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">610</span></span></a>
			appointed to the church of Hagustald, Eata still continuing in that
			of Lindisfarne; and Trumwine<a href="#note_611" id="noteref_611" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">611</span></span></a> to
			the province of the Picts, which at that time was subject to
			English rule. Eadhaed returning from Lindsey, because Ethelred had
			recovered that province,<a href="#note_612" id="noteref_612" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">612</span></span></a> was
			placed by Theodore over the church of Ripon.<a href="#note_613" id="noteref_613" class="pginternal"><span class="tei tei-noteref"><span style="font-size: 60%; vertical-align: super">613</span></span></a></p>
			</div><span class="tei tei-pb" id="page245">[pg 245]</span><a class="tei tei-anchor" id="Pg245"/>
